# Product default — deployed to every customer.
# Conservative: catches more PII, no safe patterns.
# Customers configure field_routing to classify which fields are
# identity (→ Sandbox A), freetext (→ Sanitizer), or passthrough (→ Sandbox B).
# Unclassified fields default to freetext (fail-closed).

# Field routing — customers edit this section to match their data sources.
# See docs/starter-templates/ for vertical-specific examples.
gateway:
  field_routing:
    default:
      identity: []
      freetext: []       # all unclassified fields also land here (fail-closed)
      passthrough: []

sanitizer:
  freetext_fields: []
  # W5+ Phase 1 (2026-05-09) toggles — credential-class + adversarial-input
  # hardening. Both default ON; operators can flip to false per environment.
  # NOTE (r1 fix, TOB-160-001): the third toggle
  # `documented_placeholder_suppression_enabled` was removed because the
  # filter created an exploitable real-credential-leak path. The yaml loader
  # silently ignores any leftover key in customer config files.
  detect_secrets_enabled: true
  adversarial_normalization_enabled: true
  known_entity_matching:
    enabled: true
    strategies: [exact, cologne_phonetics, levenshtein]
    levenshtein_max_distance: 2
    location_context_window: 50
    # Customer-scoped PERSON name supplement. Empty by default — operators add
    # names here that are deliberately excluded from the global german-names.txt
    # list (e.g. surnames that collide with common German words). Word-boundary
    # matched, so compound words like "Vogelgrippe" are NOT matched. See
    # docs/configuration.md for guidance.
    extra_person_names: []
  presidio:
    language_detection: auto
    default_language: de
    supported_languages: [de, en]
    confidence_threshold: 0.35
    custom_recognizers:
      - sozialversicherungsnummer
      - us_ssn
      - steuer_id
      - personalausweisnummer
      - german_zip_code
      - credit_card_extended
      - phone_extended
      - german_names
      - german_street
      - date_of_birth
      - account_number
      - fallnummer
      - vin
      - license_plate
      - swift_bic
      - passport_number
      - drivers_license
      - street_address
      - password
      - krankenversichertennummer
      # W5+ Phase 1 (2026-05-09) — high-value SaaS secret prefixes + partial
      # credit-card-suffix idiom. Yelp detect-secrets is wired separately in
      # app.py (config flag: sanitizer.detect_secrets_enabled).
      - openai_api_key
      - anthropic_api_key
      - stripe_webhook_secret
      - jwt_token
      - github_pat
      - credit_card_suffix_idiom
      # Phase 3 (2026-05-09) — domain coverage expansion. German court
      # Aktenzeichen recognizer closes the gov/legal recall gap (was 67.5%);
      # 5 international PII recognizers (ES DNI/NIE, FR INSEE, IT Codice
      # Fiscale, BE RNN, NL BSN) close the international recall gap (was
      # 66.7%); generic order-number recognizer closes the customer-service
      # recall gap (was 74%).
      - german_aktenzeichen
      - spanish_dni
      - french_insee
      - italian_codice_fiscale
      - belgian_rnn
      - dutch_bsn
      - order_number
    safe_terms_file: /config/medical-terms.txt
    safe_patterns:
      # GPS/decimal coordinates: digits with 4+ decimal places (32.85768, -97.3 etc.)
      - '-?\d{1,3}\.\d{4,}'
  llm_scan:
    enabled: true
    ollama_url: http://ollama:11434
    model: qwen2.5:7b
    timeout_seconds: 30
    fallback_on_error: continue
    # Phase 3 (2026-05-09) added "ensemble" mode for L3 reversals. Default
    # stays "sequential" so existing customers see ZERO behavior drift on
    # this PR's deploy. (TOB-003 fix, 2026-05-09 — earlier draft flipped the
    # default to ensemble, which silently changed cert payload shape and
    # invoked a different code path / timeout / fallback profile across
    # ALL customers regardless of their per-request `enable_l3_reversals`
    # flag. Reverted.)
    #
    # Pro/Enterprise overlays MUST explicitly set:
    #     mode: ensemble
    # to opt into the L3 reversal path. The per-request
    # `enable_l3_reversals` flag is request-scoped; the `mode: ensemble`
    # switch is config-scoped (operator-set). Both must be present for
    # reversals to fire.
    mode: sequential
    # Calibrated against the 12-corpus domain bench to hit news-journalism
    # FP < 9% without leaking patient names. Lowered from 0.9 -> 0.85;
    # tighten back to 0.9 only if false-reversal cases observed in the
    # `compliance_trace.l3_reversals` audit log.
    restore_threshold: 0.85
  llm_audit:
    enabled: false

qi_engine:
  # Controlled at runtime via QI_ENGINE_ENABLED, QI_ENGINE_THRESHOLD, QI_ENGINE_ACTION env vars.
  # Defaults shown here for reference:
  enabled: false
  threshold: 0.25
  action: generalize
