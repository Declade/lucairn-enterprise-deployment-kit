name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Kit test harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install CI tools into a runner-writable directory.  GitHub-hosted
      # ubuntu-latest runners execute workflow steps as the unprivileged
      # "runner" user; /usr/local/bin is root-owned and not writable without
      # sudo.  We use $RUNNER_TEMP/bin (always writable by the runner user)
      # and register it via $GITHUB_PATH so subsequent steps find the
      # binaries on PATH.
      #
      # Pinned versions (linux-amd64 builds):
      #   helm        v3.16.4  — stable Helm 3 LTS; chart uses apiVersion: v2.
      #                          Local dev uses v4.1.3 (renders identically on
      #                          all tested assertions); bump pin if Helm 4
      #                          features are ever required.
      #   kubeconform v0.7.0   — validates rendered K8s manifests; matches
      #                          local version.
      #
      # cosign is intentionally NOT installed here.  tests/test_sbom.sh
      # assertion 6 tests the missing-cosign fast-fail path: it uses
      # `if command -v cosign` and SKIPS when cosign is on PATH.  Installing
      # cosign would cause that regression path to be silently un-exercised in
      # CI.  No other test needs a real cosign binary: test_check_updates.sh
      # and test_sbom.sh assertion 7 each use a local shim/stub that does not
      # require the real binary.  The full fetch+verify path (real cosign +
      # GHCR) is covered by the post-merge edge-verify, not the unit harness.
      - name: Install CI tools (helm v3.16.4, kubeconform v0.7.0)
        run: |
          TOOL_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$TOOL_DIR"

          # helm v3.16.4 — linux-amd64
          curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz \
            | tar -xz --strip-components=1 -C "$TOOL_DIR" linux-amd64/helm

          # kubeconform v0.7.0 — linux-amd64
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C "$TOOL_DIR" kubeconform

          chmod +x "$TOOL_DIR/helm" "$TOOL_DIR/kubeconform"

          # Register for subsequent steps (GITHUB_PATH affects steps AFTER this one)
          echo "$TOOL_DIR" >> "$GITHUB_PATH"

          # Smoke-check versions (uses absolute paths since PATH not yet updated)
          "$TOOL_DIR/helm" version --short
          "$TOOL_DIR/kubeconform" -v

      - name: Run make test
        run: make test
