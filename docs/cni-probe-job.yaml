# Lucairn CNI Enforcement Probe
#
# Purpose: Actively verify that the cluster's CNI plugin enforces NetworkPolicy.
# A cluster running stock kindnet (e.g. kind without --cni=calico) or any other
# non-enforcing CNI will return NetworkPolicy objects to `kubectl get networkpolicy`
# yet silently ignore them — leaving the Sandbox-A↔Sandbox-B isolation air-gap
# inert while doctor reports "presence only". This job provides a definitive answer.
#
# What it tests:
#   BLOCKED flow  — lucairn-probe namespace  →  dsa-identity namespace
#                   on port 50053 (sandbox-a gRPC)
#                   Expected: connection REFUSED/TIMEOUT (NetworkPolicy isolates
#                   sandbox-a from arbitrary namespaces)
#
# Probe DNS targets (confirmed from chart-rendered Service metadata):
#   sandbox-a (BLOCKED target): sandbox-a.dsa-identity.svc.cluster.local:50053
#     Source: charts/lucairn/charts/sandbox-a/Chart.yaml name=sandbox-a
#             charts/lucairn/charts/sandbox-a/values.yaml namespace=dsa-identity
#             charts/lucairn/charts/sandbox-a/values.yaml service.grpcPort=50053
#
# Three-way verdict logic (not any-failure=PASS):
#   INCONCLUSIVE — target DNS does NOT resolve (NXDOMAIN / unresolvable).
#                  Cannot verify enforcement. Likely wrong release name, wrong
#                  namespace, or sandbox-a not deployed. Exits NON-ZERO.
#   PASS         — DNS resolves AND connection is refused/timed out.
#                  NetworkPolicy enforcement confirmed. Exits 0.
#   FAIL         — DNS resolves AND connection SUCCEEDS.
#                  CNI is NOT enforcing NetworkPolicy; isolation air-gap is inert.
#                  Exits NON-ZERO.
#
# How to deploy and read:
#   1.  Apply this manifest (creates the probe namespace, RBAC, and Job):
#         kubectl apply -f docs/cni-probe-job.yaml
#
#   2.  Wait for completion (up to 90s):
#         kubectl wait --for=condition=complete -n lucairn-probe \
#           job/lucairn-cni-probe --timeout=90s
#       Note: --for=condition=complete does NOT trigger on a failed Job.
#       If the wait times out, check logs with step 3 and look for FAIL/INCONCLUSIVE.
#
#   3.  Read the result:
#         kubectl logs -n lucairn-probe job/lucairn-cni-probe
#
#   PASS output (CNI is enforcing):
#     [RESOLVE] sandbox-a.dsa-identity.svc.cluster.local resolves — DNS OK
#     [PASS] blocked flow: sandbox-a.dsa-identity.svc.cluster.local:50053 rejected as expected
#     CNI probe: PASS — NetworkPolicy enforcement confirmed
#
#   FAIL output (CNI is NOT enforcing — isolation air-gap is inert):
#     [RESOLVE] sandbox-a.dsa-identity.svc.cluster.local resolves — DNS OK
#     [FAIL] blocked flow: sandbox-a.dsa-identity.svc.cluster.local:50053 is REACHABLE
#            CNI does NOT enforce NetworkPolicy — isolation air-gap is inert.
#     CNI probe: FAIL
#            Install a CNI that supports NetworkPolicy (Calico, Cilium, Weave Net)
#            and re-run this probe before handling production data.
#
#   INCONCLUSIVE output (DNS did not resolve — wrong name/namespace or not deployed):
#     [INCONCLUSIVE] sandbox-a.dsa-identity.svc.cluster.local does NOT resolve
#                    Cannot verify CNI enforcement. Possible causes:
#                      - sandbox-a is not deployed yet (check: kubectl get pod -n dsa-identity)
#                      - Helm release used a non-default namespace (adjust BLOCKED_HOST below)
#                      - Cluster DNS is not functioning
#     CNI probe: INCONCLUSIVE — cannot verify enforcement; see above
#
#   The Job exits non-zero on FAIL or INCONCLUSIVE — CI/CD pipelines can treat a
#   non-zero exit as a gate.
#
# Adjusting for a non-default Helm release namespace:
#   If your Helm install uses a different namespace for sandbox-a, edit the
#   BLOCKED_HOST env var below to match:
#     sandbox-a.<your-namespace>.svc.cluster.local
#   The chart default is namespace=dsa-identity (sandbox-a/values.yaml:namespace).
#
# Clean up after use:
#   kubectl delete namespace lucairn-probe
#   (Deleting the namespace removes the Job, ServiceAccount, and all other
#    namespaced resources created by this manifest in a single step.)
#
# Security note:
#   This probe uses a standard busybox image with netcat (nc) and nslookup.
#   It performs connection-only probes (no data sent, no authentication), then exits.
#   The probe namespace has no access to cluster secrets or PVC storage.
#   Delete the probe namespace after use.
#
---
# Namespace: created first so the namespaced resources below can be applied
# in a single `kubectl apply -f docs/cni-probe-job.yaml` invocation.
apiVersion: v1
kind: Namespace
metadata:
  name: lucairn-probe
  labels:
    app.kubernetes.io/name: lucairn-cni-probe
    app.kubernetes.io/component: cni-enforcement-probe
    app.kubernetes.io/managed-by: lucairn-kit
---
# RBAC: allow the probe pod to run in the lucairn-probe namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lucairn-cni-probe
  namespace: lucairn-probe
  labels:
    app.kubernetes.io/name: lucairn-cni-probe
    app.kubernetes.io/component: cni-enforcement-probe
    app.kubernetes.io/managed-by: lucairn-kit
---
# The Job that runs the actual probe.
apiVersion: batch/v1
kind: Job
metadata:
  name: lucairn-cni-probe
  namespace: lucairn-probe
  labels:
    app.kubernetes.io/name: lucairn-cni-probe
    app.kubernetes.io/component: cni-enforcement-probe
    app.kubernetes.io/managed-by: lucairn-kit
spec:
  # Do not retry on failure — a non-zero exit already conveys the result.
  backoffLimit: 0
  # Clean up after 5 minutes so the namespace can be easily deleted.
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lucairn-cni-probe
    spec:
      serviceAccountName: lucairn-cni-probe
      restartPolicy: Never
      # Run as a non-root user (nobody).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: probe
          # busybox ships nc (netcat) and nslookup — lightweight, no extra dependencies.
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            # BLOCKED target: sandbox-a gRPC service.
            # Chart-rendered DNS: sandbox-a.dsa-identity.svc.cluster.local
            #   Service name  = chart name "sandbox-a"
            #                   (charts/lucairn/charts/sandbox-a/Chart.yaml)
            #   Namespace     = values.yaml:namespace = "dsa-identity"
            #   Port          = values.yaml:service.grpcPort = 50053
            #   Service.yaml  = charts/lucairn/charts/sandbox-a/templates/service.yaml
            # The Lucairn NetworkPolicy should block cross-namespace access to
            # this port from the lucairn-probe namespace.
            - name: BLOCKED_HOST
              value: "sandbox-a.dsa-identity.svc.cluster.local"
            - name: BLOCKED_PORT
              value: "50053"
            # Timeout in seconds for each nc connect attempt (keep short).
            - name: PROBE_TIMEOUT
              value: "5"
          command:
            - /bin/sh
            - -euc
            - |
              RESULT=0

              # --- Step 1: DNS resolution check ---
              # If the target does not resolve, we CANNOT distinguish "CNI blocks it"
              # from "wrong name/namespace/not-deployed". Treat as INCONCLUSIVE and
              # exit non-zero — never print "enforcement confirmed" on an unresolved target.
              if ! nslookup "$BLOCKED_HOST" >/dev/null 2>&1; then
                echo "[INCONCLUSIVE] ${BLOCKED_HOST} does NOT resolve"
                echo "               Cannot verify CNI enforcement. Possible causes:"
                echo "                 - sandbox-a is not deployed yet"
                echo "                   (check: kubectl get pod -n dsa-identity)"
                echo "                 - Helm release used a non-default namespace"
                echo "                   (adjust BLOCKED_HOST in docs/cni-probe-job.yaml)"
                echo "                 - Cluster DNS is not functioning"
                echo "CNI probe: INCONCLUSIVE — cannot verify enforcement; see above"
                exit 1
              fi
              echo "[RESOLVE] ${BLOCKED_HOST} resolves — DNS OK"

              # --- Step 2: Blocked flow connection attempt ---
              # The NetworkPolicy should prevent this namespace from reaching
              # sandbox-a's gRPC port. If nc succeeds, the CNI is NOT enforcing.
              # nc -z: scan (connect) only, send no data.
              # nc -w: connect timeout in seconds.
              # Exit 0 = connection succeeded (FAIL); non-zero = refused/timeout (PASS).
              if nc -z -w "$PROBE_TIMEOUT" "$BLOCKED_HOST" "$BLOCKED_PORT" 2>/dev/null; then
                echo "[FAIL] blocked flow: ${BLOCKED_HOST}:${BLOCKED_PORT} is REACHABLE"
                echo "       CNI does NOT enforce NetworkPolicy — isolation air-gap is inert."
                RESULT=1
              else
                echo "[PASS] blocked flow: ${BLOCKED_HOST}:${BLOCKED_PORT} rejected as expected"
              fi

              # --- Summary ---
              if [ "$RESULT" -eq 0 ]; then
                echo "CNI probe: PASS — NetworkPolicy enforcement confirmed"
              else
                echo "CNI probe: FAIL"
                echo "       Install a CNI that supports NetworkPolicy (Calico, Cilium, Weave Net)"
                echo "       and re-run this probe before handling production data."
              fi

              exit "$RESULT"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
