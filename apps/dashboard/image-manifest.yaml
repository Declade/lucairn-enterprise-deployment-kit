# Lucairn image manifest — the tested set of container image versions
# this kit release was validated against.
#
# Why this file exists:
#   Sim 2 surfaced three coupling bugs between the kit and the container
#   images it pulls:
#
#   1. The kit's customer.env.example shipped `LUCAIRN_IMAGE_TAG=1.0.0` long
#      after the highest published image was `0.3.1`. Pulls failed with
#      `manifest unknown` on every service. (Closed by PR #4.)
#   2. The kit's `config/default-sanitizer.yaml` listed 14 recognizers that
#      the 0.3.1 sanitizer image does not ship; sanitizer crash-looped on
#      `ValueError: Unknown recognizer`. The kit's config tree had drifted
#      ahead of the image-side recognizer registry.
#   3. The gateway image's BYOK forwarding adapter changed shape between
#      0.3.1 and main; older images return 401 from Anthropic native
#      messages despite a byte-identical upstream key.
#
# In each case the root cause is "no artifact pins the kit-version-to-image-
# version contract, so they can drift independently and the operator has
# no way to tell which combination was tested." This manifest is that
# artifact.
#
# What this file does NOT do:
#   - It does not OVERRIDE the env var `LUCAIRN_IMAGE_TAG`. Operators can
#     still pin to whatever tag they want via customer.env or via
#     per-service tag overrides in a compose override file.
#   - It does not pull or verify images directly. `bin/lucairn doctor`
#     reads this manifest and warns when env-resolved tags differ from
#     the pinned set, but never blocks the install.
#
# To update for a new kit release:
#   1. Bump `kit_version` to match `VERSION`.
#   2. Bump `default_lucairn_image_tag` to the new known-good tag.
#   3. Add or update entries in `services:` for any service whose tag is
#      pinned independently (override of the default tag).
#   4. Run `bin/lucairn doctor` against a fresh deploy with the new tag
#      to confirm the manifest is internally consistent.

# Kit release this manifest was tested for. Must match VERSION at the
# repo root. doctor warns when the values diverge.
kit_version: "1.9.2"

# Default tag applied to every dsa-* image unless a per-service override
# exists in `services:` below. Operators set LUCAIRN_IMAGE_TAG in customer.env
# to use a different default; doctor warns when env != this manifest value.
default_lucairn_image_tag: "0.5.2"

# Registry the kit was validated against. doctor warns when env's
# LUCAIRN_IMAGE_REGISTRY differs.
default_lucairn_image_registry: "ghcr.io/declade"

# Per-service tag pins. Each entry overrides default_lucairn_image_tag for
# that specific service. Leave empty (or omit the service entirely) to
# inherit the default.
#
# When proto / signable / canonical-payload contracts change in a way that
# requires a coordinated upgrade across multiple services, those services
# should be pinned together here so an operator pulling the kit cannot
# accidentally mix incompatible versions.
services:
  dsa-audit:
    image_tag: ""    # inherits default
  dsa-id-bridge:
    image_tag: ""
  dsa-sandbox-a:
    image_tag: ""
  dsa-sandbox-b:
    image_tag: ""
  dsa-sanitizer:
    image_tag: ""
    # The sanitizer's recognizer registry must match the kit's
    # config/default-sanitizer.yaml. Bumping the sanitizer tag without
    # syncing config/default-sanitizer.yaml is the Sim 2 F3 failure mode.
    sanitizer_config_path: "config/default-sanitizer.yaml"
    sanitizer_config_compat: "0.5.x"   # version line the config is targeting
  dsa-pii-ml:
    # Phase 7 ML sidecar (Piiranha + GLiNER). Shipped at PR #240 production-
    # path follow-up. The HF revision SHAs the image is built against are
    # baked into the image's own config (verified via the
    # LUCAIRN_PII_ML_PIIRANHA_REVISION + LUCAIRN_PII_ML_GLINER_REVISION env
    # vars in the Helm subchart). The kit's pii-ml.hfRevisions block in
    # charts/lucairn/values.yaml MUST stay in lockstep with these — Sim 2
    # F3-class drift surface.
    #
    # PINNED to 0.5.1 explicitly. The sidecar has an INDEPENDENT release
    # cadence (tied to PR #240 production-path follow-up, not the umbrella
    # cycle). Operators MUST mirror dsa-pii-ml:0.5.1 specifically; bumping
    # LUCAIRN_IMAGE_TAG does NOT cascade to this service.
    # `bin/lucairn doctor --strict` enforces the pin against the recorded
    # digest below.
    image_tag: "0.5.1"
  dsa-veil-witness:
    image_tag: ""
  dsa-gateway:
    image_tag: ""

# Optional images used only when `--profile certification` or
# `--profile dashboard` is activated. These pull from the same registry but
# their tag publication cadence may differ. doctor does not warn on these
# unless the matching profile is selected.
#
# The dashboard ships on an INDEPENDENT release cadence from the dsa-*
# services. Operators MAY override the bundled default by exporting
# LUCAIRN_DASHBOARD_IMAGE_TAG in customer.env; doctor surfaces a warning if
# the env-resolved tag differs from the value pinned here.
optional_services:
  dsa-cert-builder:
    image_tag: ""
  dsa-cert-portal:
    image_tag: ""
  lucairn-dashboard:
    image_tag: "0.8.2"

# -----------------------------------------------------------------------------
# Digest pins (B1 Slice 3 — supply-chain provenance).
#
# Each entry records the exact `@sha256:` content digest the release was built +
# (for the signed Lucairn images) cosign-signed against. This block answers the
# procurement question "are your images digest-pinned and enforced?" WITHOUT
# rewriting compose/helm refs to `@sha256:` — that would break the operator's
# `LUCAIRN_IMAGE_TAG` / per-image-tag override ergonomics. Instead:
#
#   - compose/helm keep their `repository:tag` refs (override-friendly);
#   - `bin/lucairn doctor`           WARNS when an env-resolved tag's CURRENT
#                                    registry digest differs from the recorded
#                                    digest below (today's warn-only posture);
#   - `bin/lucairn doctor --strict`  BLOCKS (non-zero exit) on any such mismatch,
#                                    so a re-pointed / substituted / downgraded
#                                    tag fails the gate. `--strict` is the
#                                    enforcement switch; plain `doctor` never
#                                    blocks on a digest mismatch (back-compat).
#
# A digest mismatch under --strict means the mutable tag no longer points at the
# bytes this kit release was validated + signed against (tag re-point / image
# substitution / accidental downgrade). Resolution needs a registry digest
# resolver on PATH (docker buildx imagetools / crane / skopeo); --strict on a
# host with no resolver HARD-ERRORS (non-zero) — it refuses to report a green
# run it could not verify. (Plain `doctor` with no resolver SKIPS warn-only.)
#
# `signed_artifacts` digests are the SAME values recorded in
# keys/image-digests-<tag>.txt (the cosign-sign + `verify-images` source of
# truth); they are kept in lockstep. `verify-images` proves the SIGNATURE over
# the digest; `doctor --strict` proves the deployed TAG still resolves to that
# digest — complementary checks.
#
# `pending: true` entries have a schema slot but no recorded digest yet (filled
# during the digest-pin ceremony — see OPS.md § "Digest-pin enforcement
# (doctor --strict)"). doctor --strict SKIPS pending entries (warn, never
# block) so a fresh install is never broken by an un-filled slot.
#
# Format per entry:
#   <key>:
#     ref: "<repo>:<tag>"          # the mutable ref operators actually pull
#     digest: "sha256:<64hex>"     # the recorded content digest (or omit if pending)
#     pending: true                # OPTIONAL — schema-only slot, --strict skips
image_digests:
  # --- Signed Lucairn images (13 artifacts; cosign-signed + Rekor-logged;
  # --- digests mirror keys/image-digests-0.5.2.txt). doctor --strict
  # --- ENFORCES these (resolve tag->digest, block on mismatch).
  signed_artifacts:
    # Full 0.5.2 umbrella — all 12 dsa-* republished multi-arch + cosign-signed
    # (GHCR + Rekor) on 2026-06-15; digests mirror keys/image-digests-0.5.2.txt;
    # verify with `lucairn verify-images --tag 0.5.2`. (dsa-pii-ml stays pinned
    # at 0.5.1 — independent release cadence; lucairn-dashboard stays at 0.8.2.)
    dsa-gateway:
      ref: "ghcr.io/declade/dsa-gateway:0.5.2"
      digest: "sha256:e1234bc354dcc7b1dd77cb864a1f90f78f349fb3f15ef36beb25a089c51c1b1c"
    dsa-sanitizer:
      ref: "ghcr.io/declade/dsa-sanitizer:0.5.2"
      digest: "sha256:dc5153abc24e45990f7c75b076f40e4eb0cd93daa77de1429869750f35e4db91"
    dsa-audit:
      ref: "ghcr.io/declade/dsa-audit:0.5.2"
      digest: "sha256:9c54443481b14b2aa492b752cb8fac2a489d066f4bd0d4d80414c7d49ad8f8ff"
    dsa-id-bridge:
      ref: "ghcr.io/declade/dsa-id-bridge:0.5.2"
      digest: "sha256:8664ae4a5870c941a9d64be772fcf0b12e00fd66fc2ba1a5c7c56dd5f8a90b00"
    dsa-sandbox-a:
      ref: "ghcr.io/declade/dsa-sandbox-a:0.5.2"
      digest: "sha256:17a1d884dfe753211c97bdb37835e4048c420518ad54ed62045b6f4ad510027a"
    dsa-sandbox-b:
      ref: "ghcr.io/declade/dsa-sandbox-b:0.5.2"
      digest: "sha256:3095315bf24f96f3d81a3632a77443f03cae093d327f4990359893d42de92e6c"
    dsa-pii-ml:
      # Multi-arch manifest list (linux/amd64 + linux/arm64) published from
      # PR #241's final state (commit 0cb627c, Codex r1 fix-ups). Built on
      # the Hetzner pilot builder (lucairn-multiarch) 2026-06-07. Per-arch
      # manifest digests: amd64=sha256:7201de66279104328a8458478575ea603c00f5de35279be2f782544d41f7fce3,
      # arm64=sha256:6ef424e6ca467c240df622fa37b39bcee7b2aa2a602e2de8e10a405c07e2f09e.
      ref: "ghcr.io/declade/dsa-pii-ml:0.5.1"
      digest: "sha256:5cc46f58db9f0c84f6a8ed9428fe91a2a481ae0c6a3dfa3f02e4a607da80d1cc"
    dsa-veil-witness:
      ref: "ghcr.io/declade/dsa-veil-witness:0.5.2"
      digest: "sha256:2c8d72260b5451049f871b9610977973e7c3ffd4c81dfe82a60d920ffc5b8d81"
    dsa-reid-guard:
      ref: "ghcr.io/declade/dsa-reid-guard:0.5.2"
      digest: "sha256:d46b094209c23b06e94190e7ab5f203a00f7a2b2467f3f94e35efce2f9dcd548"
    dsa-admin:
      ref: "ghcr.io/declade/dsa-admin:0.5.2"
      digest: "sha256:dbfbb5073a5345e33b5b8bd1eb6fc68e315e44f30f6bd2940a0889a97f5ff23f"
    dsa-demo:
      ref: "ghcr.io/declade/dsa-demo:0.5.2"
      digest: "sha256:bc7614790ceabe489eeddfcc289bb336a5533e3ec08717a595a4cf784d837254"
    dsa-ingest:
      ref: "ghcr.io/declade/dsa-ingest:0.5.2"
      digest: "sha256:60d830892ebaa404eab50ea88b2d0b721a3f044296d428ee3d595e05b76b4ead"
    dsa-llm-auditor:
      ref: "ghcr.io/declade/dsa-llm-auditor:0.5.2"
      digest: "sha256:1df9d4af80c0072a37adff36c958e53df5360092bf7e27a5aa400fe1b6e769a7"
    lucairn-dashboard:
      ref: "ghcr.io/declade/lucairn-dashboard:0.8.2"
      digest: "sha256:a586b88991ac5d71cf6523b833462648775b1e97a66cbee67876e9f992f0387e"
  # --- PII-plane runtime (sandbox-a / sandbox-b L3 shield). ollama-identity is
  # --- the load-bearing L3 image and is ALSO digest-pinned in the chart
  # --- (charts/lucairn/charts/sandbox-a/values.yaml ollamaIdentity.image.digest);
  # --- the value here is the SAME multi-arch index digest. The L3 MODEL
  # --- (qwen2.5:7b) is an Ollama model manifest, not an OCI image — its digest
  # --- comes from `ollama pull qwen2.5:7b` at ceremony time, so it is pending.
  pii_plane:
    ollama-identity:
      ref: "ollama/ollama:0.6.2"
      digest: "sha256:74a0929e1e082a09e4fdeef8594b8f4537f661366a04080e600c90ea9f712721"
    qwen2.5-7b-model:
      ref: "ollama://qwen2.5:7b"
      pending: true   # Ollama model digest — fill via `ollama pull qwen2.5:7b` at the digest-pin ceremony
  # --- Self-hosted runtime alternatives (docker-compose.self-hosted.yml). These
  # --- are OPT-IN (the operator selects ONE) and several float a mutable :latest
  # --- or are operator-built; their digest is recorded at the digest-pin
  # --- ceremony for the specific runtime the customer deploys. Pending until
  # --- then; doctor --strict SKIPS pending entries (never blocks a fresh install).
  runtime:
    llama-cpp:
      ref: "ghcr.io/ggerganov/llama.cpp:server"
      pending: true   # mutable :server tag — pin at ceremony to the deployed digest
    vllm:
      ref: "vllm/vllm-openai:latest"
      pending: true   # mutable :latest — pin at ceremony to the deployed digest
    tgi:
      ref: "ghcr.io/huggingface/text-generation-inference:latest"
      pending: true   # mutable :latest — pin at ceremony to the deployed digest
    onnxruntime:
      ref: "ghcr.io/declade/openai-compatible-onnxruntime:latest"
      pending: true   # operator-built adapter image — pin at ceremony
    triton:
      ref: "ghcr.io/declade/openai-compatible-triton:latest"
      pending: true   # operator-built adapter image — pin at ceremony
    runtime:
      ref: "ghcr.io/declade/openai-compatible-runtime:latest"
      pending: true   # operator-built adapter image — pin at ceremony
