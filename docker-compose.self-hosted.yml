# Lucairn self-hosted inference overlay.
#
# Use with the base customer compose:
#   docker compose \
#     -f install/docker-compose.customer.yml \
#     -f install/docker-compose.self-hosted.yml \
#     --env-file install/customer.env \
#     --profile "$MODEL_RUNTIME_PROFILE" \
#     up -d
#
# This overlay replaces the remote Sandbox B dependency with a local Sandbox B
# plus a selectable model runtime. Runtimes should expose an OpenAI-compatible
# HTTP API at MODEL_RUNTIME_URL unless using the ollama profile.

# OBS-08: bound container log growth (disk-fill DoS surface). Mirrors the
# base customer compose anchor. Services defined only in this overlay
# (sandbox-b, redis-ai, ollama, the model-runtime profiles, lucairn-dashboard)
# reference it directly; the gateway/audit/id-bridge/veil-witness overlay
# stubs inherit `logging:` from docker-compose.customer.yml at merge time.
# (Compose anchors do not cross files, so the anchor is redefined here.)
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LUCAIRN_LOG_MAX_SIZE:-50m}"
    max-file: "${LUCAIRN_LOG_MAX_FILE:-5}"

networks:
  dsa-ai:
    driver: bridge
    internal: true
  dsa-bridge-ai:
    driver: bridge
    internal: true
  dsa-audit-ai:
    driver: bridge
    internal: true
  dsa-witness-ai:
    driver: bridge
    internal: true
  dsa-model-runtime:
    driver: bridge
    internal: true
  # Identity-plane L3 model network. SPLIT-KNOWLEDGE INVARIANT: the sanitizer's
  # level-3 deep PII shield must scan RAW identity data, so its model instance
  # (ollama-identity, below) lives on its OWN isolated bridge — never the same
  # net as sandbox-b / the AI-plane inference ollama. This mirrors the Helm
  # chart, which runs a dedicated `ollama-identity` StatefulSet in the identity
  # plane (charts/lucairn/charts/sandbox-a/templates/ollama-identity-*.yaml),
  # separate from sandbox-b's bundled inference ollama
  # (charts/lucairn/charts/sandbox-b/templates/ollama-statefulset.yaml).
  # internal: true — identity-plane isolation, no egress; the L3 model must be
  # pre-staged (see ollama-identity below + INSTALL.md self-hosted section).
  dsa-model-runtime-identity:
    driver: bridge
    internal: true

volumes:
  redis-ai-data:
  ollama-model-store:
  # Dedicated model store for the identity-plane L3 PII-shield ollama. Kept
  # separate from ollama-model-store (the AI-plane inference ollama) so the
  # two model instances never share state — split-knowledge isolation.
  ollama-identity-model-store:

services:
  gateway:
    depends_on:
      sandbox-b:
        condition: service_healthy
    environment:
      INFERENCE_SERVICE_ADDR: "sandbox-b:50054"
      SANDBOX_B_PROXY_URL: "http://sandbox-b:8084"
      SANDBOX_B_INVARIANT_URL: "http://sandbox-b:8084/invariant"
      SANDBOX_B_REMOTE_ENDPOINT: ""
      SANDBOX_B_API_KEY: "${LOCAL_SANDBOX_B_API_KEY:-local-sandbox-b-key}"
    networks:
      - dsa-ai

  audit:
    networks:
      - dsa-audit-ai

  id-bridge:
    networks:
      - dsa-bridge-ai

  veil-witness:
    environment:
      LCR_SANDBOX_B_PUBLIC_KEY: "${LCR_SANDBOX_B_PUBLIC_KEY}"
    networks:
      - dsa-witness-ai

  # L3 reachability for self-hosted installs. The sanitizer's level-3 deep PII
  # shield dials hostname "ollama" (config/default-sanitizer.yaml:91
  # `ollama_url: http://ollama:11434`, fail-CLOSED), but the base customer
  # compose only attaches the sanitizer to its identity nets (dsa-identity +
  # dsa-witness-identity). Append the identity-only L3 net here so the
  # sanitizer can reach the in-cluster L3 model — WITHOUT going through the
  # AI-plane net that sandbox-b uses. On dsa-model-runtime-identity the
  # hostname "ollama" resolves to the ollama-identity service (via its network
  # alias), NOT to the AI-plane inference ollama. The sanitizer is deliberately
  # NOT placed on dsa-model-runtime: that is the whole point — no shared net
  # with sandbox-b, preserving the split-knowledge invariant (the identity
  # plane that sees raw PII is air-gapped from the AI plane). Compose UNIONs
  # networks across overlays, so the sanitizer keeps dsa-identity +
  # dsa-witness-identity (from docker-compose.customer.yml) and gains ONLY
  # dsa-model-runtime-identity here. No sanitizer config change is needed.
  sanitizer:
    networks:
      - dsa-model-runtime-identity

  redis-ai:
    image: redis:7-alpine
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory ${SANDBOX_B_REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis-ai-data:/data
    networks:
      - dsa-ai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: on-failure

  sandbox-b:
    image: "${LUCAIRN_IMAGE_REGISTRY:-ghcr.io/declade}/dsa-sandbox-b:${LUCAIRN_IMAGE_TAG:-0.5.0}"
    logging: *default-logging
    depends_on:
      redis-ai:
        condition: service_healthy
      id-bridge:
        condition: service_healthy
      audit:
        condition: service_healthy
      veil-witness:
        condition: service_healthy
    environment:
      DSA_ENV: "${DSA_ENV:-production}"
      DSA_SERVICE_TOKEN: "${DSA_SERVICE_TOKEN:?DSA_SERVICE_TOKEN is required}"
      SANDBOX_B_GRPC_ADDR: "0.0.0.0:50054"
      SANDBOX_B_HEALTH_ADDR: "0.0.0.0:8084"
      SANDBOX_B_REDIS_URL: "redis://redis-ai:6379"
      SANDBOX_B_VERTICALS_DIR: "/app/verticals"
      SANDBOX_B_WORKERS: "${SANDBOX_B_WORKERS:-4}"
      # Internal isolation-probe target. sandbox-b's boot_safety verifies it
      # can reach sandbox-a via this gRPC address as part of the witness
      # claim chain. Default matches the canonical self-hosted compose layout.
      SANDBOX_A_PROBE_TARGET: "${SANDBOX_A_PROBE_TARGET:-sandbox-a:50053}"
      BRIDGE_ADDR: "id-bridge:50052"
      AUDIT_SERVICE_ADDR: "audit:50051"
      GRPC_TLS_ENABLED: "${GRPC_TLS_ENABLED:-true}"
      DSA_ADMIN_KEY: "${DSA_ADMIN_KEY:?DSA_ADMIN_KEY is required}"
      SANDBOX_B_API_KEYS: "${LOCAL_SANDBOX_B_API_KEY:-local-sandbox-b-key}"
      LCR_ENABLED: "${LCR_ENABLED:-true}"
      LCR_SIGNING_KEY: "${LCR_SANDBOX_B_SIGNING_KEY:?LCR_SANDBOX_B_SIGNING_KEY is required for self-hosted Sandbox B}"
      LCR_WITNESS_ADDR: "veil-witness:50057"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:11434}"
      OPENAI_API_KEY: "${MODEL_RUNTIME_API_KEY:-local-model-runtime}"
      OPENAI_BASE_URL: "${MODEL_RUNTIME_URL:-http://model-runtime:8000/v1}"
      PROOFLOG_ENABLED: "${PROOFLOG_ENABLED:-false}"
      PROOFLOG_SIGNING_KEY: "${PROOFLOG_SIGNING_KEY:-}"
      PROOFLOG_POLICIES: "${PROOFLOG_POLICIES:-model-allowlist}"
    volumes:
      - ../starter-templates:/app/verticals:ro
    networks:
      - dsa-ai
      - dsa-bridge-ai
      - dsa-audit-ai
      - dsa-witness-ai
      - dsa-model-runtime
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: on-failure

  model-runtime:
    profiles: ["llama-cpp"]
    image: "${LLAMA_CPP_IMAGE:-ghcr.io/ggerganov/llama.cpp:server}"
    logging: *default-logging
    command:
      - "-m"
      - "/models/${MODEL_FILE:-model.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--ctx-size"
      - "${MODEL_CONTEXT_WINDOW:-8192}"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      - dsa-model-runtime
    restart: on-failure

  model-runtime-vllm:
    profiles: ["vllm"]
    image: "${VLLM_IMAGE:-vllm/vllm-openai:latest}"
    logging: *default-logging
    command:
      - "--model"
      - "/models/${MODEL_PATH:-.}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  model-runtime-tgi:
    profiles: ["tgi"]
    image: "${TGI_IMAGE:-ghcr.io/huggingface/text-generation-inference:latest}"
    logging: *default-logging
    command:
      - "--model-id"
      - "/models/${MODEL_PATH:-.}"
      - "--port"
      - "8000"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  ollama:
    profiles: ["ollama"]
    # Default pinned to the recorded manifest digest
    # (image-manifest.yaml → pii_plane.ollama-identity →
    # ollama/ollama:0.6.2@sha256:74a0929…) so the DEPLOYED image matches the
    # pinned-and-verified manifest ref (run-vs-verify parity): an operator who
    # leaves OLLAMA_IMAGE unset/empty runs the byte-identical digest that
    # `bin/lucairn doctor --strict` verifies in the manifest. The OLLAMA_IMAGE
    # override fail-closed handling (floating/unpinned override → red) lives in
    # `bin/lucairn doctor --strict` (PR #60); doctor resolves the MANIFEST ref,
    # not this compose default, so the pin does not itself change --strict's
    # verdict.
    image: "${OLLAMA_IMAGE:-ollama/ollama:0.6.2@sha256:74a0929e1e082a09e4fdeef8594b8f4537f661366a04080e600c90ea9f712721}"
    logging: *default-logging
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama-model-store:/root/.ollama
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      - dsa-model-runtime
    restart: on-failure

  # ── Identity-plane L3 PII-shield model (ollama-identity) ────────────
  # Dedicated ollama instance for the sanitizer's level-3 deep PII shield
  # (qwen2.5:7b). It is DELIBERATELY separate from the `ollama` service
  # above (the AI-plane inference runtime used by sandbox-b): the L3 shield
  # scans RAW identity data, so per the split-knowledge invariant it must
  # run on its own identity-only network with NO shared net to the AI plane.
  # This mirrors the Helm chart's separate `ollama-identity` StatefulSet
  # (charts/lucairn/charts/sandbox-a/templates/ollama-identity-statefulset.yaml).
  #
  # ALWAYS-ON in the self-hosted overlay (NOT behind `profiles: ["ollama"]`):
  # the sanitizer's L3 is fail-CLOSED-required (LUCAIRN_L3_REQUIRED defaults
  # to "true"), so it must reach a model regardless of which inference runtime
  # profile (ollama / vllm / tgi / ...) the operator picks for sandbox-b.
  #
  # PRE-STAGE the L3 model (qwen2.5:7b) ONCE after the stack is up. This
  # service is on the internal-only `dsa-model-runtime-identity` net (no
  # egress), so it CANNOT pull the model itself — `docker compose exec
  # ollama-identity ollama pull` runs inside this egress-less net namespace and
  # fails. Instead, stage qwen2.5:7b into this service's named volume
  # (ollama-identity-model-store) via a one-time throwaway egress-enabled
  # ollama, then restart this service to load it. See INSTALL.md
  # § "Pre-stage the L3 deep PII-shield model" for the exact procedure.
  ollama-identity:
    # Default pinned to the recorded manifest digest (see the AI-plane `ollama`
    # service above) so the deployed image matches the pinned-and-verified
    # manifest ref (run-vs-verify parity) when OLLAMA_IMAGE is unset/empty. The
    # override fail-closed handling lives in `bin/lucairn doctor --strict`
    # (PR #60); the pin does not itself change --strict's verdict.
    image: "${OLLAMA_IMAGE:-ollama/ollama:0.6.2@sha256:74a0929e1e082a09e4fdeef8594b8f4537f661366a04080e600c90ea9f712721}"
    logging: *default-logging
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      # Keep the L3 model resident so the fail-CLOSED L3 block never fires on a
      # cold-start hiccup mid-request. Mirrors the Helm ollama-identity
      # OLLAMA_KEEP_ALIVE=-1 (charts/.../ollama-identity-statefulset.yaml:45-46).
      OLLAMA_KEEP_ALIVE: "${OLLAMA_IDENTITY_KEEP_ALIVE:--1}"
    volumes:
      - ollama-identity-model-store:/root/.ollama
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime-identity:
        aliases:
          # The sanitizer dials hostname "ollama" (its unchanged DSA-owned
          # config). On the identity-only net that alias resolves HERE — to
          # the L3 identity model — NOT to the AI-plane inference ollama.
          - ollama
    restart: on-failure

  model-runtime-onnxruntime:
    profiles: ["onnxruntime"]
    image: "${ONNXRUNTIME_OPENAI_IMAGE:-ghcr.io/declade/openai-compatible-onnxruntime:latest}"
    logging: *default-logging
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  model-runtime-triton:
    profiles: ["triton"]
    image: "${TRITON_OPENAI_IMAGE:-ghcr.io/declade/openai-compatible-triton:latest}"
    logging: *default-logging
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  model-runtime-custom:
    profiles: ["custom-runtime"]
    image: "${MODEL_RUNTIME_IMAGE:-ghcr.io/declade/openai-compatible-runtime:latest}"
    logging: *default-logging
    command: ${MODEL_RUNTIME_COMMAND:-}
    environment:
      MODEL_DIR: "/models"
      MODEL_NAME: "${MODEL_NAME:-customer-model}"
      MODEL_FILE: "${MODEL_FILE:-}"
      MODEL_PATH: "${MODEL_PATH:-}"
      MODEL_CONTEXT_WINDOW: "${MODEL_CONTEXT_WINDOW:-8192}"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  # ── Lucairn Enterprise Dashboard (self-hosted) ──────────────────
  # Mirror of the dashboard block in docker-compose.customer.yml. Same
  # OPT-IN model: `--profile dashboard`. Self-hosted installs share the
  # identical dashboard binary + env var contract; the only difference is
  # which compose file the operator started from.
  lucairn-dashboard:
    profiles: ["dashboard"]
    image: "${LUCAIRN_IMAGE_REGISTRY:-ghcr.io/declade}/lucairn-dashboard:${LUCAIRN_DASHBOARD_IMAGE_TAG:-0.8.2}"
    logging: *default-logging
    restart: unless-stopped
    environment:
      LUCAIRN_DASHBOARD_LISTEN_ADDR: "${LUCAIRN_DASHBOARD_LISTEN_ADDR:-0.0.0.0:8443}"
      LUCAIRN_DASHBOARD_BOOTSTRAP_EMAIL: "${LUCAIRN_DASHBOARD_BOOTSTRAP_EMAIL:-admin@lucairn.local}"
      # Compose v2 evaluates ${VAR:?...} at config-load time across ALL
      # service definitions — `profiles:` does NOT scope env interpolation.
      # Using `:?` here would block `docker compose up -d` (no dashboard
      # profile) on a stock kit install. The dashboard binary itself
      # fail-fasts at startup if BootstrapPassword is empty (see
      # apps/dashboard/internal/config/config.go:179-180), so security
      # regression is impossible — the dashboard container only starts
      # when the profile is explicitly activated, and refuses to boot
      # with an unset password.
      LUCAIRN_DASHBOARD_BOOTSTRAP_PASSWORD: "${LUCAIRN_DASHBOARD_BOOTSTRAP_PASSWORD:-}"
      LUCAIRN_DASHBOARD_SESSION_SECRET: "${LUCAIRN_DASHBOARD_SESSION_SECRET:-}"
      LUCAIRN_DASHBOARD_OIDC_ENABLED: "${LUCAIRN_DASHBOARD_OIDC_ENABLED:-false}"
      LUCAIRN_DASHBOARD_OIDC_ISSUER_URL: "${LUCAIRN_DASHBOARD_OIDC_ISSUER_URL:-}"
      LUCAIRN_DASHBOARD_OIDC_CLIENT_ID: "${LUCAIRN_DASHBOARD_OIDC_CLIENT_ID:-}"
      LUCAIRN_DASHBOARD_OIDC_CLIENT_SECRET: "${LUCAIRN_DASHBOARD_OIDC_CLIENT_SECRET:-}"
      LUCAIRN_DASHBOARD_OIDC_ADMIN_GROUP: "${LUCAIRN_DASHBOARD_OIDC_ADMIN_GROUP:-}"
      LUCAIRN_DASHBOARD_OIDC_VIEWER_GROUP: "${LUCAIRN_DASHBOARD_OIDC_VIEWER_GROUP:-}"
      LUCAIRN_DASHBOARD_OIDC_GROUPS_CLAIM: "${LUCAIRN_DASHBOARD_OIDC_GROUPS_CLAIM:-groups}"
      LUCAIRN_DASHBOARD_OIDC_PUBLIC_URL: "${LUCAIRN_DASHBOARD_OIDC_PUBLIC_URL:-}"
      LUCAIRN_DASHBOARD_OIDC_CALLBACK_URL: "${LUCAIRN_DASHBOARD_OIDC_CALLBACK_URL:-}"
      # Slice 3 cert surface: cert browser + inspector + validator.
      # Dashboard 0.8.2 enables the cert browser by default — see the
      # rationale in docker-compose.customer.yml. Operators can pin a
      # dedicated read-only role by overriding LUCAIRN_DASHBOARD_AUDIT_DB_URL.
      LUCAIRN_DASHBOARD_AUDIT_DB_URL: "${LUCAIRN_DASHBOARD_AUDIT_DB_URL:-postgres://veil_app:${VEIL_APP_PASSWORD:?VEIL_APP_PASSWORD must be set (no weak default; see customer.env)}@postgres-veil:5432/veil?sslmode=${POSTGRES_SSLMODE:-disable}}"
      LUCAIRN_DASHBOARD_WITNESS_ENDPOINT: "${LUCAIRN_DASHBOARD_WITNESS_ENDPOINT:-veil-witness:50058}"
      LUCAIRN_DASHBOARD_WITNESS_TLS_ENABLED: "${LUCAIRN_DASHBOARD_WITNESS_TLS_ENABLED:-false}"
      # Slice 4: server-health overview + Grafana embedding plumbing.
      LUCAIRN_DASHBOARD_HEALTH_SERVICES: "${LUCAIRN_DASHBOARD_HEALTH_SERVICES:-}"
      LUCAIRN_DASHBOARD_HEALTH_POLL_INTERVAL_SECONDS: "${LUCAIRN_DASHBOARD_HEALTH_POLL_INTERVAL_SECONDS:-10}"
      LUCAIRN_DASHBOARD_GRAFANA_URL: "${LUCAIRN_DASHBOARD_GRAFANA_URL:-}"
      LUCAIRN_DASHBOARD_GRAFANA_JWT_SECRET: "${LUCAIRN_DASHBOARD_GRAFANA_JWT_SECRET:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_GATEWAY_THROUGHPUT_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_GATEWAY_THROUGHPUT_UID:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_SANITIZER_HIT_RATES_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_SANITIZER_HIT_RATES_UID:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_WITNESS_VERIFY_RATE_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_WITNESS_VERIFY_RATE_UID:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_AUDIT_LOG_VOLUME_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_AUDIT_LOG_VOLUME_UID:-}"
      # Slice 5: API key management. Both must be set together.
      LUCAIRN_DASHBOARD_GATEWAY_ADMIN_URL: "${LUCAIRN_DASHBOARD_GATEWAY_ADMIN_URL:-}"
      LUCAIRN_DASHBOARD_GATEWAY_ADMIN_TOKEN: "${LUCAIRN_DASHBOARD_GATEWAY_ADMIN_TOKEN:-}"
      # Slice 6: audit log browser. The env var name is DISTINCT from
      # LUCAIRN_DASHBOARD_AUDIT_DB_URL (Slice 3); this one points at
      # postgres-audit (event log). Empty = /audit renders the "not
      # configured" explainer.
      LUCAIRN_DASHBOARD_AUDIT_LOG_DB_URL: "${LUCAIRN_DASHBOARD_AUDIT_LOG_DB_URL:-}"
      LUCAIRN_DASHBOARD_AUDIT_LOG_SAVED_FILTERS_DB_URL: "${LUCAIRN_DASHBOARD_AUDIT_LOG_SAVED_FILTERS_DB_URL:-}"
      # Compliance PDF export. Admin-only + always-on surface.
      LUCAIRN_DASHBOARD_COMPLIANCE_MAX_WINDOW_DAYS: "${LUCAIRN_DASHBOARD_COMPLIANCE_MAX_WINDOW_DAYS:-365}"
      LUCAIRN_DASHBOARD_COMPLIANCE_DEFAULT_CUSTOMER_NAME: "${LUCAIRN_DASHBOARD_COMPLIANCE_DEFAULT_CUSTOMER_NAME:-}"
      # Dashboard 0.8.0 — demo mode (boot-time store swap) + per-user
      # demo-toggle (cookie-scoped header switch on home page). Both OFF
      # by default. See customer.env.example for full documentation.
      LUCAIRN_DASHBOARD_DEMO_MODE: "${LUCAIRN_DASHBOARD_DEMO_MODE:-}"
      LUCAIRN_DASHBOARD_DEMO_TOGGLE_ENABLED: "${LUCAIRN_DASHBOARD_DEMO_TOGGLE_ENABLED:-}"
    ports:
      - "127.0.0.1:8443:8443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

