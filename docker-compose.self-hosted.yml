# Lucairn self-hosted inference overlay.
#
# Use with the base customer compose:
#   docker compose \
#     -f install/docker-compose.customer.yml \
#     -f install/docker-compose.self-hosted.yml \
#     --env-file install/customer.env \
#     --profile "$MODEL_RUNTIME_PROFILE" \
#     up -d
#
# This overlay replaces the remote Sandbox B dependency with a local Sandbox B
# plus a selectable model runtime. Runtimes should expose an OpenAI-compatible
# HTTP API at MODEL_RUNTIME_URL unless using the ollama profile.

networks:
  dsa-ai:
    driver: bridge
    internal: true
  dsa-bridge-ai:
    driver: bridge
    internal: true
  dsa-audit-ai:
    driver: bridge
    internal: true
  dsa-witness-ai:
    driver: bridge
    internal: true
  dsa-model-runtime:
    driver: bridge
    internal: true

volumes:
  redis-ai-data:
  ollama-model-store:

services:
  gateway:
    depends_on:
      sandbox-b:
        condition: service_healthy
    environment:
      INFERENCE_SERVICE_ADDR: "sandbox-b:50054"
      SANDBOX_B_PROXY_URL: "http://sandbox-b:8084"
      SANDBOX_B_INVARIANT_URL: "http://sandbox-b:8084/invariant"
      SANDBOX_B_REMOTE_ENDPOINT: ""
      SANDBOX_B_API_KEY: "${LOCAL_SANDBOX_B_API_KEY:-local-sandbox-b-key}"
    networks:
      - dsa-ai

  audit:
    networks:
      - dsa-audit-ai

  id-bridge:
    networks:
      - dsa-bridge-ai

  veil-witness:
    environment:
      VEIL_SANDBOX_B_PUBLIC_KEY: "${VEIL_SANDBOX_B_PUBLIC_KEY}"
    networks:
      - dsa-witness-ai

  redis-ai:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory ${SANDBOX_B_REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis-ai-data:/data
    networks:
      - dsa-ai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: on-failure

  sandbox-b:
    image: "${LUCAIRN_IMAGE_REGISTRY:-ghcr.io/declade}/dsa-sandbox-b:${LUCAIRN_IMAGE_TAG:-0.4.0}"
    depends_on:
      redis-ai:
        condition: service_healthy
      id-bridge:
        condition: service_healthy
      audit:
        condition: service_healthy
      veil-witness:
        condition: service_healthy
    environment:
      DSA_ENV: "${DSA_ENV:-production}"
      DSA_SERVICE_TOKEN: "${DSA_SERVICE_TOKEN:?DSA_SERVICE_TOKEN is required}"
      SANDBOX_B_GRPC_ADDR: "0.0.0.0:50054"
      SANDBOX_B_HEALTH_ADDR: "0.0.0.0:8084"
      SANDBOX_B_REDIS_URL: "redis://redis-ai:6379"
      SANDBOX_B_VERTICALS_DIR: "/app/verticals"
      SANDBOX_B_WORKERS: "${SANDBOX_B_WORKERS:-4}"
      BRIDGE_ADDR: "id-bridge:50052"
      AUDIT_SERVICE_ADDR: "audit:50051"
      GRPC_TLS_ENABLED: "${GRPC_TLS_ENABLED:-true}"
      DSA_ADMIN_KEY: "${DSA_ADMIN_KEY:?DSA_ADMIN_KEY is required}"
      SANDBOX_B_API_KEYS: "${LOCAL_SANDBOX_B_API_KEY:-local-sandbox-b-key}"
      VEIL_ENABLED: "${VEIL_ENABLED:-true}"
      VEIL_SIGNING_KEY: "${VEIL_SANDBOX_B_SIGNING_KEY:?VEIL_SANDBOX_B_SIGNING_KEY is required for self-hosted Sandbox B}"
      VEIL_WITNESS_ADDR: "veil-witness:50057"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:11434}"
      OPENAI_API_KEY: "${MODEL_RUNTIME_API_KEY:-local-model-runtime}"
      OPENAI_BASE_URL: "${MODEL_RUNTIME_URL:-http://model-runtime:8000/v1}"
      PROOFLOG_ENABLED: "${PROOFLOG_ENABLED:-false}"
      PROOFLOG_SIGNING_KEY: "${PROOFLOG_SIGNING_KEY:-}"
      PROOFLOG_POLICIES: "${PROOFLOG_POLICIES:-model-allowlist}"
    volumes:
      - ../starter-templates:/app/verticals:ro
    networks:
      - dsa-ai
      - dsa-bridge-ai
      - dsa-audit-ai
      - dsa-witness-ai
      - dsa-model-runtime
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: on-failure

  model-runtime:
    profiles: ["llama-cpp"]
    image: "${LLAMA_CPP_IMAGE:-ghcr.io/ggerganov/llama.cpp:server}"
    command:
      - "-m"
      - "/models/${MODEL_FILE:-model.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--ctx-size"
      - "${MODEL_CONTEXT_WINDOW:-8192}"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      - dsa-model-runtime
    restart: on-failure

  model-runtime-vllm:
    profiles: ["vllm"]
    image: "${VLLM_IMAGE:-vllm/vllm-openai:latest}"
    command:
      - "--model"
      - "/models/${MODEL_PATH:-.}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  model-runtime-tgi:
    profiles: ["tgi"]
    image: "${TGI_IMAGE:-ghcr.io/huggingface/text-generation-inference:latest}"
    command:
      - "--model-id"
      - "/models/${MODEL_PATH:-.}"
      - "--port"
      - "8000"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  ollama:
    profiles: ["ollama"]
    image: "${OLLAMA_IMAGE:-ollama/ollama:latest}"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama-model-store:/root/.ollama
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      - dsa-model-runtime
    restart: on-failure

  model-runtime-onnxruntime:
    profiles: ["onnxruntime"]
    image: "${ONNXRUNTIME_OPENAI_IMAGE:-ghcr.io/declade/openai-compatible-onnxruntime:latest}"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  model-runtime-triton:
    profiles: ["triton"]
    image: "${TRITON_OPENAI_IMAGE:-ghcr.io/declade/openai-compatible-triton:latest}"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  model-runtime-custom:
    profiles: ["custom-runtime"]
    image: "${MODEL_RUNTIME_IMAGE:-ghcr.io/declade/openai-compatible-runtime:latest}"
    command: ${MODEL_RUNTIME_COMMAND:-}
    environment:
      MODEL_DIR: "/models"
      MODEL_NAME: "${MODEL_NAME:-customer-model}"
      MODEL_FILE: "${MODEL_FILE:-}"
      MODEL_PATH: "${MODEL_PATH:-}"
      MODEL_CONTEXT_WINDOW: "${MODEL_CONTEXT_WINDOW:-8192}"
    volumes:
      - ${LUCAIRN_MODEL_DIR:-../models}:/models:ro
    networks:
      dsa-model-runtime:
        aliases:
          - model-runtime
    restart: on-failure

  # ── Lucairn Enterprise Dashboard (self-hosted) ──────────────────
  # Mirror of the dashboard block in docker-compose.customer.yml. Same
  # OPT-IN model: `--profile dashboard`. Self-hosted installs share the
  # identical dashboard binary + env var contract; the only difference is
  # which compose file the operator started from.
  lucairn-dashboard:
    profiles: ["dashboard"]
    image: "${LUCAIRN_IMAGE_REGISTRY:-ghcr.io/declade}/lucairn-dashboard:${LUCAIRN_DASHBOARD_IMAGE_TAG:-0.8.1}"
    restart: unless-stopped
    environment:
      LUCAIRN_DASHBOARD_LISTEN_ADDR: "${LUCAIRN_DASHBOARD_LISTEN_ADDR:-0.0.0.0:8443}"
      LUCAIRN_DASHBOARD_BOOTSTRAP_EMAIL: "${LUCAIRN_DASHBOARD_BOOTSTRAP_EMAIL:-admin@lucairn.local}"
      # Compose v2 evaluates ${VAR:?...} at config-load time across ALL
      # service definitions — `profiles:` does NOT scope env interpolation.
      # Using `:?` here would block `docker compose up -d` (no dashboard
      # profile) on a stock kit install. The dashboard binary itself
      # fail-fasts at startup if BootstrapPassword is empty (see
      # apps/dashboard/internal/config/config.go:179-180), so security
      # regression is impossible — the dashboard container only starts
      # when the profile is explicitly activated, and refuses to boot
      # with an unset password.
      LUCAIRN_DASHBOARD_BOOTSTRAP_PASSWORD: "${LUCAIRN_DASHBOARD_BOOTSTRAP_PASSWORD:-}"
      LUCAIRN_DASHBOARD_SESSION_SECRET: "${LUCAIRN_DASHBOARD_SESSION_SECRET:-}"
      LUCAIRN_DASHBOARD_OIDC_ENABLED: "${LUCAIRN_DASHBOARD_OIDC_ENABLED:-false}"
      LUCAIRN_DASHBOARD_OIDC_ISSUER_URL: "${LUCAIRN_DASHBOARD_OIDC_ISSUER_URL:-}"
      LUCAIRN_DASHBOARD_OIDC_CLIENT_ID: "${LUCAIRN_DASHBOARD_OIDC_CLIENT_ID:-}"
      LUCAIRN_DASHBOARD_OIDC_CLIENT_SECRET: "${LUCAIRN_DASHBOARD_OIDC_CLIENT_SECRET:-}"
      LUCAIRN_DASHBOARD_OIDC_ADMIN_GROUP: "${LUCAIRN_DASHBOARD_OIDC_ADMIN_GROUP:-}"
      LUCAIRN_DASHBOARD_OIDC_VIEWER_GROUP: "${LUCAIRN_DASHBOARD_OIDC_VIEWER_GROUP:-}"
      LUCAIRN_DASHBOARD_OIDC_GROUPS_CLAIM: "${LUCAIRN_DASHBOARD_OIDC_GROUPS_CLAIM:-groups}"
      LUCAIRN_DASHBOARD_OIDC_PUBLIC_URL: "${LUCAIRN_DASHBOARD_OIDC_PUBLIC_URL:-}"
      LUCAIRN_DASHBOARD_OIDC_CALLBACK_URL: "${LUCAIRN_DASHBOARD_OIDC_CALLBACK_URL:-}"
      # Slice 3 cert surface: cert browser + inspector + validator.
      LUCAIRN_DASHBOARD_AUDIT_DB_URL: "${LUCAIRN_DASHBOARD_AUDIT_DB_URL:-}"
      LUCAIRN_DASHBOARD_WITNESS_ENDPOINT: "${LUCAIRN_DASHBOARD_WITNESS_ENDPOINT:-veil-witness:50058}"
      LUCAIRN_DASHBOARD_WITNESS_TLS_ENABLED: "${LUCAIRN_DASHBOARD_WITNESS_TLS_ENABLED:-false}"
      # Slice 4: server-health overview + Grafana embedding plumbing.
      LUCAIRN_DASHBOARD_HEALTH_SERVICES: "${LUCAIRN_DASHBOARD_HEALTH_SERVICES:-}"
      LUCAIRN_DASHBOARD_HEALTH_POLL_INTERVAL_SECONDS: "${LUCAIRN_DASHBOARD_HEALTH_POLL_INTERVAL_SECONDS:-10}"
      LUCAIRN_DASHBOARD_GRAFANA_URL: "${LUCAIRN_DASHBOARD_GRAFANA_URL:-}"
      LUCAIRN_DASHBOARD_GRAFANA_JWT_SECRET: "${LUCAIRN_DASHBOARD_GRAFANA_JWT_SECRET:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_GATEWAY_THROUGHPUT_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_GATEWAY_THROUGHPUT_UID:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_SANITIZER_HIT_RATES_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_SANITIZER_HIT_RATES_UID:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_WITNESS_VERIFY_RATE_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_WITNESS_VERIFY_RATE_UID:-}"
      LUCAIRN_DASHBOARD_GRAFANA_PANEL_AUDIT_LOG_VOLUME_UID: "${LUCAIRN_DASHBOARD_GRAFANA_PANEL_AUDIT_LOG_VOLUME_UID:-}"
      # Slice 5: API key management. Both must be set together.
      LUCAIRN_DASHBOARD_GATEWAY_ADMIN_URL: "${LUCAIRN_DASHBOARD_GATEWAY_ADMIN_URL:-}"
      LUCAIRN_DASHBOARD_GATEWAY_ADMIN_TOKEN: "${LUCAIRN_DASHBOARD_GATEWAY_ADMIN_TOKEN:-}"
      # Slice 6: audit log browser. The env var name is DISTINCT from
      # LUCAIRN_DASHBOARD_AUDIT_DB_URL (Slice 3); this one points at
      # postgres-audit (event log). Empty = /audit renders the "not
      # configured" explainer.
      LUCAIRN_DASHBOARD_AUDIT_LOG_DB_URL: "${LUCAIRN_DASHBOARD_AUDIT_LOG_DB_URL:-}"
      LUCAIRN_DASHBOARD_AUDIT_LOG_SAVED_FILTERS_DB_URL: "${LUCAIRN_DASHBOARD_AUDIT_LOG_SAVED_FILTERS_DB_URL:-}"
      # Compliance PDF export. Admin-only + always-on surface.
      LUCAIRN_DASHBOARD_COMPLIANCE_MAX_WINDOW_DAYS: "${LUCAIRN_DASHBOARD_COMPLIANCE_MAX_WINDOW_DAYS:-365}"
      LUCAIRN_DASHBOARD_COMPLIANCE_DEFAULT_CUSTOMER_NAME: "${LUCAIRN_DASHBOARD_COMPLIANCE_DEFAULT_CUSTOMER_NAME:-}"
      # Dashboard 0.8.0 — demo mode (boot-time store swap) + per-user
      # demo-toggle (cookie-scoped header switch on home page). Both OFF
      # by default. See customer.env.example for full documentation.
      LUCAIRN_DASHBOARD_DEMO_MODE: "${LUCAIRN_DASHBOARD_DEMO_MODE:-}"
      LUCAIRN_DASHBOARD_DEMO_TOGGLE_ENABLED: "${LUCAIRN_DASHBOARD_DEMO_TOGGLE_ENABLED:-}"
    ports:
      - "127.0.0.1:8443:8443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

