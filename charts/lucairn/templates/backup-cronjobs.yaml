{{- /*
  WS-2 / HA-01 — automated offsite compliance-DB backups.

  One CronJob per compliance database (audit / id-bridge / veil-witness).
  Each job:
    1. pg_dump -Fc the source DB (logical custom-format dump),
    2. client-side encrypt the dump with `age` (recipient from a Secret) so
       the bucket NEVER holds plaintext compliance data,
    3. upload the encrypted artifact to the configured S3-compatible bucket,
    4. prune objects older than backup.retentionDays.

  Gated by backup.enabled (default OFF). Each per-DB CronJob ALSO renders only
  when its source subchart is enabled AND bundles its own Postgres
  (postgresql.enabled) — an external/customer-managed Postgres
  (postgresql.enabled=false) has no in-cluster pod/Secret to dump and is the
  operator's own backup responsibility (documented in OPS.md).

  Half-config (enabled without bucket / age recipient) fails fast via
  validators.backupHalfConfig in _validators.tpl.

  Cross-namespace note: each CronJob runs in its source DB's namespace
  (dsa-audit / dsa-bridge / dsa-witness) so it can reach the Postgres Service
  and read the per-chart credentials Secret (POSTGRES_PASSWORD) without
  cross-namespace Secret copies. S3 creds + age recipient Secrets must exist in
  EACH of those namespaces (OPS.md documents the pre-create step).
*/ -}}
{{- $backup := (default dict .Values.backup) -}}
{{- if $backup.enabled -}}
{{- $s3 := (default dict $backup.s3) -}}
{{- $enc := (default dict $backup.encryption) -}}
{{- $recRef := (default dict $enc.recipientSecretRef) -}}
{{- $akRef := (default dict $s3.accessKeySecretRef) -}}
{{- $skRef := (default dict $s3.secretKeySecretRef) -}}
{{- $img := (default dict $backup.image) -}}
{{- /* The three compliance DBs. service/secret names follow the subchart
       convention `<chart>-postgresql` / `<chart>-credentials`; db + user come
       from each subchart's postgresql block. valuesKey is how the subchart is
       keyed in the umbrella .Values (hyphenated for id-bridge). */ -}}
{{- $dbs := list
  (dict "name" "audit"        "valuesKey" "audit"        "defaultNs" "dsa-audit"   "defaultUser" "dsa"  "defaultDb" "audit")
  (dict "name" "id-bridge"    "valuesKey" "id-bridge"    "defaultNs" "dsa-bridge"  "defaultUser" "dsa"  "defaultDb" "bridge")
  (dict "name" "veil-witness" "valuesKey" "veil-witness" "defaultNs" "dsa-witness" "defaultUser" "veil" "defaultDb" "veil")
-}}
{{- range $db := $dbs -}}
{{- $sub := (default dict (index $.Values $db.valuesKey)) -}}
{{- /* Default-enabled subcharts: treat missing `enabled` as true (matches the
       umbrella default in values.yaml). */ -}}
{{- $subEnabled := true -}}
{{- if hasKey $sub "enabled" -}}{{- $subEnabled = $sub.enabled -}}{{- end -}}
{{- $pg := (default dict $sub.postgresql) -}}
{{- /* postgresql.enabled defaults true in every compliance subchart. */ -}}
{{- $pgEnabled := true -}}
{{- if hasKey $pg "enabled" -}}{{- $pgEnabled = $pg.enabled -}}{{- end -}}
{{- if and $subEnabled $pgEnabled -}}
{{- $ns := (default $db.defaultNs $sub.namespace) -}}
{{- $user := (default $db.defaultUser $pg.user) -}}
{{- $database := (default $db.defaultDb $pg.database) -}}
{{- $svc := printf "%s-postgresql" $db.name -}}
{{- $credSecret := printf "%s-credentials" $db.name -}}
{{- /* Every rendered backup job targets this chart's bundled PostgreSQL
       Service. The bundled server has no TLS listener, so it must not inherit
       global.postgresqlSslmode, which is reserved for an explicitly selected
       external PostgreSQL target. External targets deliberately render no
       in-cluster backup job (see the pgEnabled gate above). */ -}}
{{- $sslmode := "disable" }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lucairn-backup-{{ $db.name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: lucairn-backup
    app.kubernetes.io/component: compliance-db-backup
    app.kubernetes.io/part-of: dsa
    lucairn.eu/compliance-db: {{ $db.name }}
spec:
  schedule: {{ $backup.schedule | quote }}
  concurrencyPolicy: {{ default "Forbid" $backup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ default 3 $backup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ default 3 $backup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ default 2 $backup.backoffLimit }}
      activeDeadlineSeconds: {{ default 3600 $backup.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: lucairn-backup
            app.kubernetes.io/component: compliance-db-backup
            lucairn.eu/compliance-db: {{ $db.name }}
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          {{- with (default dict $.Values.global).imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /* installToolsAtRuntime defaults true. Resolve via hasKey — NOT
                 Sprig `default` — because `default true false` returns true
                 (Sprig treats the boolean false as "empty"), which would make
                 installToolsAtRuntime=false silently still render the root
                 initContainer. */ -}}
          {{- $installTools := true -}}
          {{- if hasKey $img "installToolsAtRuntime" -}}{{- $installTools = $img.installToolsAtRuntime -}}{{- end -}}
          {{- if $installTools }}
          # The default image (postgres:16-alpine) ships pg_dump/pg_restore but
          # NOT age or aws. `apk add` writes to root-owned paths (/lib/apk/db,
          # /usr/bin, /var/cache/apk) and CANNOT run as uid 65534 — so the
          # runtime tool install runs in a root initContainer that drops the
          # binaries into a shared emptyDir mounted at /opt/lucairn-tools/bin,
          # which the non-root main container puts on PATH. The main container
          # itself never runs as root. Air-gapped sites that pre-bake age + aws
          # into the image set installToolsAtRuntime=false and skip this entirely.
          initContainers:
            - name: install-tools
              image: "{{ default "postgres" $img.repository }}:{{ default "16-alpine" $img.tag }}"
              imagePullPolicy: {{ default "IfNotPresent" $img.pullPolicy }}
              securityContext:
                # apk needs root to write to /usr/bin etc; this is the ONLY
                # privileged step and it touches no compliance data.
                runAsNonRoot: false
                runAsUser: 0
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  echo "backup(init): installing age + aws-cli into shared volume ..."
                  apk add --no-cache age aws-cli >/dev/null
                  mkdir -p /opt/lucairn-tools/bin
                  for b in age age-keygen aws; do
                    if command -v "$b" >/dev/null 2>&1; then
                      cp -f "$(command -v "$b")" /opt/lucairn-tools/bin/
                    fi
                  done
                  # aws-cli on alpine is a python package whose `aws` entrypoint
                  # imports the awscli module from site-packages; copying only
                  # the launcher would break it. Symlink the whole prefix is
                  # unreliable across images, so fall back to a thin wrapper that
                  # re-execs the system aws if it is still present at run time.
                  if [ ! -x /opt/lucairn-tools/bin/aws ]; then
                    printf '#!/bin/sh\nexec /usr/bin/aws "$@"\n' > /opt/lucairn-tools/bin/aws
                  fi
                  chmod -R 0755 /opt/lucairn-tools/bin
                  echo "backup(init): tools staged in /opt/lucairn-tools/bin"
              {{- with $backup.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: tools
                  mountPath: /opt/lucairn-tools
          {{- end }}
          containers:
            - name: backup
              image: "{{ default "postgres" $img.repository }}:{{ default "16-alpine" $img.tag }}"
              imagePullPolicy: {{ default "IfNotPresent" $img.pullPolicy }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              # The entrypoint is fully STATIC shell (no Helm directives inside
              # the block scalar — every per-DB value is injected via env vars
              # below) so the YAML block scalar indentation is never disturbed
              # by template trim markers.
              args:
                - |
                  set -eu
                  # The root initContainer (when installToolsAtRuntime=true)
                  # staged age + aws here; put it first on PATH. When a pre-baked
                  # image bundles the tools this dir is simply empty + harmless.
                  PATH="/opt/lucairn-tools/bin:${PATH}"
                  export PATH
                  STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
                  WORK="$(mktemp -d)"
                  DUMP="${WORK}/${BK_DB}-${STAMP}.dump"
                  ENC="${DUMP}.age"
                  PREFIX="${BK_S3_PREFIX}lucairn/${BK_NAME}/"
                  KEY="${PREFIX}${BK_DB}-${STAMP}.dump.age"

                  AWS_ARGS=""
                  if [ -n "${BK_S3_ENDPOINT}" ]; then
                    AWS_ARGS="--endpoint-url ${BK_S3_ENDPOINT}"
                  fi

                  # Tools must be present (from the initContainer or a pre-baked
                  # image). apk is NOT run here — the main container is non-root
                  # and apk would fail. Fail fast with an actionable message.
                  command -v age >/dev/null 2>&1 \
                    || { echo "backup(${BK_NAME}): 'age' not found — initContainer install failed or pre-baked image lacks it" >&2; exit 1; }
                  command -v aws >/dev/null 2>&1 \
                    || { echo "backup(${BK_NAME}): 'aws' not found — initContainer install failed or pre-baked image lacks it" >&2; exit 1; }

                  echo "backup(${BK_NAME}): pg_dump -Fc ${DUMP} ..."
                  export PGPASSWORD="${POSTGRES_PASSWORD}"
                  export PGSSLMODE="${BK_SSLMODE}"
                  pg_dump -h "${BK_PGHOST}" -p 5432 -U "${BK_PGUSER}" \
                    -d "${BK_DB}" -Fc \
                    > "${DUMP}"
                  test -s "${DUMP}" || { echo "backup(${BK_NAME}): EMPTY DUMP — aborting" >&2; exit 1; }

                  echo "backup(${BK_NAME}): encrypting with age (client-side) ..."
                  # RECIPIENT is the age public key (age1... or ssh-...). The
                  # matching private identity lives OUTSIDE the cluster.
                  age -r "${RECIPIENT}" -o "${ENC}" "${DUMP}"
                  rm -f "${DUMP}"
                  # Defensive: the uploaded object must be age-encrypted, never
                  # a raw pg_dump. age v1 files begin with the literal version
                  # line "age-encryption.org/v1" (21 bytes); a custom-format
                  # pg_dump begins with "PGDMP". Read >= the full magic before
                  # grepping — a 16-byte slice TRUNCATES the 18-char needle and
                  # can NEVER match, which would abort every valid backup.
                  head -c 64 "${ENC}" | grep -q "age-encryption.org" \
                    || { echo "backup(${BK_NAME}): encryption check FAILED — refusing to upload plaintext" >&2; exit 1; }

                  echo "backup(${BK_NAME}): uploading s3://${BK_S3_BUCKET}/${KEY} ..."
                  aws s3 cp "${ENC}" "s3://${BK_S3_BUCKET}/${KEY}" \
                    --region "${BK_S3_REGION}" ${AWS_ARGS}

                  echo "backup(${BK_NAME}): pruning objects older than ${BK_RETENTION_DAYS} days ..."
                  CUTOFF="$(date -u -d "-${BK_RETENTION_DAYS} days" +%Y-%m-%d 2>/dev/null \
                    || date -u -v-"${BK_RETENTION_DAYS}"d +%Y-%m-%d)"
                  aws s3api list-objects-v2 --bucket "${BK_S3_BUCKET}" --prefix "${PREFIX}" \
                    --region "${BK_S3_REGION}" ${AWS_ARGS} \
                    --query "Contents[?LastModified<='${CUTOFF}'].Key" --output text 2>/dev/null \
                    | tr '\t' '\n' | while read -r OLDKEY; do
                        [ -n "${OLDKEY}" ] && [ "${OLDKEY}" != "None" ] || continue
                        echo "backup(${BK_NAME}): pruning s3://${BK_S3_BUCKET}/${OLDKEY}"
                        aws s3 rm "s3://${BK_S3_BUCKET}/${OLDKEY}" \
                          --region "${BK_S3_REGION}" ${AWS_ARGS} || true
                      done

                  rm -rf "${WORK}"
                  echo "backup(${BK_NAME}): OK ${KEY}"
              env:
                - name: HOME
                  value: /tmp
                - name: BK_NAME
                  value: {{ $db.name | quote }}
                - name: BK_DB
                  value: {{ $database | quote }}
                - name: BK_PGHOST
                  value: {{ $svc | quote }}
                - name: BK_PGUSER
                  value: {{ $user | quote }}
                - name: BK_SSLMODE
                  value: {{ $sslmode | quote }}
                - name: BK_RETENTION_DAYS
                  value: {{ default 30 $backup.retentionDays | quote }}
                - name: BK_S3_BUCKET
                  value: {{ $s3.bucket | quote }}
                - name: BK_S3_REGION
                  value: {{ default "eu-central-1" $s3.region | quote }}
                - name: BK_S3_ENDPOINT
                  value: {{ default "" $s3.endpoint | quote }}
                - name: BK_S3_PREFIX
                  value: {{ default "" $s3.prefix | quote }}
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ $credSecret }}
                      key: POSTGRES_PASSWORD
                - name: RECIPIENT
                  valueFrom:
                    secretKeyRef:
                      name: {{ $recRef.name }}
                      key: {{ default "recipient" $recRef.key }}
                {{- if $akRef.name }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ $akRef.name }}
                      key: {{ default "accessKeyId" $akRef.key }}
                {{- end }}
                {{- if $skRef.name }}
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $skRef.name }}
                      key: {{ default "secretAccessKey" $skRef.key }}
                {{- end }}
                {{- if $s3.forcePathStyle }}
                - name: AWS_S3_FORCE_PATH_STYLE
                  value: "true"
                {{- end }}
              {{- with $backup.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                {{- if $installTools }}
                - name: tools
                  mountPath: /opt/lucairn-tools
                  readOnly: true
                {{- end }}
          volumes:
            - name: tmp
              emptyDir: {}
            {{- if $installTools }}
            - name: tools
              emptyDir: {}
            {{- end }}
{{ end }}
{{- end }}
{{- end }}
