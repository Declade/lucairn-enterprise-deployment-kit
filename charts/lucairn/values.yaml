global:
  vertical: finance
  imageRegistry: "ghcr.io/declade"
  imagePullSecrets: []
  # Raw dockerconfigjson content (string) consumed by the chart-managed
  # lucairn-registry pull Secret rendered per dsa-* namespace by
  # infrastructure/templates/pull-secrets.yaml. Operator passes at install
  # time via `--set-file global.imagePullDockerConfigJson=$DOCKER_CONFIG/config.json`
  # — NEVER write the value into customer-values.yaml (would leak the
  # registry PAT into git). Empty value fails-closed at template time with a
  # clear error (closes bug-hunter M2 / doctor-coverage GAP-1). Set
  # `global.skipPullSecretGuard: true` below to suppress the guard for
  # mirrored public-registry deploys. (Closes Sim 5 Helm Gap #1.)
  imagePullDockerConfigJson: ""
  # Escape hatch for BOTH pull-secret fail-guards:
  #   1. infrastructure/pull-secrets.yaml — empty imagePullDockerConfigJson
  #   2. validators.privateRegistryPullSecrets — private imageRegistry with
  #      empty imagePullSecrets (bare `helm install -f values.yaml` footgun)
  # Set to true if all images are pulled from a public mirror (no auth needed),
  # or if you attach registry credentials out-of-band (node/ServiceAccount-level
  # imagePullSecret). Default false — the guards fire.
  skipPullSecretGuard: false
  imageTag: "0.5.3" # NOTE: dashboard sub-chart ships independently — dashboard image is pinned in the dashboard.image.tag block below (currently 0.8.2).
  # Slice 4 — namespace of the bundled observability sub-chart (Grafana
  # + Loki + Tempo). The dashboard sub-chart's secret-grafana-jwt.yaml
  # mirrors the Helm-generated shared secret into this namespace so the
  # Grafana pod can mount it (Secrets are namespace-scoped). Override
  # only if the observability sub-chart is deployed to a non-default
  # namespace (it ships as `dsa-observability`).
  observabilityNamespace: "dsa-observability"
  secrets:
    backend: k8s-native
    vault:
      endpoint: ""
      role: dsa
      mountPath: dsa
    aws:
      region: eu-central-1
      serviceAccountAnnotation: ""
    azure:
      keyVaultName: ""
      tenantId: ""
  llmEgressEnabled: false
  ingestEgressEnabled: false
  ollamaEnabled: true
  demoEnabled: false
  # Node pool isolation: when true, Sandbox A and Sandbox B are scheduled
  # on separate node pools (dsa.io/zone=identity vs dsa.io/zone=ai) with
  # hard anti-affinity. Requires labeled + tainted nodes (managed-K8s
  # node pools or Cilium-equivalent). Default false targets vanilla
  # K8s (Kind, vanilla EKS/GKE/AKS) where these labels do not exist
  # and would block scheduling. Flip on at a customer site that has
  # the labeled nodes provisioned. (Vast-verify finding #1.)
  nodeIsolation: false
  # DNS restriction: deploy CoreDNS/Cilium policies to prevent cross-namespace
  # DNS resolution (dsa-ai cannot discover dsa-identity service names).
  # Requires Cilium CNI or CoreDNS firewall plugin. Default false targets
  # vanilla K8s where neither is configured; flipping on without the
  # required CNI policy crashes service discovery between dsa-edge /
  # dsa-identity / dsa-ai / dsa-witness. Flip on at a customer site
  # that runs Cilium with CNP enforcement. (Vast-verify finding #1.)
  dnsRestriction: false
  # PostgreSQL sslmode. The bundled postgres-* StatefulSets in this chart
  # do NOT configure TLS — they ship as plain-TCP Postgres pods inside the
  # cluster. Default "disable" matches the Compose path and avoids the
  # "no pg_hba.conf entry for SSL" connection failure pilots hit on Vast
  # vanilla K8s. Override to "require" ONLY if you swap in an external
  # Postgres with TLS configured AND wire its CA into each subchart's
  # client config. (Vast-verify finding #2.)
  postgresqlSslmode: disable
  # Cilium WireGuard transparent encryption for all pod-to-pod traffic.
  # Requires Cilium CNI with WireGuard support. Provides mTLS-equivalent
  # encryption without application changes or certificate management.
  wireguardEncryption: false
  # Single shared inter-service auth token consumed by gateway / audit /
  # id-bridge / sandbox-a / sandbox-b secret templates. Empty value lets
  # each subchart fall back to its own `secrets.values.dsaServiceToken`
  # for backward compatibility with existing customer-values.yaml files.
  # Render-time helper `render-values.sh` writes a single value here so
  # all five subcharts share the same token — without it, the per-
  # subchart placeholders rendered as four different random values and
  # broke service-to-service auth (Vast cascade BLOCKER D, 2026-05-26).
  dsaServiceToken: ""
  # Shared DSA license envelope consumed by gateway + sandbox-b. Empty
  # value lets each subchart fall back to its own `secrets.values.licenseKey`
  # for backward compatibility. (Vast cascade BLOCKER B, 2026-05-26.)
  dsaLicenseKey: ""
  # Deployment entitlement license (Ed25519, offline-verifiable). DISTINCT
  # from dsaLicenseKey above: gates Enterprise FEATURES (e.g. the
  # custom-trained L3 PII shield) with a grace-then-degrade expiry. Empty =
  # unregistered mode (Enterprise features locked, core PII pipeline still
  # runs). Lucairn issues the signed token + the verify public key via
  # `bin/lucairn license issue`. Empty here lets the gateway subchart fall
  # back to its own gateway.secrets.values.lucairnLicenseKey slot.
  lucairnLicenseKey: ""
  lucairnLicensePublicKey: ""
  # DSA environment: "development" | "production". Controls fail-closed guards in pipeline services.
  #
  # v1.0 ships "development" as the chart default because the bundled
  # subcharts do NOT provision inter-service gRPC TLS certs (each
  # subchart's `grpcTlsEnabled` defaults to "false"). The gateway / audit
  # / id-bridge / sandbox-a binaries hard-refuse the combo
  # `DSA_ENV=production` + `GRPC_TLS_ENABLED=false` at boot with
  # `GRPC_TLS_ENABLED=true is required when DSA_ENV=production; refusing
  # to start with plaintext transport`. Flipping the default to
  # "development" matches the actual TLS posture the chart ships with
  # so a fresh `helm install` succeeds end-to-end on a vanilla cluster
  # without manual operator-side overrides (Vast cascade BLOCKER A,
  # 2026-05-26).
  #
  # Customers who wire cert-manager (or equivalent) and flip every
  # subchart's `grpcTlsEnabled` to "true" can also flip this to
  # "production" via `--set global.dsaEnv=production` or by loading
  # `values-prod.yaml` which already sets the combo correctly. Prod-grade
  # TLS provisioning is the v2.0 roadmap. See INSTALL.md
  # § "v1.0 gateway keystore (file-keystore on PVC)".
  dsaEnv: development

# ---------------------------------------------------------------------------
# Automated offsite compliance-DB backups (WS-2 / HA-01).
# ---------------------------------------------------------------------------
#
# Scheduled, encrypted, offsite logical backups of the THREE compliance
# databases — audit (AI Act Art. 12 / GDPR Art. 30 immutable trail),
# id-bridge (GDPR re-linkage / DSAR tokens), and veil-witness (signed cert
# chain). One Helm CronJob per compliance DB runs `pg_dump -Fc` → client-side
# encrypt (age) → upload to a configured S3-compatible bucket, then prunes
# objects older than `retentionDays`.
#
# DEFAULT OFF. Existing installs do not surprise-change; demo/pilot and new
# customers opt in with `backup.enabled: true`. The Compose path has the
# matching `bin/lucairn backup` / `bin/lucairn restore` wrapper.
#
# Builds ON TOP of the PVC `helm.sh/resource-policy: keep` safety net (#42):
# keep stops accidental delete-on-uninstall, backups give real offsite
# durability + a tested restore path.
#
# DATA-08 crypto-shred caveat (documented in OPS.md): an encrypted backup
# contains the wrapped DEKs that were live at dump time. After a record is
# crypto-shredded (its wrapped key destroyed in the live DB), that record's
# wrapped key still persists inside any backup taken before the shred, until
# that backup ages out per `retentionDays`. Set `retentionDays` no lower than
# the customer's audit-evidence retention obligation AND account for this
# shred-vs-backup-aging window.
backup:
  # Master on/off. OFF by default (opt-in).
  enabled: false
  # Cron schedule (CronJob spec.schedule). Default 02:30 UTC daily.
  # RPO == this interval (default 24h). See OPS.md § Backups for RPO/RTO.
  schedule: "30 2 * * *"
  # Prune backup objects older than this many days. Default 30.
  # COMPLIANCE: must be >= your audit-evidence retention obligation. Do NOT
  # lower below your regulator-mandated retention. See the DATA-08 caveat above.
  retentionDays: 30
  # Backup container image. Must contain `pg_dump`/`pg_restore` (matching the
  # bundled Postgres major, 16), plus `age` (client-side encryption) and an
  # S3 client (`aws`). Default reuses the bundled postgres image and installs
  # `age` + `aws-cli` at job start via apk (needs egress to the alpine repo +
  # the S3 endpoint at run time). For air-gapped sites, override with a
  # pre-baked private image that bundles pg_dump + age + aws.
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
    # When true, a ROOT initContainer runs `apk add age aws-cli` and stages the
    # binaries into a shared volume that the non-root main container puts on
    # PATH. `apk` requires root (it writes /usr/bin, /lib/apk/db, /var/cache/apk)
    # so it cannot run in the main container, which is locked to uid 65534.
    # Set false ONLY if your image already bundles age + aws (air-gapped) — then
    # no initContainer is rendered and nothing runs as root.
    installToolsAtRuntime: true
  # Resource requests/limits for the backup pod.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # CronJob history + concurrency knobs.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  # Forbid overlapping runs (a long dump must not collide with the next tick).
  concurrencyPolicy: Forbid
  # Fail the Job (and surface in `kubectl get cronjob`) after this many seconds.
  activeDeadlineSeconds: 3600
  backoffLimit: 2
  # S3-compatible destination. Works with AWS S3, Hetzner Object Storage,
  # MinIO, Ceph RGW, etc. Customer-supplied bucket OR an operator-run default —
  # the operator chooses; no new sub-processor is forced.
  s3:
    # S3 API endpoint. For AWS S3 leave blank to use the AWS default for the
    # region; for Hetzner/MinIO set e.g. https://nbg1.your-objectstorage.com
    # or https://minio.internal:9000.
    endpoint: ""
    bucket: ""        # REQUIRED when backup.enabled — the destination bucket.
    region: "eu-central-1"
    # Optional key prefix inside the bucket (e.g. "lucairn/acme-prod/").
    prefix: ""
    # Force path-style addressing (MinIO / Ceph / most non-AWS endpoints).
    forcePathStyle: true
    # K8s Secret refs for the S3 credentials. NEVER inline the values here —
    # pre-create the Secret(s) and reference by name + key. Both may point at
    # the same Secret with different keys. Leave name empty to use IRSA /
    # instance-role credentials (AWS-native, no static keys).
    accessKeySecretRef:
      name: ""        # e.g. lucairn-backup-s3
      key: "accessKeyId"
    secretKeySecretRef:
      name: ""        # e.g. lucairn-backup-s3
      key: "secretAccessKey"
  # Client-side encryption. The dump is encrypted with `age` BEFORE upload so
  # the bucket never holds plaintext compliance data. Provide an age recipient
  # (public key, `age1...`) or an SSH recipient via the Secret. The matching
  # private identity is held by the operator OUTSIDE the cluster and is
  # required to restore — losing it makes every backup unrecoverable.
  encryption:
    # K8s Secret holding the age RECIPIENT (public key). Key default `recipient`.
    # Multiple recipients (newline-separated) are supported by age.
    recipientSecretRef:
      name: ""        # REQUIRED when backup.enabled — e.g. lucairn-backup-age
      key: "recipient"

infrastructure:
  enabled: true

# pii-ml gRPC sidecar (Piiranha + GLiNER ML PII scanners). Phase 7 ML
# extracted from the sanitizer monolith into a dedicated single-process
# container at PR #240 production-path follow-up ("A3 Proper").
#
# DEFAULT OFF as of chart v1.7.1 (2026-06-10) — the Phase 7 ML layer is
# SUSPENDED by default for performance: the ML sidecar saturates CPU and
# overloads on large prompts (~147KB routed Claude Code turns), which
# induced ~90s/turn latency and a fail-closed refusal on the pilot. The
# deterministic layers (known-entity matching + Presidio L1/L2) remain
# active. See INSTALL.md § "Re-enabling Phase 7".
#
# Re-enabling Phase 7 requires flipping BOTH gates back on:
#   1. pii-ml.enabled: true (this flag — deploys the sidecar), AND
#   2. sandbox-a.sanitizer.piiranha.enabled: true
#      AND sandbox-a.sanitizer.gliner.enabled: true (sanitizer dials it).
# When the sidecar is disabled, sanitizer's pii_ml_client.py is never
# invoked (the layer flags below gate the dial, not just the deployment),
# so the sanitizer starts happily with no pii-ml sidecar present.
# See INSTALL.md § "Phase 7 ML PII scanners".
pii-ml:
  enabled: false

audit:
  enabled: true

id-bridge:
  enabled: true

sandbox-a:
  enabled: true

sandbox-b:
  enabled: true

gateway:
  enabled: true

postgres-gateway:
  # v2.0 multi-replica gateway HA. v1.0 ships single-replica + file-keystore
  # on PVC; postgres-gateway is opt-in only and default-disabled. See
  # INSTALL.md § "Lucairn Enterprise v1.0 deployment topology".
  enabled: false

observability:
  enabled: true

demo:
  enabled: false

ingest:
  enabled: false

# Parent-level feature flag: controls whether the dsa-certification subchart is deployed.
# Used by Chart.yaml condition: certification.enabled
certification:
  enabled: false          # true for Pro/Enterprise; toggled by license tier

# Subchart values: passed to dsa-certification subchart using its chart name as the key.
# Key names MUST match dsa-certification/values.yaml exactly.
dsa-certification:
  witness:
    address: "veil-witness.dsa-witness.svc.cluster.local:50058"

  prober:
    url: ""               # empty = prober-less mode (verdict: REVIEW_REQUIRED)
    apiKey: ""

  signing:
    mode: local
    local:
      keyFile: /keys/customer-key.pem
      keyId: ""           # e.g. "customer-v1" — set per customer

  images:
    certBuilder:
      tag: ""             # empty = chart default (latest)
    certPortal:
      tag: ""

  # cert-prober is NOT deployed via Helm.
  # It runs on customer infrastructure, separate from DSA.
  # Deploy using: cert-prober.yaml from GitHub Release assets.

# Enterprise Dashboard sub-chart. OFF by default — customer opts in via
# `--set dashboard.enabled=true` or by setting `dashboard.enabled: true` in
# their customer-values.yaml. See INSTALL.md § "Enable the Lucairn dashboard".
dashboard:
  enabled: false

  # Sub-chart values: passed through to charts/lucairn/charts/dashboard/.
  # Defaults below mirror the sub-chart's values.yaml; override here per-customer.
  namespace: lucairn

  image:
    repository: lucairn-dashboard
    # Pinned to the current release tag. Bumped per kit-dashboard
    # release cadence. The 0.7.0 release closed the v1.0-dashboard arc;
    # 0.7.1 carried the release-gate polish; 0.8.1 adds the enterprise
    # operator-overview home page (KPI tiles + 30-day cert sparkline +
    # verdict donut + sanitizer bars + recent-activity table) and the
    # per-user demo-data toggle (opt-in via demoMode.toggleEnabled
    # below). 0.8.2 (2026-05-27) rewrites the cert browser SQL to
    # match the real veil_certificates schema — fixes the PR #38
    # phantom-column bug.
    tag: "0.8.2"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8443
    containerPort: 8443

  bootstrapAdmin:
    email: "admin@lucairn.local"
    passwordSecretName: ""

  # OIDC SSO opt-in. Field names mirror charts/lucairn/charts/dashboard/values.yaml
  # so customer overrides at the parent path are passed through verbatim.
  # Pre-Slice-2 stub fields (`issuer`, `clientId`, `clientSecret`) were renamed
  # to the sub-chart's canonical names; setting the old names here is now a
  # no-op. See INSTALL.md / OPS.md for the supported set.
  oidc:
    enabled: false
    issuerURL: ""
    clientID: ""
    clientSecretRef:
      name: ""
      key: client-secret
    adminGroup: lucairn-admins
    viewerGroup: lucairn-viewers
    groupsClaim: groups
    publicURL: ""
    callbackURL: ""

  ingress:
    enabled: false
    className: nginx
    host: dashboard.lucairn.local
    tlsSecret: tls-lucairn-dashboard
    annotations: {}

  # Slice 3 cert browser. Field names mirror
  # charts/lucairn/charts/dashboard/values.yaml so customer overrides
  # at the parent path pass through verbatim. Leave connectionStringRef.name
  # empty to ship the dashboard with cert pages rendering "not configured".
  auditDB:
    connectionStringRef:
      name: ""
      key: connection-string

  witness:
    # Default points at the kit's bundled witness Service DNS:
    # chart name `veil-witness` in namespace `dsa-witness` (per
    # charts/lucairn/charts/veil-witness/templates/service.yaml), cert RPC
    # port 50058 (per veil-witness/values.yaml :: service.certPort).
    # Sibling subchart precedent: dsa-certification/values.yaml line 83
    # uses the same DNS.
    endpoint: "veil-witness.dsa-witness.svc.cluster.local:50058"
    tls:
      enabled: false
      caRef:
        name: ""
        key: ca.crt
      certRef:
        name: ""
        key: tls.crt
      keyRef:
        name: ""
        key: tls.key

  # Slice 4: server health overview + Grafana embedding plumbing.
  # Field names mirror charts/lucairn/charts/dashboard/values.yaml so
  # customer overrides at the parent path are passed through verbatim.
  grafana:
    # Empty endpoint = Grafana embedding off. Cards still render but
    # the side drawer shows the "not configured" placeholder.
    endpoint: ""
    jwt:
      # Empty secretName = Helm generates lucairn-dashboard-grafana-jwt
      # via the lookup pattern (preserves across helm upgrade).
      secretName: ""
      secretKey: shared-secret
    panels:
      gatewayThroughputUID: ""
      sanitizerHitRatesUID: ""
      witnessVerifyRateUID: ""
      auditLogVolumeUID: ""

  healthPollIntervalSeconds: 10
  healthServices: ""

  # Slice 5: API key management against the gateway admin HTTP surface.
  # Field names mirror charts/lucairn/charts/dashboard/values.yaml so
  # customer overrides at the parent path are passed through verbatim.
  # Leave adminURL empty to ship the dashboard with /keys rendering the
  # "not configured" explainer. When set, also pre-create the K8s
  # Secret holding the admin token (gateway's DSA_ADMIN_KEY) at key
  # `admin-token`. See INSTALL.md § "Enable API key management".
  gateway:
    adminURL: ""
    adminTokenSecretRef:
      name: ""
      key: "admin-token"

  # Slice 6: audit log browser. Field names mirror
  # charts/lucairn/charts/dashboard/values.yaml so customer overrides
  # at the parent path are passed through verbatim. Leave
  # auditLogDBConnectionStringRef.name empty to ship the dashboard
  # with /audit rendering the "not configured" explainer.
  #
  # IMPORTANT: the audit-LOG connection (this block) points at
  # postgres-audit (event stream); it is DISTINCT from the cert-LOG
  # connection (`.auditDB.connectionStringRef` above) which points
  # at postgres-bridge.
  audit:
    auditLogDBConnectionStringRef:
      name: ""
      key: url
    # Optional hardening: separate role/Secret for the
    # dashboard_saved_filters table only. Empty = reuse the
    # auditLogDBConnectionStringRef above.
    savedFiltersDBConnectionStringRef:
      name: ""
      key: url

  # Compliance PDF export. Admin-only + always-on surface (no opt-in
  # env var). Field names mirror charts/lucairn/charts/dashboard/values.yaml
  # so customer overrides at the parent path are passed through verbatim.
  # The aggregator returns zero-value counts when neither auditDB nor
  # audit-log DB is wired; the PDF still renders with empty tables.
  compliance:
    maxWindowDays: 365
    defaultCustomerName: ""

# Observability sub-chart override block (Slice 4 fold-in). When
# enabling the dashboard's Grafana embedding, also flip
# `observability.grafana.auth.jwt.enabled` so the Grafana pod accepts
# the HS256 JWT. Both sub-charts MUST reference the SAME Secret name.
observability:
  enabled: true
  grafana:
    auth:
      jwt:
        enabled: false
        secretRef:
          # Cross-chart bind: typically set to
          # `lucairn-dashboard-grafana-jwt` (the auto-generated name from
          # the dashboard sub-chart). The Secret must exist in the
          # observability namespace; for cross-namespace deployments,
          # operators pre-create + copy the Secret out-of-band.
          name: ""
          key: shared-secret
        issuer: "lucairn-dashboard"
        audience: "grafana"
