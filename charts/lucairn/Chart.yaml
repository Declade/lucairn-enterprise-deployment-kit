apiVersion: v2
name: lucairn
description: Lucairn enterprise self-hosted deployment kit
# Helm chart SemVer. Tracks the kit release version (VERSION file,
# image-manifest.kit_version, README target) on its major.minor.patch
# axis; the kit's `-<slug>` release-suffix (e.g. 1.5.1-dashboard) is NOT
# carried here because Helm chart versions must be clean SemVer for
# `helm package`. See docs/RELEASING.md § "Version reconciliation".
type: application
version: 1.9.2
appVersion: "0.5.2"

dependencies:
  - name: infrastructure
    version: 0.1.0
    condition: infrastructure.enabled
  - name: pii-ml
    version: 0.1.0
    # pii-ml gRPC sidecar (Piiranha + GLiNER ML PII scanners). DEFAULT OFF
    # as of chart v1.7.1 (2026-06-10) — Phase 7 ML SUSPENDED for performance
    # (the ML sidecar overloads on large prompts). The deterministic layers
    # (known-entity matching + Presidio) remain active. Re-enabling requires
    # flipping pii-ml.enabled=true AND the sanitizer-side piiranha + gliner
    # flags (sandbox-a.sanitizer.piiranha.enabled +
    # sandbox-a.sanitizer.gliner.enabled). Sanitizer's pii_ml_client.py only
    # dials when those layer flags are on, so with the sidecar off the
    # sanitizer starts happily and Phase 7 stays dormant. See INSTALL.md
    # § "Re-enabling Phase 7".
    condition: pii-ml.enabled
  - name: audit
    version: 0.1.0
    condition: audit.enabled
  - name: id-bridge
    version: 0.1.0
    condition: id-bridge.enabled
  - name: sandbox-a
    version: 0.1.0
    condition: sandbox-a.enabled
  - name: sandbox-b
    version: 0.1.0
    condition: sandbox-b.enabled
  - name: gateway
    version: 0.1.0
    condition: gateway.enabled
  - name: postgres-gateway
    version: 0.1.0
    # Postgres-backed keystore for the gateway is the v2.0 multi-replica HA
    # path (closes Sim 5 Helm Gap #6 when HA ships). DEFAULT OFF in v1.0:
    # v1.0 ships single-replica gateway + file-keystore on PVC. The subchart
    # remains in the dependency tree so v2.0 operators can opt in cleanly,
    # but it does NOT render in default v1.0 installs. Do NOT flip on without
    # ALSO setting gateway.postgresKeystore.enabled=true AND
    # gateway.replicaCount>=2 — see INSTALL.md § "v2.0 roadmap".
    condition: postgres-gateway.enabled
  - name: observability
    version: 0.1.0
    condition: observability.enabled
  - name: demo
    version: 0.1.0
    condition: demo.enabled
  - name: ingest
    version: 0.1.0
    condition: ingest.enabled
  - name: admin
    version: 0.1.0
    condition: admin.enabled
  - name: veil-witness
    version: 0.1.0
    condition: veil-witness.enabled
  - name: dsa-certification
    version: "0.1.0"
    # Vendored as a local placeholder subchart at charts/dsa-certification/.
    # The enterprise kit keeps this dependency local so customer installs do
    # not need a second chart repository during first deployment.
    condition: certification.enabled
  - name: dashboard
    version: 0.8.2
    # Enterprise Dashboard sub-chart. OFF by default; customer opts in via
    # --set dashboard.enabled=true (or via their customer-values.yaml).
    condition: dashboard.enabled
