# deploy/helm/values-proof.yaml
# Minimal overlay for proof-grade local Kind clusters.
# Goal: prove isolation and full Veil flow with the smallest moving surface.

global:
  vertical: test
  dnsRestriction: false
  dsaEnv: development
  # Kind clusters pre-load images via `kind load docker-image` — no registry
  # pull auth / pull Secret is needed, so skip the private-registry pull-Secret
  # guard (it exists for real private-registry installs, not local Kind).
  skipPullSecretGuard: true

observability:
  enabled: false

demo:
  enabled: false

ingest:
  enabled: false

admin:
  enabled: false

sandbox-a:
  ephemeral: "true"
  sanitizer:
    llmAuditEnabled: false
    llmScanEnabled: false

gateway:
  replicaCount: 1
  enableTestProvider: "true"
  hpa:
    enabled: false

veil-witness:
  replicaCount: 1
  hpa:
    enabled: false
  pdb:
    enabled: false

sandbox-b:
  enableTestProvider: "true"
