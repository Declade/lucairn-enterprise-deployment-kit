# Postgres instance backing the gateway's PostgresKeyStore (durable API-key
# storage across pod restarts + HA replicas). Colocated with the gateway in
# dsa-edge so the keystore connection stays intra-namespace.
namespace: dsa-edge

replicaCount: 1

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

service:
  port: 5432

postgresql:
  user: gateway
  database: gateway_keystore
  # PVC reclaim Retain — losing keystore on uninstall would silently strand all
  # customer API keys. Helm uninstall preserves the PVC; operator runs `kubectl
  # delete pvc postgres-gateway-data -n dsa-edge` manually to drop keys.
  storageSize: 1Gi
  storageClass: ""
  # Bundled postgres:16-alpine StatefulSet ships without TLS args/cert mounts,
  # so the keystore DSN MUST use sslmode=disable. The global
  # `global.postgresqlSslmode` (default "require") is intended for
  # customer-supplied EXTERNAL Postgres which may already be configured for
  # TLS — those paths are upstream of this chart-local default and unaffected.
  # If you swap the bundled StatefulSet for an external TLS-enabled keystore
  # via secrets.backend != "k8s-native" (roadmap, not yet implemented),
  # override `postgres-gateway.postgresql.sslmode: require` for that path.
  # Closes Sim 5 Codex r1 HIGH (bundled gateway server does not speak TLS).
  sslmode: disable

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

# secrets.backend supported in v1.4.0: k8s-native ONLY.
# Roadmap (future release): vault | aws | azure via ExternalSecret templates
# (workstream-C-doctor-extension). Non-k8s-native renders fail-fast in
# templates/secret.yaml with a clear error rather than silently rendering
# an install that references a non-existent gateway-keystore-db-credentials
# Secret (Sim 5 Codex r1 MED).
secrets:
  backend: k8s-native
  values:
    # PRODUCTION: MUST override with a strong, unique password (gateway role).
    # Empty value at install time fails-closed in templates/secret.yaml so the
    # operator gets a clear error instead of a silently weak default.
    postgresPassword: ""
  # Roadmap-only — not yet wired to ExternalSecret templates in v1.4.0.
  vault:
    path: "dsa/data/postgres-gateway"
  aws:
    name: "dsa/postgres-gateway"
  azure:
    name: "dsa-postgres-gateway"
