apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-gateway-data
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: postgres-gateway
    app.kubernetes.io/part-of: dsa
  annotations:
    # Survive helm uninstall — losing the keystore PVC would silently strand
    # every customer API key on the next install. Operator drops keys
    # explicitly via `kubectl delete pvc postgres-gateway-data -n dsa-edge`.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgresql.storageClass }}
  storageClassName: {{ .Values.postgresql.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgresql.storageSize }}
