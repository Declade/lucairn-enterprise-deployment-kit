{{- if eq .Values.secrets.backend "k8s-native" }}
{{- if not .Values.secrets.values.postgresPassword }}
{{- fail "postgres-gateway.secrets.values.postgresPassword must be set (empty value would silently weaken the keystore DB)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-keystore-db-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: postgres-gateway
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.values.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.postgresql.database | quote }}
  # GATEWAY_KEYSTORE_DSN is the full Postgres DSN the gateway reads at boot
  # (selects PostgresKeyStore vs in-memory). Connection is intra-namespace
  # inside dsa-edge; namespace egress NetworkPolicy guards traffic. sslmode
  # honors global.postgresqlSslmode (default "disable") so prod-deploys with
  # sslmode=require flow through without a separate override (closes bug-
  # hunter H2). User + password are urlquery-encoded so passwords containing
  # @ : / ? # % + & or space (common in password-generator output) do not
  # break DSN parsing (closes bug-hunter B2).
  dsn: "postgres://{{ .Values.postgresql.user | urlquery }}:{{ .Values.secrets.values.postgresPassword | urlquery }}@postgres-gateway.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.service.port }}/{{ .Values.postgresql.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
{{- end }}
