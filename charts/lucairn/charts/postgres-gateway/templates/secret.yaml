{{- if eq .Values.secrets.backend "k8s-native" }}
{{- if not .Values.secrets.values.postgresPassword }}
{{- fail "postgres-gateway.secrets.values.postgresPassword must be set (empty value would silently weaken the keystore DB)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-keystore-db-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: postgres-gateway
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.values.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.postgresql.database | quote }}
  # GATEWAY_KEYSTORE_DSN is the full Postgres DSN the gateway reads at boot
  # (selects PostgresKeyStore vs in-memory). Connection is intra-namespace
  # inside dsa-edge; namespace egress NetworkPolicy guards traffic.
  #
  # sslmode uses the chart-LOCAL `postgresql.sslmode` (default "disable"),
  # NOT global.postgresqlSslmode. The bundled postgres:16-alpine
  # StatefulSet has no TLS args/cert mounts, so sslmode=require (the
  # global default for customer-supplied external Postgres) would fail
  # the bundled in-cluster server. Other DSNs in the chart (audit,
  # id-bridge, sandbox-a, etc.) keep using global.postgresqlSslmode for
  # the customer-external-Postgres-with-TLS case. Closes Sim 5 Codex r1
  # HIGH (bundled gateway server does not speak TLS).
  #
  # User + password are URL-userinfo encoded so passwords containing @ : /
  # ? # % + & or space (common in password-generator output) do not break
  # DSN parsing. Go's `urlquery` is query-string escaping (space → "+");
  # URL userinfo decoding preserves "+" as a literal plus, so the password
  # would round-trip incorrectly. The `replace "+" "%20"` step converts the
  # query-escape "+" to the userinfo-correct "%20" so the password survives
  # round-trip through pgx/lib-pq DSN parsing (closes Sim 5 Codex r1 HIGH
  # for urlquery-vs-userinfo + earlier bug-hunter B2).
  dsn: "postgres://{{ .Values.postgresql.user | urlquery | replace "+" "%20" }}:{{ .Values.secrets.values.postgresPassword | urlquery | replace "+" "%20" }}@postgres-gateway.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.service.port }}/{{ .Values.postgresql.database }}?sslmode={{ .Values.postgresql.sslmode | default "disable" }}"
{{- end }}
