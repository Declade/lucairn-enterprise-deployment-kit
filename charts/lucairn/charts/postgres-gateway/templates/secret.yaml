{{- if eq .Values.secrets.backend "k8s-native" }}
{{- if not .Values.secrets.values.postgresPassword }}
{{- fail "postgres-gateway.secrets.values.postgresPassword must be set (empty value would silently weaken the keystore DB)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-keystore-db-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: postgres-gateway
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.values.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.postgresql.database | quote }}
  # GATEWAY_KEYSTORE_DSN is the full Postgres DSN the gateway reads at boot
  # (selects PostgresKeyStore vs in-memory). SSL disabled — intra-namespace
  # connection inside dsa-edge; namespace egress NetworkPolicy guards traffic.
  dsn: "postgres://{{ .Values.postgresql.user }}:{{ .Values.secrets.values.postgresPassword }}@postgres-gateway.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.service.port }}/{{ .Values.postgresql.database }}?sslmode=disable"
{{- end }}
