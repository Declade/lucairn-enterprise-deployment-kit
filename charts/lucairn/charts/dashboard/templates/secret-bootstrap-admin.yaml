{{- if not .Values.bootstrapAdmin.passwordSecretName }}
{{- /*
  Lookup the existing Secret (if any) on the cluster so `helm upgrade` does
  NOT regenerate the bootstrap password / session secret on every render.
  Without this, the first `helm upgrade` after install rewrites both fields,
  silently locking the operator out of the dashboard. The `lookup` template
  function returns an empty dict during `helm template` (no cluster context),
  so render-time tooling still gets a fresh value and stays deterministic
  within a single render.

  Pattern parallels the standard Helm chart idiom — see e.g. bitnami/common's
  `getValueFromSecret`.
*/ -}}
{{- $existing := (lookup "v1" "Secret" .Values.namespace (include "dashboard.bootstrapAdminSecretName" .)) -}}
{{- $existingData := default dict (default dict $existing).data -}}
{{- $existingPasswordB64 := index $existingData "password" | default "" -}}
{{- $existingSessionSecretB64 := index $existingData "session-secret" | default "" -}}
{{- $passwordPlain := "" -}}
{{- if $existingPasswordB64 -}}
  {{- $passwordPlain = $existingPasswordB64 | b64dec -}}
{{- else -}}
  {{- $passwordPlain = randAlphaNum 32 -}}
{{- end -}}
{{- $sessionSecretPlain := "" -}}
{{- if $existingSessionSecretB64 -}}
  {{- $sessionSecretPlain = $existingSessionSecretB64 | b64dec -}}
{{- else -}}
  {{- $sessionSecretPlain = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dashboard.bootstrapAdminSecretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  # Initial bootstrap admin password — random alphanumeric, 32 chars.
  # Operators retrieve it once via `kubectl get secret ... -o jsonpath=...`
  # then rotate via OPS.md. The `lookup` guard above preserves the value
  # across `helm upgrade` so operators are not silently locked out.
  password: {{ $passwordPlain | b64enc | quote }}
  # Session signing secret — reserved for future signed-cookie sessions.
  # Slice 1 uses opaque in-memory IDs and does not consume it; pre-allocating
  # here means rotation tooling does not need to touch the Helm template
  # when Slice 2+ flips to signed sessions. Also stable across upgrades.
  session-secret: {{ $sessionSecretPlain | b64enc | quote }}
{{- end }}
