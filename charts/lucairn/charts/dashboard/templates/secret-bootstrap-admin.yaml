{{- if not .Values.bootstrapAdmin.passwordSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dashboard.bootstrapAdminSecretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  # Initial bootstrap admin password — random alphanumeric, 32 chars.
  # Operators retrieve it once via `kubectl get secret ... -o jsonpath=...`
  # then rotate via OPS.md.
  password: {{ randAlphaNum 32 | b64enc | quote }}
  # Session signing secret — reserved for future signed-cookie sessions.
  # Slice 1 uses opaque in-memory IDs and does not consume it; pre-allocating
  # here means rotation tooling does not need to touch the Helm template
  # when Slice 2+ flips to signed sessions.
  session-secret: {{ randAlphaNum 48 | b64enc | quote }}
{{- end }}
