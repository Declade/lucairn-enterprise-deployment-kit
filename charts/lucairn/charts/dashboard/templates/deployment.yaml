apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dashboard.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dashboard.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "dashboard.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: dashboard
          image: "{{ include "dashboard.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--listen-addr=0.0.0.0:{{ .Values.service.containerPort }}"
          env:
            - name: LUCAIRN_DASHBOARD_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.service.containerPort }}"
            - name: LUCAIRN_DASHBOARD_BOOTSTRAP_EMAIL
              value: {{ .Values.bootstrapAdmin.email | quote }}
            - name: LUCAIRN_DASHBOARD_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dashboard.bootstrapAdminSecretName" . }}
                  key: password
            - name: LUCAIRN_DASHBOARD_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "dashboard.bootstrapAdminSecretName" . }}
                  key: session-secret
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
