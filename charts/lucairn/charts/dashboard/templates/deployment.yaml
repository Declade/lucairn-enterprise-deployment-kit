apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dashboard.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dashboard.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "dashboard.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: dashboard
          image: "{{ include "dashboard.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--listen-addr=0.0.0.0:{{ .Values.service.containerPort }}"
          env:
            - name: LUCAIRN_DASHBOARD_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.service.containerPort }}"
            - name: LUCAIRN_DASHBOARD_BOOTSTRAP_EMAIL
              value: {{ .Values.bootstrapAdmin.email | quote }}
            - name: LUCAIRN_DASHBOARD_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dashboard.bootstrapAdminSecretName" . }}
                  key: password
            - name: LUCAIRN_DASHBOARD_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "dashboard.bootstrapAdminSecretName" . }}
                  key: session-secret
            {{- if .Values.oidc.enabled }}
            # OIDC SSO opt-in. Required env vars when enabled; the dashboard
            # binary fails-fast at startup if the trio is missing or the
            # issuer is unreachable. Local-admin login keeps working.
            - name: LUCAIRN_DASHBOARD_OIDC_ENABLED
              value: "true"
            - name: LUCAIRN_DASHBOARD_OIDC_ISSUER_URL
              value: {{ required "dashboard.oidc.issuerURL is required when oidc.enabled=true" .Values.oidc.issuerURL | quote }}
            - name: LUCAIRN_DASHBOARD_OIDC_CLIENT_ID
              value: {{ required "dashboard.oidc.clientID is required when oidc.enabled=true" .Values.oidc.clientID | quote }}
            - name: LUCAIRN_DASHBOARD_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "dashboard.oidc.clientSecretRef.name is required when oidc.enabled=true" .Values.oidc.clientSecretRef.name | quote }}
                  key: {{ .Values.oidc.clientSecretRef.key | default "client-secret" | quote }}
            - name: LUCAIRN_DASHBOARD_OIDC_ADMIN_GROUP
              value: {{ required "dashboard.oidc.adminGroup is required when oidc.enabled=true" .Values.oidc.adminGroup | quote }}
            - name: LUCAIRN_DASHBOARD_OIDC_VIEWER_GROUP
              value: {{ required "dashboard.oidc.viewerGroup is required when oidc.enabled=true" .Values.oidc.viewerGroup | quote }}
            - name: LUCAIRN_DASHBOARD_OIDC_GROUPS_CLAIM
              value: {{ .Values.oidc.groupsClaim | default "groups" | quote }}
            {{- if .Values.oidc.callbackURL }}
            - name: LUCAIRN_DASHBOARD_OIDC_CALLBACK_URL
              value: {{ .Values.oidc.callbackURL | quote }}
            {{- else }}
            - name: LUCAIRN_DASHBOARD_OIDC_PUBLIC_URL
              value: {{ required "dashboard.oidc.callbackURL or dashboard.oidc.publicURL is required when oidc.enabled=true" .Values.oidc.publicURL | quote }}
            {{- end }}
            {{- end }}
            {{- /* Slice 3: cert browser + inspector. Both fields are
               optional — when AuditDB.connectionStringRef.name is empty,
               the cert pages render a "not configured" explainer and
               the binary skips dial. Witness endpoint always renders
               (defaults to the in-cluster Service DNS in values.yaml). */ -}}
            {{- if .Values.auditDB.connectionStringRef.name }}
            - name: LUCAIRN_DASHBOARD_AUDIT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auditDB.connectionStringRef.name | quote }}
                  key: {{ .Values.auditDB.connectionStringRef.key | default "connection-string" | quote }}
            {{- end }}
            - name: LUCAIRN_DASHBOARD_WITNESS_ENDPOINT
              value: {{ .Values.witness.endpoint | default "veil-witness.dsa-witness.svc.cluster.local:50058" | quote }}
            - name: LUCAIRN_DASHBOARD_WITNESS_TLS_ENABLED
              value: {{ .Values.witness.tls.enabled | default false | quote }}
            # Slice 4: server-health overview + Grafana embedding. Health
            # probing is always-on (set healthServices to the literal
            # "disabled" to turn off). Grafana embedding is opt-in via
            # grafana.endpoint; when empty the JWT secret env var is not
            # rendered.
            - name: LUCAIRN_DASHBOARD_HEALTH_SERVICES
              value: {{ .Values.healthServices | default "" | quote }}
            - name: LUCAIRN_DASHBOARD_HEALTH_POLL_INTERVAL_SECONDS
              value: {{ .Values.healthPollIntervalSeconds | default 10 | quote }}
            {{- if .Values.grafana.endpoint }}
            - name: LUCAIRN_DASHBOARD_GRAFANA_URL
              value: {{ .Values.grafana.endpoint | quote }}
            - name: LUCAIRN_DASHBOARD_GRAFANA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "dashboard.grafanaJWTSecretName" . | quote }}
                  key: {{ .Values.grafana.jwt.secretKey | default "shared-secret" | quote }}
            {{- if .Values.grafana.panels.gatewayThroughputUID }}
            - name: LUCAIRN_DASHBOARD_GRAFANA_PANEL_GATEWAY_THROUGHPUT_UID
              value: {{ .Values.grafana.panels.gatewayThroughputUID | quote }}
            {{- end }}
            {{- if .Values.grafana.panels.sanitizerHitRatesUID }}
            - name: LUCAIRN_DASHBOARD_GRAFANA_PANEL_SANITIZER_HIT_RATES_UID
              value: {{ .Values.grafana.panels.sanitizerHitRatesUID | quote }}
            {{- end }}
            {{- if .Values.grafana.panels.witnessVerifyRateUID }}
            - name: LUCAIRN_DASHBOARD_GRAFANA_PANEL_WITNESS_VERIFY_RATE_UID
              value: {{ .Values.grafana.panels.witnessVerifyRateUID | quote }}
            {{- end }}
            {{- if .Values.grafana.panels.auditLogVolumeUID }}
            - name: LUCAIRN_DASHBOARD_GRAFANA_PANEL_AUDIT_LOG_VOLUME_UID
              value: {{ .Values.grafana.panels.auditLogVolumeUID | quote }}
            {{- end }}
            {{- end }}
            {{- /* Slice 5: API key management against the gateway admin
               HTTP surface. Both env vars render together when adminURL is
               set; the umbrella-chart `fail` template in _validators.tpl
               catches the half-wired (URL set, secret missing) case at
               `helm install/upgrade` time so a dashboard pod never boots
               into a state where /keys returns 401 on every request. */ -}}
            {{- if .Values.gateway.adminURL }}
            - name: LUCAIRN_DASHBOARD_GATEWAY_ADMIN_URL
              value: {{ .Values.gateway.adminURL | quote }}
            - name: LUCAIRN_DASHBOARD_GATEWAY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "dashboard.gateway.adminTokenSecretRef.name is required when dashboard.gateway.adminURL is set (operator pre-creates the Secret with key 'admin-token' carrying the gateway's DSA_ADMIN_KEY value)" .Values.gateway.adminTokenSecretRef.name | quote }}
                  key: {{ .Values.gateway.adminTokenSecretRef.key | default "admin-token" | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
