{{- /*
  Slice 4 — Grafana embed shared secret.

  Generated only when:
    - dashboard.grafana.endpoint is set (operator opted into Grafana
      embedding) AND
    - dashboard.grafana.jwt.secretName is empty (operator did NOT
      pre-create the Secret outside Helm).

  Mirrors the bootstrap-admin Secret pattern: `lookup` first so
  `helm upgrade` keeps the same value across rotations of unrelated
  values; falls back to a 48-char randAlphaNum on first install.

  When dashboard.grafana.jwt.secretName IS set, the operator owns the
  Secret out-of-band — we don't render this object. The customer Helm
  values reference the secret by name + key only.

  Cross-namespace contract (Slice 4 fix-up r1, closes B-2):
    K8s Secret mounts are namespace-scoped. The dashboard pod runs in
    `.Values.namespace` (default `lucairn`); the Grafana pod runs in
    `.Values.global.observabilityNamespace` (default `dsa-observability`).
    We therefore render the SAME shared-secret value as TWO Secret
    objects — one in each namespace — keyed off a single
    `randAlphaNum` (or `lookup`-preserved value). Both renderings use
    the same lookup-precedence: in-namespace existing Secret wins so
    rotations applied to either side do not flap on `helm upgrade`.

  The SAME Secret is read by:
    1. The dashboard pod (env var LUCAIRN_DASHBOARD_GRAFANA_JWT_SECRET
       via secretKeyRef in deployment.yaml) from `.Values.namespace`.
    2. The Grafana pod (volume-mounted to /etc/grafana/jwt/shared-secret
       per charts/lucairn/charts/observability/templates/grafana-deployment.yaml)
       from `.Values.global.observabilityNamespace`.
*/ -}}
{{- if and .Values.grafana.endpoint (not .Values.grafana.jwt.secretName) }}
{{- $secretName := include "dashboard.grafanaJWTSecretName" . -}}
{{- $dashboardNs := .Values.namespace -}}
{{- $observabilityNs := (default "dsa-observability" (.Values.global).observabilityNamespace) -}}
{{- /*
  Precedence for the secret VALUE (in order):
    1. Existing Secret in the dashboard namespace
    2. Existing Secret in the observability namespace (recovers after
       partial-rotation states where only one side was rolled)
    3. Fresh randAlphaNum 48
*/ -}}
{{- $existingDash := (lookup "v1" "Secret" $dashboardNs $secretName) -}}
{{- $existingObs := (lookup "v1" "Secret" $observabilityNs $secretName) -}}
{{- $sharedPlain := "" -}}
{{- if and $existingDash $existingDash.data (index $existingDash.data "shared-secret") -}}
  {{- $sharedPlain = (index $existingDash.data "shared-secret") | b64dec -}}
{{- else if and $existingObs $existingObs.data (index $existingObs.data "shared-secret") -}}
  {{- $sharedPlain = (index $existingObs.data "shared-secret") | b64dec -}}
{{- else -}}
  {{- $sharedPlain = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $dashboardNs }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  # 48-char alphanumeric HMAC shared secret. The same Secret value is
  # consumed by Grafana's [auth.jwt].key_file (mounted as a single-line
  # file) AND by the dashboard's grafana.Signer at boot. Rotation = bump
  # the literal in the cluster (kubectl edit secret + restart both pods);
  # the `lookup` guard above preserves the secret across `helm upgrade`
  # so unrelated upgrades do not rotate it.
  shared-secret: {{ $sharedPlain | b64enc | quote }}
{{- if ne $dashboardNs $observabilityNs }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $observabilityNs }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  annotations:
    # Documents that this Secret is a cross-namespace mirror of the
    # canonical Secret in the dashboard namespace. Rotations to either
    # side are preserved by the lookup-precedence above.
    lucairn.eu/mirrored-from-namespace: {{ $dashboardNs | quote }}
type: Opaque
data:
  shared-secret: {{ $sharedPlain | b64enc | quote }}
{{- end }}
{{- end }}
