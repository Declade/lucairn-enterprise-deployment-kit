# Lucairn Enterprise Dashboard sub-chart values.
#
# The dashboard is OPT-IN at the top-level (dashboard.enabled=false by
# default in charts/lucairn/values.yaml). Customer opts in explicitly via
# `--set dashboard.enabled=true` or by setting dashboard.enabled in their
# customer-values.yaml.

namespace: lucairn

replicaCount: 1

image:
  repository: lucairn-dashboard
  # Empty → defaults to chart appVersion via the deployment template. NOTE:
  # this is INDEPENDENT from charts/lucairn/values.yaml global.imageTag —
  # bumping --set global.imageTag=X will NOT bump the dashboard tag. The
  # dashboard ships on its own release cadence.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8443
  containerPort: 8443

# Bootstrap admin account. Helm generates a random password into a Secret on
# initial install. Operators can either:
#   1) Leave bootstrapAdmin.passwordSecretName empty → Helm generates +
#      stores the secret as ${chartName}-bootstrap-admin.
#   2) Pre-create their own Secret and set bootstrapAdmin.passwordSecretName
#      to its name. The Secret must hold key "password".
#
# Same pattern as charts/lucairn/charts/observability/templates/grafana-deployment.yaml
# (line 40) uses for GF_SECURITY_ADMIN_PASSWORD.
bootstrapAdmin:
  email: "admin@lucairn.local"
  passwordSecretName: ""

# Reserved for future signed-cookie code paths (Slice 1 uses opaque
# in-memory session IDs and does not consume the value). Required so deploys
# do not silently degrade when later slices flip to signed sessions.
sessionSecret: ""

# OIDC SSO is opt-in. When enabled, the dashboard renders a "Sign in
# with SSO" button on the /login surface alongside the local-admin form.
# Local login continues to work regardless of this setting — there is no
# way to disable the local fallback in v1.
#
# Required when oidc.enabled=true:
#   - oidc.issuerURL              issuer base URL (no trailing slash)
#   - oidc.clientID               client_id registered at the IdP
#   - oidc.clientSecretRef.name   K8s Secret holding the client_secret
#   - oidc.clientSecretRef.key    key within that Secret (default "client-secret")
#   - oidc.adminGroup             group name that maps to RoleAdmin
#   - oidc.viewerGroup            group name that maps to RoleViewer
#   - oidc.publicURL              externally-visible dashboard URL — used to
#                                 derive the callback URL when oidc.callbackURL
#                                 is empty. Pin oidc.callbackURL explicitly
#                                 when the IdP-registered URL differs from
#                                 publicURL + /auth/oidc/callback.
#
# Group mapping rules (LOCKED):
#   - Admin group wins. User in BOTH groups → RoleAdmin.
#   - User in neither group → 403, NOT auto-grant viewer.
#   - Missing groups claim → 403.
#
# Operator pre-creates the client-secret Secret before `helm install`:
#   kubectl -n lucairn create secret generic lucairn-dashboard-oidc \
#     --from-literal=client-secret='<your-idp-client-secret>'
oidc:
  enabled: false
  issuerURL: ""
  clientID: ""
  clientSecretRef:
    name: ""
    key: client-secret
  adminGroup: lucairn-admins
  viewerGroup: lucairn-viewers
  groupsClaim: groups
  publicURL: ""
  callbackURL: ""

ingress:
  enabled: false
  className: nginx
  host: dashboard.lucairn.local
  tlsSecret: tls-lucairn-dashboard
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  # Pod Security Standards "restricted" requires runAsNonRoot to be set at
  # the CONTAINER level, not only the pod level — the pod-level value is
  # advisory and a container can override it. Pin runAsUser to the same
  # non-root UID (65532, nobody) as the pod-level context to keep the two
  # in lockstep on every render.
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]
