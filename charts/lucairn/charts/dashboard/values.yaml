# Lucairn Enterprise Dashboard sub-chart values.
#
# The dashboard is OPT-IN at the top-level (dashboard.enabled=false by
# default in charts/lucairn/values.yaml). Customer opts in explicitly via
# `--set dashboard.enabled=true` or by setting dashboard.enabled in their
# customer-values.yaml.

namespace: lucairn

replicaCount: 1

image:
  repository: lucairn-dashboard
  # Pinned to the current slice's release tag. Slice 1 = 0.1.0, Slice 2 =
  # 0.2.0, Slice 3 = 0.3.0, Slice 4 = 0.4.0, Slice 5 = 0.5.0, Slice 6 =
  # 0.6.0. Empty fallback maps to Chart.AppVersion in the deployment
  # template — kept that way as the last-resort default. NOTE: this is
  # INDEPENDENT from charts/lucairn/values.yaml global.imageTag —
  # bumping --set global.imageTag=X will NOT bump the dashboard tag.
  # The dashboard ships on its own release cadence.
  tag: "0.6.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8443
  containerPort: 8443

# Bootstrap admin account. Helm generates a random password into a Secret on
# initial install. Operators can either:
#   1) Leave bootstrapAdmin.passwordSecretName empty → Helm generates +
#      stores the secret as ${chartName}-bootstrap-admin.
#   2) Pre-create their own Secret and set bootstrapAdmin.passwordSecretName
#      to its name. The Secret must hold key "password".
#
# Same pattern as charts/lucairn/charts/observability/templates/grafana-deployment.yaml
# (line 40) uses for GF_SECURITY_ADMIN_PASSWORD.
bootstrapAdmin:
  email: "admin@lucairn.local"
  passwordSecretName: ""

# Reserved for future signed-cookie code paths (Slice 1 uses opaque
# in-memory session IDs and does not consume the value). Required so deploys
# do not silently degrade when later slices flip to signed sessions.
sessionSecret: ""

# OIDC SSO is opt-in. When enabled, the dashboard renders a "Sign in
# with SSO" button on the /login surface alongside the local-admin form.
# Local login continues to work regardless of this setting — there is no
# way to disable the local fallback in v1.
#
# Required when oidc.enabled=true:
#   - oidc.issuerURL              issuer base URL (no trailing slash)
#   - oidc.clientID               client_id registered at the IdP
#   - oidc.clientSecretRef.name   K8s Secret holding the client_secret
#   - oidc.clientSecretRef.key    key within that Secret (default "client-secret")
#   - oidc.adminGroup             group name that maps to RoleAdmin
#   - oidc.viewerGroup            group name that maps to RoleViewer
#   - oidc.publicURL              externally-visible dashboard URL — used to
#                                 derive the callback URL when oidc.callbackURL
#                                 is empty. Pin oidc.callbackURL explicitly
#                                 when the IdP-registered URL differs from
#                                 publicURL + /auth/oidc/callback.
#
# Group mapping rules (LOCKED):
#   - Admin group wins. User in BOTH groups → RoleAdmin.
#   - User in neither group → 403, NOT auto-grant viewer.
#   - Missing groups claim → 403.
#
# Operator pre-creates the client-secret Secret before `helm install`:
#   kubectl -n lucairn create secret generic lucairn-dashboard-oidc \
#     --from-literal=client-secret='<your-idp-client-secret>'
oidc:
  enabled: false
  issuerURL: ""
  clientID: ""
  clientSecretRef:
    name: ""
    key: client-secret
  adminGroup: lucairn-admins
  viewerGroup: lucairn-viewers
  groupsClaim: groups
  publicURL: ""
  callbackURL: ""

ingress:
  enabled: false
  className: nginx
  host: dashboard.lucairn.local
  tlsSecret: tls-lucairn-dashboard
  annotations: {}

# ─────────────────────────────────────────────────────────────────
# Slice 3: cert browser + inspector + audit-grade validator.
# ─────────────────────────────────────────────────────────────────
#
# The cert surface is OPTIONAL. Leave the connection-string ref empty
# to ship the dashboard without the cert pages — they render a "not
# configured" explainer instead of attempting to reach the audit DB.
#
# When enabling the cert surface, the operator pre-creates:
#   1. A read-only Postgres role with SELECT on veil_certificates only.
#      (See INSTALL.md § "Audit DB + Witness wiring".)
#   2. A K8s Secret holding the libpq connection string. Recommended
#      shape:
#        kubectl -n lucairn create secret generic lucairn-dashboard-audit-db \
#          --from-literal=connection-string='postgres://lucairn_dashboard_ro:...@postgres-bridge:5432/dsa?sslmode=verify-full'
#
# Group mapping rules already in effect from Slice 2 are unchanged:
# both admin and viewer roles can browse + re-verify certs. API-key
# management (Slice 5) is the first admin-only cert-adjacent surface.
auditDB:
  # K8s Secret with key `connection-string` (libpq URL).
  connectionStringRef:
    name: ""        # required when cert surface is enabled
    key: connection-string

witness:
  # gRPC endpoint of the dsa-veil-witness service inside the customer
  # cluster. The default points at the kit's bundled witness Service DNS:
  # chart name `veil-witness` in namespace `dsa-witness` (per
  # charts/lucairn/charts/veil-witness/templates/service.yaml + values.yaml),
  # cert RPC port 50058 (the upstream cert server listens on :50058 per
  # dual-sandbox-architecture/services/veil-witness/cmd/server/main.go:454).
  endpoint: "veil-witness.dsa-witness.svc.cluster.local:50058"
  # mTLS is reserved for a future slice. v1 speaks plaintext gRPC
  # constrained at the NetworkPolicy / Service mesh layer. Setting
  # tls.enabled=true today is a no-op; the dashboard binary ignores it
  # until the mTLS slice lands.
  tls:
    enabled: false
    # The 3 ref blocks below are scaffolding for the upcoming mTLS
    # slice; populated values are silently ignored by today's image.
    caRef:
      name: ""
      key: ca.crt
    certRef:
      name: ""
      key: tls.crt
    keyRef:
      name: ""
      key: tls.key

# ─────────────────────────────────────────────────────────────────
# Slice 4: server health overview + Grafana embedding plumbing.
# ─────────────────────────────────────────────────────────────────
#
# Health probing is ALWAYS-ON by default — the 12 standard kit
# services get polled every 10 seconds, results render on /health.
# Set `healthServices: "disabled"` to turn polling off entirely.
#
# Grafana embedding is OPT-IN. When `grafana.endpoint` is empty the
# /health cards still render their per-service status pills but the
# side drawer renders a "not configured" placeholder. When set, the
# dashboard signs short-lived (60s) HS256 JWTs against a shared
# secret + the embedded iframe authenticates via the documented
# `auth_token` URL-login mechanism (Grafana [auth.jwt]).
#
# The shared secret has two possible sources:
#   1) Operator sets `grafana.jwt.secretName` to a Secret they
#      pre-created (key: `shared-secret`). Helm leaves it alone.
#   2) `grafana.jwt.secretName` empty → Helm template generates a
#      48-char alphanumeric secret + stores it as
#      ${chartName}-grafana-jwt. The `lookup` pattern in the
#      template preserves it across `helm upgrade`.
#
# The SAME Secret MUST be wired into the observability sub-chart's
# Grafana pod (auth.jwt key_file). See INSTALL.md § "Enable server
# health + Grafana embedding (Slice 4)" for the values you need to
# set on the observability sub-chart side.
grafana:
  # Base URL the iframe loads. The browser hits this URL with the
  # JWT in the auth_token query param + Grafana validates against
  # the shared secret. Leave empty to disable embedding.
  #
  # Common values:
  #   - "https://grafana.lucairn.local" (customer-internal DNS)
  #   - "/grafana"                     (path-prefix mode behind a
  #                                     shared ingress; not v1)
  endpoint: ""

  jwt:
    # When empty, Helm renders ${chartName}-grafana-jwt Secret with a
    # generated 48-char shared secret and `lookup`-preservation across
    # upgrade. When set, the operator pre-creates the Secret + Helm
    # references it as-is.
    secretName: ""
    # Key within the Secret holding the shared secret. Both the
    # dashboard and Grafana pods must read the same key.
    secretKey: shared-secret

  # Per-panel UIDs. The dashboard binds the four canonical kit
  # observability panels into a side drawer; the operator supplies
  # the Grafana panel UIDs out-of-band (Grafana → Edit Dashboard →
  # Share → ID/UID). Empty UID = panel renders "not configured".
  panels:
    gatewayThroughputUID: ""
    sanitizerHitRatesUID: ""
    witnessVerifyRateUID: ""
    auditLogVolumeUID: ""

# Server-health poller knobs.
healthPollIntervalSeconds: 10
# Comma-separated `name=url` overrides. Empty = bundled default
# (12 services covering the kit's standard service mesh). Set to
# the literal "disabled" to turn polling off entirely.
healthServices: ""

# ─────────────────────────────────────────────────────────────────
# Slice 5: API key management (mint / rotate / revoke / bulk).
# ─────────────────────────────────────────────────────────────────
#
# The /keys surface is OPT-IN. Leave gateway.adminURL empty to ship
# the dashboard with /keys rendering the "not configured" explainer
# (auth + shell + cert browser + server health still work).
#
# When enabling /keys, the operator pre-creates a K8s Secret holding
# the gateway's DSA_ADMIN_KEY value at key `admin-token`:
#
#   kubectl -n lucairn create secret generic lucairn-dashboard-gateway-admin \
#     --from-literal=admin-token='<the value of DSA_ADMIN_KEY on the gateway>'
#
# Then set both:
#   - dashboard.gateway.adminURL              http(s)://host:port of the
#                                             gateway admin surface
#                                             (in-cluster default
#                                             "http://gateway:8080").
#   - dashboard.gateway.adminTokenSecretRef.name  the Secret name above.
#
# Setting adminURL without the secretRef.name (or vice versa) fails the
# umbrella-chart render with a `fail` template (Slice 4 pattern #28).
#
# Role rule: /keys is ADMIN ONLY. Viewers reach the route only via
# direct typing and see a 404 (per the locked Slice 1 RequireRole
# 404-not-403 pattern at apps/dashboard/internal/auth/middleware.go:77).
gateway:
  # In-cluster URL of the gateway admin HTTP surface. Leave empty to
  # disable the /keys surface entirely.
  adminURL: ""
  # K8s Secret holding the admin bearer token. The Secret MUST exist
  # in the dashboard namespace; the dashboard pod mounts it via
  # secretKeyRef. Operators rotate by `kubectl patch` + rolling
  # restart (see OPS.md § "Rotating the gateway admin token").
  adminTokenSecretRef:
    name: ""
    key: "admin-token"

# ─────────────────────────────────────────────────────────────────
# Slice 6: audit log browser.
# ─────────────────────────────────────────────────────────────────
#
# The /audit surface is OPT-IN. Leave audit.auditLogDBConnectionStringRef
# empty to ship the dashboard with /audit rendering the "not configured"
# explainer.
#
# IMPORTANT: this connection string points at postgres-audit (the
# AUDIT EVENT LOG), NOT postgres-bridge (the CERT LOG that Slice 3's
# .auditDB.connectionStringRef configures). The two are independent
# databases and require separate Secrets. The dashboard reads both
# at runtime via DISTINCT env vars (LUCAIRN_DASHBOARD_AUDIT_DB_URL
# for certs, LUCAIRN_DASHBOARD_AUDIT_LOG_DB_URL for events).
#
# The role the dashboard connects as MUST have BOTH:
#   - SELECT on audit_events (browsing + render-time PII guard)
#   - INSERT on audit_events (paired audit events for admin reveal-raw
#     + csv_export_with_reveal — without INSERT those flows fail-close
#     with 500 and DO NOT return raw PII).
# Matches the default audit_app role at
# dual-sandbox-architecture/services/audit/migrations/000003_least_privilege_role.up.sql.
#
# Saved filters require an additional table the operator pre-creates
# via apps/dashboard/migrations/000001_create_saved_filters.up.sql.
# Without that table, the surface still works — the saved-filter
# dropdown renders a friendly "apply the dashboard migration" banner.
#
# Operator pre-creates the K8s Secret:
#   kubectl -n lucairn create secret generic lucairn-dashboard-audit-log \
#     --from-literal=url='postgres://audit_app:CHANGE_ME@postgres-audit:5432/audit?sslmode=disable'
audit:
  # K8s Secret with key `url` (libpq postgres URL). Empty = surface
  # disabled. Operators uncomfortable widening audit_app's role can
  # supply a separate connection string at savedFiltersDBConnectionStringRef
  # below (a dedicated dashboard_app role with grants on the new
  # dashboard_saved_filters table only).
  auditLogDBConnectionStringRef:
    name: ""
    key: url
  # Optional: separate connection string for the dashboard_saved_filters
  # table. Empty = re-use auditLogDBConnectionStringRef.
  savedFiltersDBConnectionStringRef:
    name: ""
    key: url

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  # Pod Security Standards "restricted" requires runAsNonRoot to be set at
  # the CONTAINER level, not only the pod level — the pod-level value is
  # advisory and a container can override it. Pin runAsUser to the same
  # non-root UID (65532, nobody) as the pod-level context to keep the two
  # in lockstep on every render.
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]
