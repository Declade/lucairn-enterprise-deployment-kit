{{- if .Values.postgresql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-migrate
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-migrate
    app.kubernetes.io/part-of: dsa
  annotations:
    # K8s Job pod templates are immutable. Without these annotations, `helm
    # upgrade` would fail because Helm tries to mutate `spec.template` on the
    # existing Job (only `metadata`, `parallelism`, `suspend`, `activeDeadline-
    # Seconds`, and `ttlSecondsAfterFinished` are mutable). The pre-install /
    # pre-upgrade hook + before-hook-creation delete policy makes Helm delete
    # the previous Job (if any) before creating the new one each release, so
    # the pod template is recreated from scratch instead of mutated.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-migrate
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      initContainers:
        - name: render-migrations
          # Run from the veil-witness image so the baked-in /migrations source
          # tree is available. cp into the shared volume, then sed-substitute
          # the historical literal 'veil_app_password' with the operator-
          # supplied value. Mirrors scripts/render-migrations.sh in the
          # Compose path.
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              if [ -z "${VEIL_APP_PASSWORD:-}" ]; then
                echo "render-migrations: VEIL_APP_PASSWORD is empty — refusing to render" >&2
                exit 2
              fi
              case "${VEIL_APP_PASSWORD}" in
                *\'*) echo "render-migrations: VEIL_APP_PASSWORD contains a single quote — refusing (would break SQL string / open SQL injection)" >&2; exit 3 ;;
              esac
              case "${VEIL_APP_PASSWORD}" in
                *\\*) echo "render-migrations: VEIL_APP_PASSWORD contains a backslash — refusing (would break SQL string-escape)" >&2; exit 3 ;;
              esac
              cp -r /migrations /shared/migrations
              sed -i "s|'veil_app_password'|'${VEIL_APP_PASSWORD}'|g" \
                /shared/migrations/000002_restrict_veil_role.up.sql
              echo "render-migrations: veil-witness rendered" >&2
          env:
            - name: VEIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: VEIL_APP_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /shared
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: wait-and-migrate
          image: migrate/migrate:v4.17.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z {{ .Chart.Name }}-postgresql 5432; do
                sleep 2
              done
              echo "PostgreSQL ready. Running migrations..."
              migrate -path=/shared/migrations -database="$DATABASE_URL" up
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /shared
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: migrations
          emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
{{- end }}
