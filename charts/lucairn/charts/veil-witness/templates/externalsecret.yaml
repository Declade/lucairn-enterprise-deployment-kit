{{- if ne .Values.secrets.backend "k8s-native" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dsa-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Chart.Name }}-credentials
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: url
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: url
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: url
        {{- end }}
    # Least-privilege runtime DSN (INT-001) — the veil-witness deployment keys
    # on DATABASE_URL_APP (mandatory secretKeyRef, no optional:true). The
    # operator populates this restricted-role url in their secret store exactly
    # as they do the superuser `url`.
    - secretKey: DATABASE_URL_APP
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: url_app
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: url_app
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: url_app
        {{- end }}
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: password
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: password
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: password
        {{- end }}
    {{- if .Values.postgresql.enabled }}
    # App-role password consumed by the migrate Job's render-init container to
    # bake the restricted veil_app role (mandatory secretKeyRef in
    # migration-job.yaml). Only synced when postgresql.enabled=true — the
    # migrate Job (and thus this property) does not exist for external Postgres,
    # where the operator owns role creation out-of-band.
    - secretKey: VEIL_APP_PASSWORD
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: app_password
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: app_password
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: app_password
        {{- end }}
    {{- end }}
    # Stage 3 gateway rebrand: secretKey renamed VEIL_ → LCR_. Vault/AWS/Azure
    # secret-store property names keep their snake_case shape (operator-facing
    # secret-store schema unchanged); only the Kubernetes Secret stringData key
    # is renamed.
    - secretKey: LCR_WITNESS_SIGNING_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: signing_key
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: signing_key
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: signing_key
        {{- end }}
    - secretKey: LCR_WITNESS_KEY_ID
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: key_id
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: key_id
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: key_id
        {{- end }}
{{- end }}
