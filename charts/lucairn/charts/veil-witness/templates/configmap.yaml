apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
data:
  LCR_CLAIM_TIMEOUT: {{ .Values.config.claimTimeout | quote }}
  LCR_TSA_URL: {{ .Values.config.tsaUrl | quote }}
  LCR_REKOR_URL: {{ .Values.config.rekorUrl | quote }}
  LCR_BRIDGE_PUBLIC_KEY: {{ .Values.config.bridgePublicKey | quote }}
  LCR_SANITIZER_PUBLIC_KEY: {{ .Values.config.sanitizerPublicKey | quote }}
  LCR_SANDBOX_B_PUBLIC_KEY: {{ .Values.config.sandboxBPublicKey | quote }}
  LCR_AUDIT_PUBLIC_KEY: {{ .Values.config.auditPublicKey | quote }}
  LCR_PROOF_SPEC_PATH: {{ .Values.config.proofSpecPath | quote }}
  LCR_PROOF_OUTPUT_PATH: {{ .Values.config.proofOutputPath | quote }}
  LCR_PROOF_MODEL_VERSION: {{ .Values.config.proofModelVersion | quote }}
  INSECURE_DEV_MODE: {{ .Values.config.insecureDevMode | quote }}
  # NOTE: LUCAIRN_L3_REQUIRED is intentionally NOT in this ConfigMap.
  # FIX A (Codex r1 P2, 2026-06-19): it now lives DIRECTLY in the witness
  # Deployment pod spec env (veil-witness/templates/deployment.yaml) — the same
  # way the sanitizer (sandbox-a) wires it. A ConfigMap value consumed via
  # `envFrom: configMapRef` does NOT roll the pod on `helm upgrade` when the
  # value changes (no pod-template change), so the witness would have kept the
  # OLD L3 setting while the sanitizer rolled to the NEW one → the two sides
  # disagree → every cert silently downgrades to COMPLETENESS_PARTIAL until a
  # manual restart. Sourcing it from the pod spec makes an L3 change roll BOTH
  # pods together. Divergence between a per-subchart override and the shared
  # global.l3Required is caught LOUDLY at render time by the umbrella guard
  # validators.witnessSanitizerL3Split.
