{{- if eq .Values.secrets.backend "k8s-native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  # Superuser DSN — migrate Job ONLY (runs CREATE ROLE / GRANT).
  DATABASE_URL: "postgres://{{ .Values.postgresql.user }}:{{ .Values.secrets.values.postgresPassword }}@{{ .Chart.Name }}-postgresql:5432/{{ .Values.postgresql.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
  # Least-privilege runtime DSN (INT-001) — the veil-witness deployment
  # connects as the restricted `appUser` (veil_app) created by the
  # 000002_restrict_veil_role migration. Shares the single Postgres instance
  # password in this bundled-postgres model.
  DATABASE_URL_APP: "postgres://{{ .Values.postgresql.appUser }}:{{ .Values.secrets.values.veilAppPassword }}@{{ .Chart.Name }}-postgresql:5432/{{ .Values.postgresql.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
  POSTGRES_PASSWORD: {{ .Values.secrets.values.postgresPassword | quote }}
  {{- else }}
  DATABASE_URL: {{ .Values.external.databaseUrl | quote }}
  # External Postgres: the operator owns role selection in their connection
  # string, so the runtime DSN falls back to the same operator-supplied URL.
  DATABASE_URL_APP: {{ .Values.external.databaseUrl | quote }}
  {{- end }}
  VEIL_WITNESS_SIGNING_KEY: {{ .Values.secrets.values.signingKey | quote }}
  VEIL_WITNESS_KEY_ID: {{ .Values.secrets.values.keyId | quote }}
  VEIL_APP_PASSWORD: {{ .Values.secrets.values.veilAppPassword | quote }}
{{- end }}
