apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      # Graceful connection draining on rolling restart / node drain (HA-04).
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        # Migration-completion gate (rehearsal fix 2026-06-19). The runtime
        # witness connects as the restricted `veil_app` role (LCR_DB_URL =
        # DATABASE_URL_APP), which does not exist until the
        # 000002_restrict_veil_role migration Job runs CREATE ROLE. Without this
        # gate the witness Deployment starts before the migration and
        # CrashLoopBackOffs with `password authentication failed for user
        # "veil_app"` until the migration completes, then self-heals — a
        # scary-but-transient CrashLoopBackOff on a no-shell-access deliverable.
        # Same dependency class + same fix as the audit subchart. Block startup
        # until an AUTHENTICATED connection as veil_app succeeds (proves postgres
        # is up AND the migration created+granted the role — stronger than
        # pg_isready). Mirrors the gateway wait-for-postgres initContainer.
        - name: wait-for-migration
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for veil-witness migration (veil_app role) to be ready..."
              for i in $(seq 1 150); do
                if psql "$DATABASE_URL_APP" -tAc 'SELECT 1' >/dev/null 2>&1; then
                  echo "veil_app role ready — migration complete."
                  exit 0
                fi
                sleep 2
              done
              echo "veil_app role not ready after 5 min — failing initContainer." >&2
              exit 1
          env:
            - name: DATABASE_URL_APP
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL_APP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LCR_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  # INT-001 least-privilege: runtime connects as the restricted
                  # veil_app role, NOT the migrate-only superuser DATABASE_URL.
                  key: DATABASE_URL_APP
            # Stage 3 gateway rebrand: env-var names renamed VEIL_ → LCR_.
            # The veil-witness image (v0.5.0+) accepts both forms via envcompat
            # fallback at boot, so legacy operator-managed Secrets with VEIL_
            # keys are still readable; new chart-rendered Secrets emit LCR_.
            - name: LCR_WITNESS_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: LCR_WITNESS_SIGNING_KEY
            - name: LCR_WITNESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: LCR_WITNESS_KEY_ID
            # L3-required flag — MUST agree with the sanitizer (sandbox-a) or the
            # witness downgrades every cert to COMPLETENESS_PARTIAL. The witness
            # binary reads this (verifier.go:170-172,503) and "mirrors
            # config.l3_required() in the sanitizer so the two sides agree".
            #
            # FIX A (Codex r1 P2, 2026-06-19): this env lives in the POD SPEC,
            # NOT the ConfigMap consumed via envFrom. An envFrom-sourced value
            # does NOT update in-place when `helm upgrade` changes the ConfigMap
            # (no pod-template change ⇒ no rollout), so the witness would keep
            # the OLD L3 value while the sanitizer — whose value is already in
            # its pod spec — rolls to the NEW one, leaving the two sides in
            # disagreement until a manual restart. Putting the value here makes
            # a change to global.l3Required change the pod template, triggering a
            # rollout in lockstep with the sanitizer.
            #
            # RESOLUTION (FIX B.i): resolve from global.l3Required (default
            # false) — the ONE shared knob the witness subchart can actually see
            # (subchart value isolation hides the sibling sandbox-a's
            # sanitizer.l3Required). Any per-subchart override that diverges from
            # the global is caught LOUDLY at render time by the umbrella guard
            # validators.witnessSanitizerL3Split (charts/lucairn/templates/
            # _validators.tpl) — there is no silent one-sided override path here.
            # hasKey (NOT `| default`) so an explicit global false is honored
            # (Sprig's `default` treats boolean false as empty and would clobber
            # it back to "false" anyway, but hasKey keeps the intent explicit).
            - name: LUCAIRN_L3_REQUIRED
              value: {{ if hasKey .Values.global "l3Required" }}{{ .Values.global.l3Required | quote }}{{ else }}{{ "false" | quote }}{{ end }}
            {{- if .Values.witnessMtls.serverSecret }}
            # TOB-S009 / fable HIGH (2026-06-10): opt-in witness server-side mTLS.
            # When witnessMtls.serverSecret is set the witness reads these three
            # paths to enable mutual-TLS on the cert RPC port (:50058).
            # When unset the witness degrades gracefully to unauthenticated
            # (mirrors docker-compose.customer.yml:596-610 graceful-degradation
            # comment). LCR_WITNESS_SIGNING_KEY is defined above in the same
            # env: block — there is exactly ONE env: key on this container.
            - name: WITNESS_MTLS_CA_BUNDLE_PATH
              value: "{{ .Values.witnessMtls.mountPath }}/{{ .Values.witnessMtls.caBundle }}"
            - name: WITNESS_MTLS_SERVER_CERT_PATH
              value: "{{ .Values.witnessMtls.mountPath }}/{{ .Values.witnessMtls.serverCert }}"
            - name: WITNESS_MTLS_SERVER_KEY_PATH
              value: "{{ .Values.witnessMtls.mountPath }}/{{ .Values.witnessMtls.serverKey }}"
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
          ports:
            - name: claim
              containerPort: {{ .Values.service.claimPort }}
              protocol: TCP
            - name: cert
              containerPort: {{ .Values.service.certPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if and .Values.gracefulShutdown (gt (int (.Values.gracefulShutdown.preStopSleepSeconds | default 0)) 0) }}
          # preStop drain delay (HA-04): hold the container open while
          # kube-proxy removes this pod from Service endpoints, so in-flight
          # requests are not dropped on rolling restart / node drain. The
          # runtime image is alpine, so /bin/sh + sleep are available.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ int .Values.gracefulShutdown.preStopSleepSeconds }}"]
          {{- end }}
          {{- if .Values.witnessMtls.serverSecret }}
          volumeMounts:
            - name: witness-mtls-certs
              mountPath: {{ .Values.witnessMtls.mountPath | quote }}
              readOnly: true
          {{- end }}
      {{- if .Values.witnessMtls.serverSecret }}
      volumes:
        - name: witness-mtls-certs
          secret:
            secretName: {{ .Values.witnessMtls.serverSecret }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
