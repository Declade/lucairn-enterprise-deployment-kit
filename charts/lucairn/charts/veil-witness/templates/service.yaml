apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.claimPort }}
      targetPort: claim
      name: claim
    - port: {{ .Values.service.certPort }}
      targetPort: cert
      name: cert
    - port: {{ .Values.service.healthPort }}
      targetPort: health
      name: health
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
