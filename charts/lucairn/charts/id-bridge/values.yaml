namespace: dsa-bridge

# v1.0 ships single-replica id-bridge. While the pending-relinkage store
# IS Postgres-backed (services/id-bridge/cmd/server/main.go:234), the
# Policy object also holds an in-memory cache (services/id-bridge/internal/
# relinkage/relinkage.go — `p.pending map[string]*PendingRelinkage`) and
# runs a per-pod SweepExpired goroutine every 60s. With multi-replica:
#   1. Each pod runs its own SweepExpired loop → double `relinkage.expired`
#      audit emits for the same expired row.
#   2. Pod A's cache won't see pod B's resolve until pod A queries
#      postgres (read-through happens only on cache miss in resolveCtx).
#      Pod A's stale cache could re-emit relinkage.* audit events for an
#      already-resolved row.
#   3. The pending-list endpoint mixes the in-memory snapshot path and
#      the store path inconsistently across replicas.
# Compose works because it runs ONE id-bridge container.
#
# Multi-replica id-bridge is a v2.0 design (lease-based SweepExpired
# coordination + cache-invalidation pubsub). Until then, leave
# replicaCount=1 + hpa.enabled=false; the umbrella validator
# (validators.idBridgeSingleReplica) fails-fast on any operator who flips
# either knob without the v2.0 backend ready.
#
# Vast cascade I sweep (fix-up #15, 2026-05-26): id-bridge shares the
# veil-witness defect class — pod-local state cannot be safely split
# across replicas via standard K8s Service load-balancing, even when a
# postgres-backed store is wired alongside the cache.
replicaCount: 1

image:
  repository: dsa-id-bridge
  tag: ""
  pullPolicy: IfNotPresent

service:
  grpcPort: 50052
  healthPort: 8082

auditServiceAddr: "audit.dsa-audit.svc:50051"
veilEnabled: "true"
veilWitnessAddr: "veil-witness.dsa-witness.svc.cluster.local:50057"
grpcTlsEnabled: "false"
encryptionEnabled: "true"
encryptionProvider: "local"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# v1.0 ships HPA disabled — see replicaCount comment above. The in-memory
# pending cache + SweepExpired goroutine are pod-local; HPA scaling
# beyond 1 replica produces double-audit-emit and stale-cache races.
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilization: 70

pdb:
  # v1.0 single-replica lock: the PDB only renders at replicaCount >= 2
  # (the v2.0 multi-replica unlock). On a single-replica workload a PDB
  # with minAvailable: 1 makes `kubectl drain` hang forever, so v1.0
  # renders no PDB. When 2+ replicas run, maxUnavailable lets drain evict
  # one pod at a time. See templates/pdb.yaml.
  enabled: true
  maxUnavailable: 1

# Graceful shutdown / connection draining on rolling restart + node drain
# (HA-04). On pod termination the kubelet sends SIGTERM and removes the pod
# from Service endpoints CONCURRENTLY — without a drain delay, in-flight
# requests routed just before endpoint removal are dropped. The preStop
# sleep holds the container open while kube-proxy propagates the endpoint
# removal across nodes, then the process exits gracefully.
# terminationGracePeriodSeconds MUST exceed preStopSleepSeconds.
gracefulShutdown:
  # Seconds to sleep in preStop before SIGTERM, letting endpoint removal
  # propagate. 0 disables the preStop hook entirely.
  preStopSleepSeconds: 5
terminationGracePeriodSeconds: 30

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storageSize: 10Gi
  storageClass: ""
  user: dsa
  database: bridge

external:
  databaseUrl: ""

secrets:
  backend: k8s-native
  values:
    # PRODUCTION: MUST override with a strong, unique password.
    postgresPassword: "CHANGE-ME-IN-PRODUCTION"
    masterKey: ""
    veilSigningKey: ""
    bridgeEncryptionKey: ""
    dsaServiceToken: ""  # PRODUCTION: set via existingSecret or --set; dev: inline value
  vault:
    path: "bridge"
  aws:
    name: "dsa/bridge"
  azure:
    name: "dsa-bridge"
