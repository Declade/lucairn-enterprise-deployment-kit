namespace: dsa-bridge

replicaCount: 2

image:
  repository: dsa-id-bridge
  tag: ""
  pullPolicy: IfNotPresent

service:
  grpcPort: 50052
  healthPort: 8082

auditServiceAddr: "audit.dsa-audit.svc:50051"
veilEnabled: "true"
veilWitnessAddr: "veil-witness.dsa-witness.svc.cluster.local:50057"
grpcTlsEnabled: "false"
encryptionEnabled: "true"
encryptionProvider: "local"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

pdb:
  enabled: true
  minAvailable: 1

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storageSize: 10Gi
  storageClass: ""
  user: dsa
  database: bridge

external:
  databaseUrl: ""

secrets:
  backend: k8s-native
  values:
    # PRODUCTION: MUST override with a strong, unique password.
    postgresPassword: "CHANGE-ME-IN-PRODUCTION"
    masterKey: ""
    veilSigningKey: ""
    bridgeEncryptionKey: ""
    dsaServiceToken: ""  # PRODUCTION: set via existingSecret or --set; dev: inline value
  vault:
    path: "dsa/data/bridge"
  aws:
    name: "dsa/bridge"
  azure:
    name: "dsa-bridge"
