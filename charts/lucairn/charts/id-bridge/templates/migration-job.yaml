{{- if .Values.postgresql.enabled }}
# Migration Job uses .Release.Revision-suffixed name so each helm release
# creates a NEW Job resource. Kubernetes treats Job spec.template as
# immutable for existing resources; versioned names sidestep the
# immutability constraint while keeping migrations as normal resources
# that apply in the regular install order (after Secrets + Postgres +
# Phase-2 imagePullSecret replication).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-migrate-r{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-migrate
    app.kubernetes.io/part-of: dsa
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-migrate
    spec:
      # NET-05: this pod never calls the Kubernetes API; using the
      # namespace default ServiceAccount it would still auto-mount an
      # unused token. Disable the mount at the pod level.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      initContainers:
        - name: copy-migrations
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          command: ["cp", "-r", "/migrations", "/shared/migrations"]
          volumeMounts:
            - name: migrations
              mountPath: /shared
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: wait-and-migrate
          image: migrate/migrate:v4.17.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z {{ .Chart.Name }}-postgresql 5432; do
                sleep 2
              done
              echo "PostgreSQL ready. Running migrations..."
              migrate -path=/shared/migrations -database="$DATABASE_URL" up
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /shared
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: migrations
          emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
{{- end }}
