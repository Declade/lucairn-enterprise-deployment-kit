apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      # Graceful connection draining on rolling restart / node drain (HA-04).
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-addr=:{{ .Values.service.grpcPort }}"
            - "-health-addr=:{{ .Values.service.healthPort }}"
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
          env:
            - name: BRIDGE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL
            - name: BRIDGE_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: MASTER_KEY
            - name: AUDIT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: AUDIT_SERVICE_ADDR
            - name: VEIL_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: VEIL_SIGNING_KEY
            - name: DSA_BRIDGE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_BRIDGE_ENCRYPTION_KEY
            - name: DSA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_SERVICE_TOKEN
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if and .Values.gracefulShutdown (gt (int (.Values.gracefulShutdown.preStopSleepSeconds | default 0)) 0) }}
          # preStop drain delay (HA-04): hold the container open while
          # kube-proxy removes this pod from Service endpoints, so in-flight
          # requests are not dropped on rolling restart / node drain. The
          # runtime image is alpine, so /bin/sh + sleep are available.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ int .Values.gracefulShutdown.preStopSleepSeconds }}"]
          {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
