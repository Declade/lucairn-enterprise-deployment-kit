apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
# NET-05: this service's pods never call the Kubernetes API, so the
# auto-mounted SA token is unused attack surface. Disable it.
automountServiceAccountToken: false
