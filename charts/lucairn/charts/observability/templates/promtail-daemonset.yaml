apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: dsa
    app.kubernetes.io/component: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        app.kubernetes.io/part-of: dsa
        app.kubernetes.io/component: observability
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0
      containers:
        - name: promtail
          image: "{{ .Values.promtail.image.repository }}:{{ .Values.promtail.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - DAC_READ_SEARCH
            readOnlyRootFilesystem: true
          args:
            - -config.file=/etc/promtail/promtail.yaml
          resources:
            requests:
              cpu: {{ .Values.promtail.resources.requests.cpu }}
              memory: {{ .Values.promtail.resources.requests.memory }}
            limits:
              cpu: {{ .Values.promtail.resources.limits.cpu }}
              memory: {{ .Values.promtail.resources.limits.memory }}
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods-log
              mountPath: /var/log/pods
              readOnly: true
            - name: run
              mountPath: /run/promtail
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods-log
          hostPath:
            path: /var/log/pods
        - name: run
          hostPath:
            path: /run/promtail
