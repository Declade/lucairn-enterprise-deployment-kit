apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: dsa
    app.kubernetes.io/component: observability
data:
  loki.yaml: |
    auth_enabled: {{ .Values.loki.authEnabled | default false }}
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: {{ .Values.loki.retention }}
    # OBS-09: without a compactor running with retention_enabled, the
    # limits_config.retention_period above is advisory only — chunks are never
    # actually deleted and the Loki PVC grows unbounded. The compactor scans
    # the TSDB index, marks expired streams, and deletes their chunks from the
    # filesystem object store. delete_request_store is mandatory in Loki 3.x
    # when retention_enabled is true.
    compactor:
      working_directory: /loki/compactor
      delete_request_store: filesystem
      retention_enabled: true
      retention_delete_delay: 2h
      compaction_interval: 10m
