namespace: dsa-observability

grafana:
  image:
    repository: grafana/grafana
    tag: "11.4.0"
  # PRODUCTION: Override this value — deployment will use a known-weak default otherwise.
  adminPassword: "CHANGE-ME-IN-PRODUCTION"
  # PRODUCTION: Set to your VPN/admin CIDR (e.g., "10.10.0.0/24") to restrict
  # Grafana UI access. When empty, the NetworkPolicy restricts access to the
  # dsa-edge namespace only. Setting this overrides namespace-based restriction.
  adminCIDR: ""
  storageSize: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # ─────────────────────────────────────────────────────────────────
  # Slice 4 — Lucairn Enterprise Dashboard JWT embed handoff.
  # ─────────────────────────────────────────────────────────────────
  #
  # When enabled, Grafana is configured with [auth.jwt] so the Lucairn
  # dashboard can embed Grafana panels with a short-lived (60s) HS256
  # JWT carried in the `auth_token` URL query parameter (the documented
  # Grafana url_login mechanism).
  #
  # The shared secret is mounted as a single-line file at
  # /etc/grafana/jwt/shared-secret and referenced via Grafana's
  # [auth.jwt].key_file env var (Grafana parses single-line files as
  # the HMAC key).
  #
  # The SAME Secret MUST be referenced by BOTH:
  #   - this sub-chart's grafana.auth.jwt.secretRef (read by Grafana)
  #   - the dashboard sub-chart's dashboard.grafana.jwt.secretName
  #     (read by the dashboard pod's grafana.Signer)
  # The dashboard sub-chart auto-generates a Secret named
  # `lucairn-dashboard-grafana-jwt` when its
  # `dashboard.grafana.jwt.secretName` is left empty. To use that
  # default, set this sub-chart's auth.jwt.secretRef.name to the same
  # value. See INSTALL.md § "Enable server health + Grafana embedding".
  auth:
    jwt:
      # Master switch. Off by default — Grafana stays in classic
      # username/password mode until the operator wires the shared
      # Secret on both sides.
      enabled: false
      secretRef:
        # Secret name (typically `lucairn-dashboard-grafana-jwt`).
        name: ""
        # Key within the Secret holding the HMAC shared secret.
        key: shared-secret
      # The dashboard's issuer + audience constants (see
      # apps/dashboard/internal/grafana/jwt.go). DO NOT change without
      # a coordinated dashboard + grafana redeploy.
      issuer: "lucairn-dashboard"
      audience: "grafana"
      # Cross-chart secret reference: the dashboard sub-chart's
      # secret-grafana-jwt.yaml auto-renders the SAME Secret in this
      # namespace (in addition to the dashboard namespace) when
      # `dashboard.grafana.endpoint` is set + `dashboard.grafana.jwt.secretName`
      # is empty. The Secret is volume-mounted directly to
      # /etc/grafana/jwt/shared-secret on the Grafana pod (see
      # templates/grafana-deployment.yaml) and read via
      # GF_AUTH_JWT_KEY_FILE. No init container is involved.

loki:
  image:
    repository: grafana/loki
    tag: "3.3.0"
  authEnabled: true  # Secure by default; override to false in values-dev.yaml if needed
  retention: "720h"  # 30 days
  storageSize: 20Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

promtail:
  image:
    repository: grafana/promtail
    tag: "3.3.0"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

tempo:
  image:
    repository: grafana/tempo
    tag: "2.6.0"
  retention: "168h"  # 7 days
  storageSize: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

serviceMonitors:
  enabled: false  # Requires Prometheus Operator CRDs

secrets:
  backend: k8s-native
  values:
    # PRODUCTION: MUST override — will fail authentication if left as default.
    grafanaAdminPassword: "CHANGE-ME-IN-PRODUCTION"
