apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      # Graceful connection draining on rolling restart / node drain (HA-04).
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.global.nodeIsolation }}
      # Node pool isolation: Sandbox B and Sandbox A must never share a node.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: dsa.io/zone
                    operator: In
                    values:
                      - ai
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - sandbox-a
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: dsa.io/zone
          operator: Equal
          value: ai
          effect: NoSchedule
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
            - secretRef:
                name: {{ .Chart.Name }}-credentials
          env:
            - name: SANDBOX_A_PROBE_TARGET
              value: "sandbox-a.dsa-identity.svc.cluster.local:50053"
            - name: ENABLE_TEST_PROVIDER
              value: {{ .Values.enableTestProvider | quote }}
            - name: PROOFLOG_ENABLED
              value: {{ .Values.prooflog.enabled | quote }}
            - name: PROOFLOG_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-prooflog
                  key: signing-key
                  optional: true
            - name: PROOFLOG_POLICIES
              value: {{ .Values.prooflog.policies | quote }}
            {{- if .Values.externalInvariantUrl }}
            - name: SANDBOX_B_EXTERNAL_INVARIANT_URL
              value: {{ .Values.externalInvariantUrl | quote }}
            - name: SANDBOX_B_EXTERNAL_INVARIANT_TLS_INSECURE
              value: {{ .Values.externalInvariantTlsInsecure | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: verticals
              mountPath: /app/verticals
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.global.mtls.enabled }}
            - name: enterprise-mtls
              mountPath: {{ .Values.global.mtls.mountPath | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if and .Values.gracefulShutdown (gt (int (.Values.gracefulShutdown.preStopSleepSeconds | default 0)) 0) }}
          # preStop drain delay (HA-04): hold the container open while
          # kube-proxy removes this pod from Service endpoints, so in-flight
          # requests are not dropped on rolling restart / node drain. The
          # runtime image is python:3.12-slim, so /bin/sh + sleep are available.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ int .Values.gracefulShutdown.preStopSleepSeconds }}"]
          {{- end }}
      volumes:
        - name: verticals
          projected:
            sources:
              {{- range $name, $vertical := .Values.verticals }}
              - configMap:
                  name: {{ $.Chart.Name }}-verticals-{{ $name }}
                  items:
                    - key: config.yaml
                      path: {{ $name }}/config.yaml
                    {{- range $promptName, $_ := $vertical.prompts }}
                    - key: prompts--{{ $promptName }}.txt
                      path: {{ $name }}/prompts/{{ $promptName }}.txt
                    {{- end }}
              {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.global.mtls.enabled }}
        - name: enterprise-mtls
          secret:
            secretName: {{ .Values.global.mtls.secrets.sandboxB }}
            items:
              - key: {{ .Values.global.mtls.caBundleKey }}
                path: {{ .Values.global.mtls.caBundleKey }}
              - key: {{ .Values.global.mtls.certKey }}
                path: {{ .Values.global.mtls.certKey }}
              - key: {{ .Values.global.mtls.keyKey }}
                path: {{ .Values.global.mtls.keyKey }}
        {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
