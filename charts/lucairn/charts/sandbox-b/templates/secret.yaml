{{- if and (eq (default "" $.Values.global.dsaEnv) "production") (eq .Values.redis.enabled true) (eq .Values.secrets.backend "k8s-native") (or (eq .Values.redis.password "") (eq .Values.redis.password "CHANGE-ME-generate-random-at-install") (eq .Values.redis.password "dev-only-redis-password")) }}
{{- fail "SECURITY: sandbox-b.redis.password must be set to a real secret in production (not empty, not a placeholder)" }}
{{- end }}
{{- if eq .Values.secrets.backend "k8s-native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  {{- if .Values.redis.enabled }}
  {{- if .Values.redis.password }}
  SANDBOX_B_REDIS_URL: "redis://:{{ .Values.redis.password }}@{{ .Chart.Name }}-redis:6379"
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- else }}
  SANDBOX_B_REDIS_URL: "redis://{{ .Chart.Name }}-redis:6379"
  {{- end }}
  {{- else }}
  SANDBOX_B_REDIS_URL: {{ .Values.external.redisUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.values.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.values.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.values.mistralApiKey }}
  MISTRAL_API_KEY: {{ .Values.secrets.values.mistralApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.values.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.values.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.values.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.secrets.values.geminiApiKey | quote }}
  {{- end }}
  VEIL_SIGNING_KEY: {{ .Values.secrets.values.veilSigningKey | quote }}
  SANDBOX_B_API_KEYS: {{ .Values.secrets.values.sandboxBApiKeys | quote }}
  DSA_ADMIN_KEY: {{ .Values.secrets.values.adminKey | quote }}
  {{- if .Values.secrets.values.dsaManagedAiKey }}
  DSA_MANAGED_AI_KEY: {{ .Values.secrets.values.dsaManagedAiKey | quote }}
  {{- end }}
{{- end }}
