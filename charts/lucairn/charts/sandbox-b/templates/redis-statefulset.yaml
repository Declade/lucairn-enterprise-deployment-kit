{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-redis
    app.kubernetes.io/part-of: dsa
spec:
  serviceName: {{ .Chart.Name }}-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-redis
        app.kubernetes.io/part-of: dsa
    spec:
      # NET-05: this pod never calls the Kubernetes API; using the
      # namespace default ServiceAccount it would still auto-mount an
      # unused token. Disable the mount at the pod level.
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          {{- /* External-backend Kind custody supplies REDIS_PASSWORD through the
                pre-created target Secret. It must not require an inline Helm
                value merely to make the bundled Redis StatefulSet authenticate. */}}
          {{- if or .Values.redis.password (ne .Values.secrets.backend "k8s-native") }}
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - {{ .Values.redis.maxmemory | quote }}
            - "--maxmemory-policy"
            - {{ .Values.redis.maxmemoryPolicy | quote }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: REDIS_PASSWORD
          {{- else }}
          args:
            - "--maxmemory"
            - {{ .Values.redis.maxmemory | quote }}
            - "--maxmemory-policy"
            - {{ .Values.redis.maxmemoryPolicy | quote }}
          {{- end }}
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli {{- if .Values.redis.password }} -a $REDIS_PASSWORD --no-auth-warning{{- end }} ping"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli {{- if .Values.redis.password }} -a $REDIS_PASSWORD --no-auth-warning{{- end }} ping"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-redis-data
{{- end }}
