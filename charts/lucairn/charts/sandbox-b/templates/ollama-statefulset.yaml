{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}-ollama
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-ollama
    app.kubernetes.io/part-of: dsa
spec:
  serviceName: {{ .Chart.Name }}-ollama
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-ollama
        app.kubernetes.io/part-of: dsa
    spec:
      # NET-05: this pod never calls the Kubernetes API; using the
      # namespace default ServiceAccount it would still auto-mount an
      # unused token. Disable the mount at the pod level.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          startupProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["ollama", "list"]
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: {{ (.Values.ollama.resources).requests.cpu | default "500m" }}
              # FIX-A (full-stack-test-results-2026-05-29): the L3-capable model
              # (qwen2.5:7b, hardcoded in the sanitizer configmap) needs ~6-8Gi
              # resident. The previous 2Gi limit OOMKilled it mid-inference ->
              # gateway 500. Default the request high enough to schedule the
              # real model; override via .Values.ollama.resources for tinyllama.
              memory: {{ (.Values.ollama.resources).requests.memory | default "2Gi" }}
            limits:
              cpu: {{ (.Values.ollama.resources).limits.cpu | default "2000m" }}
              # FIX-A: raised 2Gi -> 8Gi default so bundled ollama can run the
              # qwen2.5:7b L3 PII shield without OOMKill. Exposed as a chart
              # value (.Values.ollama.resources.limits.memory) so operators
              # running only the small upstream model can lower it.
              memory: {{ (.Values.ollama.resources).limits.memory | default "8Gi" }}
              {{- if .Values.ollama.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count }}
              {{- end }}
      {{- if .Values.ollama.gpu.enabled }}
      nodeSelector:
        gpu-capable: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-ollama-data
{{- end }}
