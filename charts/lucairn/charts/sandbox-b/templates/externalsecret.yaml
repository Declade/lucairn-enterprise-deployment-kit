{{- if ne .Values.secrets.backend "k8s-native" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dsa-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Chart.Name }}-credentials
  data:
    - secretKey: SANDBOX_B_REDIS_URL
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: redis-url
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: redis-url
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: redis-url
        {{- end }}
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: anthropic-api-key
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: anthropic-api-key
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: anthropic-api-key
        {{- end }}
    - secretKey: MISTRAL_API_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: mistral-api-key
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: mistral-api-key
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: mistral-api-key
        {{- end }}
    - secretKey: OPENAI_API_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: openai-api-key
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: openai-api-key
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: openai-api-key
        {{- end }}
    - secretKey: GEMINI_API_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: gemini-api-key
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: gemini-api-key
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: gemini-api-key
        {{- end }}
    - secretKey: LCR_SIGNING_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilSigningKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilSigningKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilSigningKey
        {{- end }}
    - secretKey: SANDBOX_B_API_KEYS
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: sandboxBApiKeys
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: sandboxBApiKeys
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: sandboxBApiKeys
        {{- end }}
    - secretKey: DSA_ADMIN_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: adminKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: adminKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: adminKey
        {{- end }}
    - secretKey: DSA_MANAGED_AI_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: dsaManagedAiKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: dsaManagedAiKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: dsaManagedAiKey
        {{- end }}
    {{- /*
      Inter-service auth + license (Vast cascade BLOCKER B, 2026-05-26).
      Both are SHARED secrets — vault path uses the umbrella-level keys so
      the same value is consumed by gateway / audit / id-bridge / sandbox-a /
      sandbox-b without divergence.
    */}}
    - secretKey: DSA_SERVICE_TOKEN
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: dsaServiceToken
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: dsaServiceToken
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: dsaServiceToken
        {{- end }}
    - secretKey: DSA_LICENSE_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: licenseKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: licenseKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: licenseKey
        {{- end }}
{{- end }}
