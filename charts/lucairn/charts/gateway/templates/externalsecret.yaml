{{- if ne .Values.secrets.backend "k8s-native" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dsa-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Chart.Name }}-credentials
  data:
    - secretKey: DSA_LICENSE_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: licenseKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: licenseKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: licenseKey
        {{- end }}
    - secretKey: DSA_LICENSE_SIGNING_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: licenseSigningKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: licenseSigningKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: licenseSigningKey
        {{- end }}
    # Deployment entitlement license (Ed25519, offline). The signed token +
    # the verification public key, delivered the same way as the platform
    # license above so the gateway picks them up via envFrom.
    - secretKey: LUCAIRN_LICENSE_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: lucairnLicenseKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: lucairnLicenseKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: lucairnLicenseKey
        {{- end }}
    - secretKey: LUCAIRN_LICENSE_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: lucairnLicensePublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: lucairnLicensePublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: lucairnLicensePublicKey
        {{- end }}
    - secretKey: DSA_ADMIN_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: adminKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: adminKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: adminKey
        {{- end }}
    - secretKey: SANDBOX_B_API_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: sandboxBApiKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: sandboxBApiKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: sandboxBApiKey
        {{- end }}
    - secretKey: LCR_MANIFEST_SIGNING_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilManifestSigningKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilManifestSigningKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilManifestSigningKey
        {{- end }}
    # Stage 3 gateway rebrand: kit-side env-var name renamed VEIL_ → LCR_.
    # Vault/AWS/Azure secret-store PROPERTY names keep their camelCase shape
    # (operator-facing schema unchanged); only the Kubernetes Secret stringData
    # KEY (= the env-var name in the pod) is renamed. Gateway image v0.5.0+
    # accepts the legacy VEIL_WITNESS_PUBLIC_KEY at runtime via fallback.
    - secretKey: LCR_WITNESS_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilWitnessPublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilWitnessPublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilWitnessPublicKey
        {{- end }}
    - secretKey: LCR_BRIDGE_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilBridgePublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilBridgePublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilBridgePublicKey
        {{- end }}
    - secretKey: LCR_SANITIZER_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilSanitizerPublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilSanitizerPublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilSanitizerPublicKey
        {{- end }}
    - secretKey: LCR_SANDBOX_B_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilSandboxBPublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilSandboxBPublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilSandboxBPublicKey
        {{- end }}
    - secretKey: LCR_AUDIT_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilAuditPublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilAuditPublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilAuditPublicKey
        {{- end }}
    - secretKey: DSA_SERVICE_TOKEN
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: dsaServiceToken
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: dsaServiceToken
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: dsaServiceToken
        {{- end }}
    # LSM-001 / DRIFT-001: gateway-side dsa-ai signing key for the
    # Sensitive Mode seal-cert flow. See secret.yaml header for the
    # operator-warning behaviour when this is unset.
    - secretKey: LCR_AI_SIGNING_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilAISigningKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilAISigningKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilAISigningKey
        {{- end }}
    # AES-256 key (base64 32 bytes) for gateway keystore-at-rest encryption (#17).
    # REQUIRED whenever GATEWAY_KEYSTORE_PATH is set. Gateway fails-closed at
    # startup if missing, malformed, or wrong length. The k8s-native backend
    # provisions this via secrets.values.gatewayKeystoreKey (see values.yaml +
    # the install-time NOTES.txt warning).
    - secretKey: GATEWAY_KEYSTORE_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: gatewayKeystoreKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: gatewayKeystoreKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: gatewayKeystoreKey
        {{- end }}
    # M6 — four keys present in secret.yaml (19) but previously absent from
    # this ESO template (15), causing cold-restore to crash-loop the gateway.
    # Added Slice 3 / PRD selfhosted-kit-deal1-readiness (2026-06-19).
    # Ed25519 seed (64-char hex) for gateway-emitted GATEWAY_REQUEST_COMPLETED
    # claim signing. Required when DSA_ENV=production + veilEnabled=true.
    - secretKey: LCR_GATEWAY_SIGNING_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilGatewaySigningKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilGatewaySigningKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilGatewaySigningKey
        {{- end }}
    # Ed25519 public key paired with LCR_GATEWAY_SIGNING_KEY; published by the
    # gateway at /.well-known/veil-keys.json for external SDK verifier validation.
    - secretKey: LCR_GATEWAY_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilGatewayPublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilGatewayPublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilGatewayPublicKey
        {{- end }}
    # Manifest public key for gateway-side cert-chain manifest wiring
    # (Vast cascade H, 2026-05-26). Missing = /.well-known/veil-keys.json
    # short the keys[] payload → verifier downgrades overall_verdict to PARTIAL.
    - secretKey: LCR_GATEWAY_MANIFEST_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilGatewayManifestPublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilGatewayManifestPublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilGatewayManifestPublicKey
        {{- end }}
    # Witness manifest public key for cert-chain assembler tie-back.
    # Missing = cert assembler can't validate witness claims →
    # verifier surfaces missing_services and downgrades verdict to PARTIAL.
    - secretKey: LCR_WITNESS_MANIFEST_PUBLIC_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilWitnessManifestPublicKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilWitnessManifestPublicKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilWitnessManifestPublicKey
        {{- end }}
    # NOTE — GATEWAY_KEYSTORE_DSN is intentionally NOT in this ESO template.
    # It is wired as a separate secretKeyRef in deployment.yaml:96-101 inside
    # the `postgresKeystore.enabled` block. On an ESO backend you MUST
    # pre-create the DSN secret independently and set
    # `gateway.postgresKeystore.dsnSecretRef.name/key` in your values — the
    # gateway crash-loops on cold-restore if this secret is missing when
    # `postgresKeystore.enabled: true`. The main gateway-credentials Secret
    # above (provisioned by this ExternalSecret) does NOT carry the DSN.
{{- end }}
