{{- if eq .Values.secrets.backend "k8s-native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  {{- /* Prefer umbrella global.dsaLicenseKey; fall back to per-subchart slot. Vast cascade BLOCKER B sibling, 2026-05-26. */}}
  DSA_LICENSE_KEY: {{ default .Values.secrets.values.licenseKey .Values.global.dsaLicenseKey | quote }}
  DSA_LICENSE_SIGNING_KEY: {{ .Values.secrets.values.licenseSigningKey | quote }}
  DSA_ADMIN_KEY: {{ .Values.secrets.values.adminKey | quote }}
  SANDBOX_B_API_KEY: {{ .Values.secrets.values.sandboxBApiKey | quote }}
  VEIL_MANIFEST_SIGNING_KEY: {{ .Values.secrets.values.veilManifestSigningKey | quote }}
  # Gateway-emitted GATEWAY_REQUEST_COMPLETED claim signing key.
  # Ed25519 seed, 64-char hex (matches the Compose-path VEIL_GATEWAY_SIGNING_KEY
  # produced by bin/lucairn-init under the VEIL_PAIRED_SLOTS=GATEWAY entry,
  # paired with VEIL_GATEWAY_PUBLIC_KEY which the gateway publishes at
  # /.well-known/veil-keys.json for external SDK verifier validation).
  #
  # REQUIRED when global.dsaEnv=production AND veilEnabled=true — the gateway
  # binary log.Fatals at boot otherwise (CC-017 P2 production gate at
  # services/gateway/main.go:438). Leave empty ONLY when veilEnabled=false
  # or global.dsaEnv=development.
  VEIL_GATEWAY_SIGNING_KEY: {{ .Values.secrets.values.veilGatewaySigningKey | quote }}
  # Vast cascade H (2026-05-26): VEIL_GATEWAY_PUBLIC_KEY + the two
  # manifest pubkeys are derived from existing signing seeds by
  # scripts/render-values.sh and published by gateway at
  # /.well-known/veil-keys.json (keys[]) for external SDK verifier +
  # W2B Runtime Invariant Harness #3 validation. Missing these makes
  # the well-known endpoint short the keys[] payload AND the cert
  # assembler can't tie back the bridge/audit emitter pubkeys —
  # verifier surfaces them as missing_services and downgrades the
  # overall_verdict to PARTIAL.
  VEIL_GATEWAY_PUBLIC_KEY: {{ .Values.secrets.values.veilGatewayPublicKey | quote }}
  VEIL_GATEWAY_MANIFEST_PUBLIC_KEY: {{ .Values.secrets.values.veilGatewayManifestPublicKey | quote }}
  VEIL_WITNESS_MANIFEST_PUBLIC_KEY: {{ .Values.secrets.values.veilWitnessManifestPublicKey | quote }}
  VEIL_WITNESS_PUBLIC_KEY: {{ .Values.secrets.values.veilWitnessPublicKey | quote }}
  VEIL_BRIDGE_PUBLIC_KEY: {{ .Values.secrets.values.veilBridgePublicKey | quote }}
  VEIL_SANITIZER_PUBLIC_KEY: {{ .Values.secrets.values.veilSanitizerPublicKey | quote }}
  VEIL_SANDBOX_B_PUBLIC_KEY: {{ .Values.secrets.values.veilSandboxBPublicKey | quote }}
  VEIL_AUDIT_PUBLIC_KEY: {{ .Values.secrets.values.veilAuditPublicKey | quote }}
  # LSM-001 / DRIFT-001: gateway-side dsa-ai signing key for the Sensitive
  # Mode seal-cert flow. Empty default keeps non-Sensitive-Mode deploys
  # booting; main.go logs an operator warning when both this and
  # VEIL_SANDBOX_B_SIGNING_KEY are empty.
  VEIL_AI_SIGNING_KEY: {{ .Values.secrets.values.veilAISigningKey | quote }}
  {{- /*
    Inter-service auth token. Prefer the umbrella `global.dsaServiceToken`
    (single source of truth across all subcharts; rendered by
    render-values.sh). Falls back to the per-subchart slot for backward
    compatibility with pre-fix-up-#12 customer-values.yaml files.
    (Vast cascade BLOCKER D, 2026-05-26.)
  */}}
  DSA_SERVICE_TOKEN: {{ default .Values.secrets.values.dsaServiceToken .Values.global.dsaServiceToken | quote }}
  GATEWAY_KEYSTORE_KEY: {{ .Values.secrets.values.gatewayKeystoreKey | quote }}
{{- end }}
