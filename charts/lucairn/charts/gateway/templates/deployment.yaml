{{- if and .Values.readiness.required (not .Values.readiness.existingBundleSecret) -}}
{{- fail "gateway.readiness.required=true requires gateway.readiness.existingBundleSecret" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      # Graceful connection draining on rolling restart / node drain (HA-04).
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.postgresKeystore.enabled }}
      initContainers:
        # Block gateway startup until the PostgresKeyStore backing DB is
        # reachable. Gateway boots with PostgresKeyStore when
        # GATEWAY_KEYSTORE_DSN is set; racing it against postgres-gateway
        # readiness would produce confusing fail-closed logs on first install.
        # 5 min cap matches the StatefulSet's worst-case PVC-bind latency.
        - name: wait-for-postgres-gateway
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres-gateway..."
              for i in $(seq 1 150); do
                if pg_isready -h {{ .Values.postgresKeystore.host }} -p {{ .Values.postgresKeystore.port }} -U {{ .Values.postgresKeystore.user }} -d {{ .Values.postgresKeystore.database }} -t 2; then
                  echo "postgres-gateway ready."
                  exit 0
                fi
                sleep 2
              done
              echo "postgres-gateway not ready after 5 min — failing initContainer." >&2
              exit 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-addr=:{{ .Values.service.apiPort }}"
            - "-health-addr=:{{ .Values.service.healthPort }}"
            - "-session-ttl={{ .Values.sessionTtl }}"
            - "-wait-timeout={{ .Values.waitTimeout }}"
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
            - secretRef:
                name: {{ .Chart.Name }}-credentials
          env:
            - name: SANDBOX_A_INVARIANT_URL
              value: "http://sandbox-a.dsa-identity.svc.cluster.local:8083/invariant"
            - name: SANDBOX_B_INVARIANT_URL
              value: "http://sandbox-b.dsa-ai.svc.cluster.local:8084/invariant"
            - name: ENABLE_TEST_PROVIDER
              value: {{ .Values.enableTestProvider | quote }}
            - name: STREAMING_ENABLED
              value: {{ .Values.streaming.enabled | quote }}
            - name: STREAM_TIMEOUT
              value: {{ .Values.streaming.timeoutSeconds | quote }}
            {{- if .Values.postgresKeystore.enabled }}
            - name: GATEWAY_KEYSTORE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresKeystore.dsnSecretRef.name }}
                  key: {{ .Values.postgresKeystore.dsnSecretRef.key }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.apiPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: verticals
              mountPath: {{ .Values.verticalsDir }}
              readOnly: true
            {{- if .Values.readiness.existingBundleSecret }}
            - name: readiness-bundle
              mountPath: {{ .Values.readiness.bundleMountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.witnessMtls.clientSecret }}
            - name: witness-mtls-certs
              mountPath: {{ .Values.witnessMtls.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if and .Values.keystore.persistence.enabled .Values.keystorePath }}
            # v1.0 keystore writable mount. The container's root FS stays
            # read-only (containerSecurityContext.readOnlyRootFilesystem=true);
            # only this PVC-backed mount is writable, so keystore writes
            # succeed without relaxing the hardened FS posture.
            #
            # Mount the PVC at the PARENT directory of keystorePath. The
            # gateway binary calls os.ReadFile(keystorePath) on the full
            # file path, so the mount must be at the parent dir (NOT
            # keystorePath itself, which would make the path a directory
            # on a fresh PVC). This matches the Compose model where the
            # host volume is the parent dir and the gateway creates
            # keystore.json inside it on first run.
            #
            # NOTE: subPath does NOT work for projecting a single file
            # out of a `persistentVolumeClaim` (empty) volume — kubelet
            # creates a DIRECTORY at the subPath inside the volume and
            # bind-mounts that directory into the container, leaving the
            # gateway with the same "is a directory" error. (Fix-up #8
            # used subPath and was ineffective; fix-up #9 mounts the
            # parent dir instead. Closes Vast-verify BLOCKER-1.)
            - name: keystore
              mountPath: {{ .Values.keystorePath | dir }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if and .Values.gracefulShutdown (gt (int (.Values.gracefulShutdown.preStopSleepSeconds | default 0)) 0) }}
          # preStop drain delay (HA-04): hold the container open while
          # kube-proxy removes this pod from Service endpoints, so in-flight
          # requests are not dropped on rolling restart / node drain. The
          # runtime image is alpine, so /bin/sh + sleep are available.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ int .Values.gracefulShutdown.preStopSleepSeconds }}"]
          {{- end }}
      volumes:
        - name: verticals
          projected:
            sources:
              {{- range $name, $vertical := .Values.verticals }}
              - configMap:
                  name: {{ $.Chart.Name }}-verticals-{{ $name }}
                  items:
                    - key: config.yaml
                      path: {{ $name }}/config.yaml
              {{- end }}
        {{- if .Values.readiness.existingBundleSecret }}
        - name: readiness-bundle
          secret:
            secretName: {{ .Values.readiness.existingBundleSecret }}
            items:
              - key: {{ .Values.readiness.bundleSecretKey }}
                path: {{ .Values.readiness.bundleFileName }}
        {{- end }}
        {{- if and .Values.keystore.persistence.enabled .Values.keystorePath }}
        - name: keystore
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-keystore
        {{- end }}
        {{- if .Values.witnessMtls.clientSecret }}
        - name: witness-mtls-certs
          secret:
            secretName: {{ .Values.witnessMtls.clientSecret }}
        {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
