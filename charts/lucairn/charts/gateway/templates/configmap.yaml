{{- $readinessBundlePath := "" -}}
{{- if .Values.readiness.existingBundleSecret -}}
{{- $readinessBundlePath = printf "%s/%s" (trimSuffix "/" .Values.readiness.bundleMountPath) .Values.readiness.bundleFileName -}}
{{- end -}}
{{- /*
  FIX 6 — Helm-native version gate for TMS Slice 4 trust-zone tuning.

  The kit doctor only guards the Compose path (it reads customer.env). A Helm
  customer who sets gateway.tms.trustZones on a gateway image < 0.5.1 would
  otherwise get a SILENT no-op (the env key renders into the ConfigMap but the
  0.5.0 gateway binary does not read GATEWAY_TMS_TRUST_ZONES). This fails the
  render at `helm template` / `helm upgrade --dry-run` instead.

  $tag MUST be the SAME effective image tag the deployment resolves
  (charts/lucairn/charts/gateway/templates/deployment.yaml:
   .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion)
  so the guard's tag matches the actually-deployed image.
*/ -}}
{{- if .Values.tms.trustZones }}
{{- $tag := .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion | toString }}
{{- if not (regexMatch "^[0-9]+\\.[0-9]+\\.[0-9]+$" $tag) }}
{{- fail (printf "[gateway] tms.trustZones is set but the gateway image tag (%q) is not an exact semver >= 0.5.1 (the release that reads GATEWAY_TMS_TRUST_ZONES). Pin global.imageTag to 0.5.1+ or unset gateway.tms.trustZones." $tag) }}
{{- else if semverCompare "< 0.5.1" $tag }}
{{- fail (printf "[gateway] tms.trustZones is set but the effective gateway image tag (%s) < 0.5.1 — the release that reads GATEWAY_TMS_TRUST_ZONES. Set the gateway image tag (global.imageTag, or gateway.image.tag) to 0.5.1+ or unset gateway.tms.trustZones." $tag) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
data:
  IDENTITY_SERVICE_ADDR: {{ .Values.identityServiceAddr | quote }}
  BRIDGE_SERVICE_ADDR: {{ .Values.bridgeServiceAddr | quote }}
  # Gateway probes id-bridge's HTTP /readyz endpoint for its dependency-aware
  # /healthz check. Must be FQDN (not bare hostname) because gateway lives in
  # dsa-edge namespace and id-bridge lives in dsa-bridge — K8s DNS search
  # list doesn't cross namespaces by default. Without this, the gateway
  # binary falls back to its Compose default "id-bridge:8082" which fails to
  # resolve in K8s, and /healthz:8085 returns 503 (bridge check status=fail).
  # See Sim 5 Helm Gap #4 / Vast diagnostic.
  BRIDGE_HEALTH_ADDR: {{ .Values.bridgeHealthAddr | quote }}
  INFERENCE_SERVICE_ADDR: {{ .Values.inferenceServiceAddr | quote }}
  # Forward-looking: Gateway does not yet consume AUDIT_SERVICE_ADDR
  # but the network policy allows the connection for future audit emission
  AUDIT_SERVICE_ADDR: {{ .Values.auditServiceAddr | quote }}
  GATEWAY_VERTICALS_DIR: {{ .Values.verticalsDir | quote }}
  SANITIZER_URL: {{ .Values.sanitizerUrl | quote }}
  SANDBOX_B_PROXY_URL: {{ .Values.sandboxBProxyUrl | quote }}
  {{- if .Values.keystorePath }}
  GATEWAY_KEYSTORE_PATH: {{ .Values.keystorePath | quote }}
  {{- end }}
  {{- if .Values.global.mtls.enabled }}
  # Parent-authoritative verified transport. Do not read the child legacy
  # grpcTlsEnabled default in this profile.
  GRPC_TLS_ENABLED: "true"
  DSA_MTLS_CA_BUNDLE_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.caBundleKey }}"
  DSA_MTLS_SERVER_CERT_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.certKey }}"
  DSA_MTLS_SERVER_KEY_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.keyKey }}"
  DSA_MTLS_CLIENT_CERT_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.certKey }}"
  DSA_MTLS_CLIENT_KEY_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.keyKey }}"
  DSA_MTLS_SERVER_NAME: "dsa-gateway"
  {{- else }}
  GRPC_TLS_ENABLED: {{ .Values.grpcTlsEnabled | quote }}
  {{- end }}
  LCR_ENABLED: {{ .Values.veilEnabled | quote }}
  # Deployment-license grace window (days after valid_until during which all
  # functionality keeps working with loud warnings before Enterprise features
  # degrade). Non-secret config; the signed token + public key live in the
  # gateway-credentials Secret (LUCAIRN_LICENSE_KEY / _PUBLIC_KEY).
  LUCAIRN_LICENSE_GRACE_DAYS: {{ .Values.licenseGraceDays | default 14 | quote }}
  LCR_WITNESS_CERT_ADDR: {{ .Values.veilWitnessCertAddr | quote }}
  # Witness gRPC for gateway-emitted GATEWAY_REQUEST_COMPLETED claims
  # (port 50057, distinct from LCR_WITNESS_CERT_ADDR's 50058 cert endpoint).
  # FQDN — same K8s cross-namespace rationale as BRIDGE_HEALTH_ADDR above.
  # Required when dsaEnv=production + veilEnabled=true (gateway log.Fatals
  # otherwise per CC-017 P2 production gate, gateway/main.go:434).
  LCR_WITNESS_ADDR: {{ .Values.veilWitnessAddr | quote }}
  # Veil cert-chain manifest wiring (Vast cascade H, 2026-05-26). Mirrors
  # the env vars Compose passes to the gateway at docker-compose.customer.yml
  # lines 423-432. Without these, the gateway's veil-cert handler boots with
  # bare hardcoded defaults — Compose deploys override to these literals.
  # Aligning Helm with Compose fixes the cert-chain regression where bridge
  # + audit claims arrive at the witness but the cert verifier reports them
  # as `missing_services` and downgrades the cert verdict to PARTIAL.
  LCR_ISSUER: {{ .Values.veilIssuer | quote }}
  LCR_MANIFEST_SIGNING_KEY_ID: {{ .Values.veilManifestSigningKeyId | quote }}
  # Stage 3 gateway rebrand: kit-side env-var name renamed VEIL_ → LCR_.
  # The chart-internal values key `veilWitnessSignedManifestPath` is preserved
  # for backward compat with existing customer-values.yaml files. Gateway image
  # v0.5.0+ accepts the legacy VEIL_WITNESS_SIGNED_MANIFEST_PATH at runtime via
  # envcompat fallback.
  LCR_WITNESS_SIGNED_MANIFEST_PATH: {{ .Values.veilWitnessSignedManifestPath | quote }}
  GATEWAY_REQUIRE_READINESS: {{ ternary "true" "false" .Values.readiness.required | quote }}
  GATEWAY_READINESS_USE_CASE: {{ .Values.readiness.useCase | quote }}
  GATEWAY_READINESS_MAX_AGE: {{ .Values.readiness.maxAge | quote }}
  GATEWAY_READINESS_BUNDLE: {{ $readinessBundlePath | quote }}
  GATEWAY_BASE_URL: {{ .Values.gatewayBaseUrl | quote }}
  DSA_ENV: {{ required "global.dsaEnv must be set to \"development\" or \"production\" in the umbrella values" .Values.global.dsaEnv | quote }}
  # PR-C1 fix-up round 1 (FIX-6): sanitize cache knobs.
  SANITIZE_CACHE_ENABLED: {{ ternary "true" "false" (default false .Values.sanitizeCache.enabled) | quote }}
  SANITIZE_CACHE_MAX_ENTRIES: {{ default 10000 .Values.sanitizeCache.maxEntries | quote }}
  SANITIZE_CACHE_TTL_SECONDS: {{ default 3600 .Values.sanitizeCache.ttlSeconds | quote }}
  {{- if .Values.witnessMtls.clientSecret }}
  # TOB-S009 / fable HIGH (2026-06-10): gateway-side mTLS for the witness
  # cert RPC dial (:50058). Emitted only when witnessMtls.clientSecret is set.
  # When unset the gateway connects without mTLS (graceful degradation —
  # mirrors docker-compose.customer.yml:730-736).
  WITNESS_MTLS_CA_BUNDLE_PATH: "{{ .Values.witnessMtls.mountPath }}/{{ .Values.witnessMtls.caBundle }}"
  WITNESS_MTLS_CLIENT_CERT_PATH: "{{ .Values.witnessMtls.mountPath }}/{{ .Values.witnessMtls.clientCert }}"
  WITNESS_MTLS_CLIENT_KEY_PATH: "{{ .Values.witnessMtls.mountPath }}/{{ .Values.witnessMtls.clientKey }}"
  WITNESS_MTLS_SERVER_NAME: {{ .Values.witnessMtls.serverName | default "witness" | quote }}
  {{- end }}
  {{- if .Values.tms.trustZones }}
  # TMS Slice 4 — per-deployment trust-zone override (self-hosted Enterprise only).
  # Rendered only when tms.trustZones is non-empty; absent key = gateway uses its
  # built-in defaults (unset = identity, no policy change). The gateway parses this
  # JSON at startup and fails-loud on any unknown zone value or duplicate key.
  # Requires gateway image >= 0.5.1. See INSTALL.md § "Phase 8".
  GATEWAY_TMS_TRUST_ZONES: {{ .Values.tms.trustZones | toJson | quote }}
  {{- end }}
