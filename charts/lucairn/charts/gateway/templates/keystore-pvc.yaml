{{- if and .Values.keystore.persistence.enabled .Values.keystorePath }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-keystore
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
    app.kubernetes.io/component: keystore
  annotations:
    # Survive helm uninstall — losing the keystore PVC would silently strand
    # every customer API key on the next install. Mirrors the postgres-gateway
    # PVC reclaim policy used by the v2.0 HA path. Operator drops keys
    # explicitly via `kubectl delete pvc {{ .Chart.Name }}-keystore -n {{ .Values.namespace }}`.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.keystore.persistence.accessMode }}
  {{- if .Values.keystore.persistence.storageClass }}
  storageClassName: {{ .Values.keystore.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.keystore.persistence.size }}
{{- end }}
