namespace: dsa-edge

# v1.0 ships single-replica gateway. The keystore persists across pod
# restarts via a PVC mounted at the PARENT directory of keystorePath
# (default parent /etc/dsa/keystore-dir; keystorePath
# /etc/dsa/keystore-dir/keystore.json — see keystorePath block below).
# Multi-replica HA is the v2.0 roadmap — see INSTALL.md § "Lucairn
# Enterprise v1.0 deployment topology". Do NOT set replicaCount > 1 in
# v1.0; the in-memory keystore is not shared across replicas.
replicaCount: 1

image:
  repository: dsa-gateway
  tag: ""
  pullPolicy: IfNotPresent

service:
  apiPort: 8080
  healthPort: 8085

sessionTtl: "1h"
waitTimeout: "30"

identityServiceAddr: "sandbox-a.dsa-identity.svc:50053"
bridgeServiceAddr: "id-bridge.dsa-bridge.svc:50052"
# Gateway probes id-bridge's HTTP /readyz endpoint for its dependency-aware
# /healthz check. Must be FQDN (not bare hostname) because gateway lives in
# dsa-edge namespace and id-bridge lives in dsa-bridge — K8s DNS search
# list doesn't cross namespaces by default. See Sim 5 Helm Gap #4.
bridgeHealthAddr: "id-bridge.dsa-bridge.svc:8082"
inferenceServiceAddr: "sandbox-b.dsa-ai.svc:50054"
auditServiceAddr: "audit.dsa-audit.svc:50051"
verticalsDir: "/etc/dsa/verticals"
sanitizerUrl: "http://sandbox-a.dsa-identity.svc:8086"
sandboxBProxyUrl: "http://sandbox-b.dsa-ai.svc.cluster.local:8084"
# v1.0 default: file-keystore persisted on a PVC.
#
# Keystore is a single FILE inside a PVC-mounted PARENT directory.
# The PVC mounts at the parent of keystorePath (here /etc/dsa/keystore-dir),
# and the gateway binary creates keystore.json inside it on first run
# (matches the Compose model where the host volume is the parent dir).
#
# Do NOT set this to the parent directory itself — the gateway binary
# calls os.ReadFile(keystorePath) on the full path and would error with
# "is a directory" on a fresh PVC. Also do NOT try to use kubelet
# subPath to project a single file from a PVC: for `persistentVolumeClaim`
# (empty volume) sources, subPath creates a DIRECTORY at the target
# inside the volume rather than mapping a single file (unlike configMap/
# secret projections). Fix-up #8 used subPath and the gateway still saw
# a directory; fix-up #9 reverts to mounting the parent directory.
#
# The gateway emits GATEWAY_KEYSTORE_PATH into its ConfigMap whenever
# this value is non-empty. The legacy mutual-exclusion check
# (services/gateway/internal/auth/apikey.go:522) still applies — if a
# v2.0 operator opts into postgresKeystore.enabled=true, they MUST
# clear this value back to "" to avoid emitting both
# GATEWAY_KEYSTORE_PATH and GATEWAY_KEYSTORE_DSN (which crash-loops the pod).
keystorePath: "/etc/dsa/keystore-dir/keystore.json"
grpcTlsEnabled: "false"
veilEnabled: "true"
# Deployment-license grace window in days (after valid_until, before
# Enterprise features degrade). Non-secret config. Default 14.
licenseGraceDays: 14
enableTestProvider: "false"
veilWitnessCertAddr: "veil-witness.dsa-witness.svc.cluster.local:50058"
# Witness gRPC for gateway-emitted GATEWAY_REQUEST_COMPLETED claims
# (port 50057, distinct from veilWitnessCertAddr above). FQDN — same
# K8s cross-namespace rationale as bridgeHealthAddr. Required when
# global.dsaEnv=production AND veilEnabled=true (gateway log.Fatals
# otherwise per CC-017 P2 production gate at gateway/main.go:434).
veilWitnessAddr: "veil-witness.dsa-witness.svc.cluster.local:50057"
# Veil cert-chain manifest wiring (Vast cascade H, 2026-05-26). Mirrors the
# 6 env vars Compose passes to the gateway at customer.env.example
# lines 95-102. Without these, the gateway's veil-cert handler boots with
# bare defaults and the cert-chain assembler can't tie incoming bridge/audit
# claims to the expected service set — verifier surfaces them as
# `missing_services` and downgrades the cert to COMPLETENESS_PARTIAL /
# VERDICT_PARTIAL even when all four service claims are successfully
# emitted and persisted in the witness DB. The 3 literals below carry the
# same defaults as customer.env.example; the 3 pubkey companions are
# derived from existing signing keys via scripts/render-values.sh and
# rendered into the gateway secret block below.
veilIssuer: "Lucairn Veil Witness"
veilManifestSigningKeyId: "gateway_manifest_v1"
veilWitnessSignedManifestPath: "/certs/witness-signed-manifest.json"
gatewayBaseUrl: ""
readiness:
  required: false
  useCase: ""
  maxAge: ""
  existingBundleSecret: ""
  bundleSecretKey: readiness-bundle.json
  bundleMountPath: /etc/dsa/readiness
  bundleFileName: readiness-bundle.json

ingress:
  enabled: true
  className: nginx
  host: dsa.local
  tlsSecret: tls-gateway
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  # v1.0 ships single-replica gateway with file-keystore on PVC. HPA stays
  # OFF because (a) the file-keystore is RWO PVC-backed (single writer) and
  # (b) the gateway's in-memory key state is not shared across replicas
  # under the v1.0 architecture. Multi-replica HA is the v2.0 roadmap.
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilization: 70

pdb:
  # v1.0 single-replica lock: the PDB only renders at replicaCount >= 2
  # (the v2.0 multi-replica unlock). On a single-replica workload a PDB
  # with minAvailable: 1 makes `kubectl drain` hang forever, so v1.0
  # renders no PDB. When 2+ replicas run, maxUnavailable lets drain evict
  # one pod at a time. See templates/pdb.yaml.
  enabled: true
  maxUnavailable: 1

# Graceful shutdown / connection draining on rolling restart + node drain
# (HA-04). On pod termination the kubelet sends SIGTERM and removes the pod
# from Service endpoints CONCURRENTLY — without a drain delay, in-flight
# requests routed just before endpoint removal are dropped. The preStop
# sleep holds the container open while kube-proxy propagates the endpoint
# removal across nodes, then the process exits gracefully.
# terminationGracePeriodSeconds MUST exceed preStopSleepSeconds.
gracefulShutdown:
  # Seconds to sleep in preStop before SIGTERM, letting endpoint removal
  # propagate. 0 disables the preStop hook entirely.
  preStopSleepSeconds: 5
terminationGracePeriodSeconds: 30

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

streaming:
  enabled: false
  timeoutSeconds: 300

# PostgresKeyStore wiring is the v2.0 multi-replica HA path. When enabled
# together with postgres-gateway.enabled=true, the gateway boots with the
# Postgres-backed keystore (cross-replica reads + restart-survival). v1.0
# ships this DISABLED — the file-keystore at keystorePath (above) on the
# PVC defined in keystore.persistence (below) provides restart-survival
# for the single-replica install. Do NOT flip on in v1.0 without ALSO
# enabling postgres-gateway, clearing keystorePath, and bumping
# replicaCount — see INSTALL.md § "v2.0 roadmap" for the full opt-in.
postgresKeystore:
  enabled: false
  host: postgres-gateway.dsa-edge.svc.cluster.local
  port: 5432
  user: gateway
  database: gateway_keystore
  dsnSecretRef:
    name: gateway-keystore-db-credentials
    key: dsn

# v1.0 keystore PVC. Mounted at the PARENT directory of .Values.keystorePath
# above (default parent /etc/dsa/keystore-dir; gateway then creates
# keystore.json inside it on first run). RWO + Retain so `helm uninstall`
# preserves customer API keys for clean re-install (matches the v2.0
# postgres-gateway PVC semantics). 1Gi is generous — typical
# keystore.json is <100KB.
keystore:
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""  # empty = cluster default StorageClass
    accessMode: ReadWriteOnce

# PR-C1 fix-up round 1 (FIX-6): gateway-side sanitize cache. Default OFF —
# operators flip enabled=true per environment after the cert-chain integration
# follow-up PR ships. Override maxEntries / ttlSeconds per-environment if needed.
sanitizeCache:
  enabled: false
  maxEntries: 10000
  ttlSeconds: 3600

secrets:
  backend: k8s-native  # k8s-native | vault | aws | azure
  values:
    licenseKey: ""
    licenseSigningKey: ""
    # Deployment entitlement license (Ed25519, offline). Distinct from the
    # platform tier license above: gates Enterprise FEATURES with a
    # grace-then-degrade expiry. Empty = unregistered mode (Enterprise
    # features locked, core PII pipeline still runs). Lucairn issues the
    # signed token (lucairnLicenseKey) + the verify public key
    # (lucairnLicensePublicKey) via `bin/lucairn license issue`. Both can
    # also be lifted to global.lucairnLicenseKey / global.lucairnLicensePublicKey.
    lucairnLicenseKey: ""
    lucairnLicensePublicKey: ""
    adminKey: ""
    sandboxBApiKey: ""
    veilManifestSigningKey: ""
    # Gateway-emitted GATEWAY_REQUEST_COMPLETED claim signing key.
    # Ed25519 seed, 64-char hex (paired with LCR_GATEWAY_PUBLIC_KEY
    # which the gateway publishes at /.well-known/veil-keys.json).
    # REQUIRED when global.dsaEnv=production + veilEnabled=true — the
    # gateway binary log.Fatals otherwise (services/gateway/main.go:438).
    # Generate via `bin/lucairn-init` (paired-slot GATEWAY) or directly
    # via scripts/derive-veil-pubkey.sh after `openssl rand -hex 32`.
    veilGatewaySigningKey: ""
    # LCR_GATEWAY_PUBLIC_KEY — Ed25519 public key derived from
    # veilGatewaySigningKey via scripts/derive-veil-pubkey.sh. Published
    # in /.well-known/veil-keys.json so external SDK verifiers can
    # validate gateway-emitted GATEWAY_REQUEST_COMPLETED claims.
    # (Vast cascade H, 2026-05-26.)
    veilGatewayPublicKey: ""
    # LCR_GATEWAY_MANIFEST_PUBLIC_KEY — public counterpart of the
    # gateway's manifest-signing private key. Same derivation source as
    # veilGatewayPublicKey (Ed25519 pub of veilGatewaySigningKey); the
    # manifest path reuses the gateway emitter keypair. Published in
    # /.well-known/veil-keys.json keys[] so the W2B Runtime Invariant
    # Harness #3 can verify signatures.*.key_id linkage. Same caveat as
    # Compose: leaving empty silently degrades the harness self-check
    # but does NOT block normal cert verification. (Vast cascade H.)
    veilGatewayManifestPublicKey: ""
    # VEIL_WITNESS_MANIFEST_PUBLIC_KEY — public counterpart of the
    # witness manifest-signing private key. Derived from the witness
    # signing seed (same Ed25519 derivation as VEIL_WITNESS_PUBLIC_KEY).
    # Same harness #3 rationale as veilGatewayManifestPublicKey above.
    veilWitnessManifestPublicKey: ""
    veilWitnessPublicKey: ""
    veilBridgePublicKey: ""
    veilSanitizerPublicKey: ""
    veilSandboxBPublicKey: ""
    veilAuditPublicKey: ""
    # LSM-001 / DRIFT-001: gateway-side dsa-ai signing key for the Sensitive
    # Mode seal-cert flow. 64-char hex Ed25519 seed. In hybrid deploys
    # (Sensitive Mode + sandbox B), set this to the SAME value as the
    # sandbox-b chart's secrets.values.veilSigningKey. In Sensitive-Mode-only
    # deploys, this is the standalone dsa-ai signing key. Empty value
    # disables the dsa-ai emitter; Sensitive Mode certs then render
    # overall_verdict: failed on /verify (operator warning logged at boot).
    veilAISigningKey: ""
    dsaServiceToken: ""  # PRODUCTION: set via existingSecret or --set; dev: inline value
    # Required when secrets.backend == "k8s-native". Base64 32 bytes (AES-256)
    # for keystore-at-rest encryption (#17). Generate with: openssl rand -base64 32.
    # Set per-environment via --set or a values overlay; never commit a real value.
    # Gateway fails-closed at boot if missing/malformed/wrong-length.
    gatewayKeystoreKey: ""
  vault:
    path: "dsa/data/gateway"
  aws:
    name: "dsa/gateway"
  azure:
    name: "dsa-gateway"
