{{- if eq .Values.secrets.backend "k8s-native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  IDENTITY_DATABASE_URL: "postgres://{{ .Values.databases.identity.user }}:{{ .Values.secrets.values.identityDbPassword }}@{{ .Values.databases.identity.host }}:{{ .Values.databases.identity.port }}/{{ .Values.databases.identity.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
  BRIDGE_DATABASE_URL: "postgres://{{ .Values.databases.bridge.user }}:{{ .Values.secrets.values.bridgeDbPassword }}@{{ .Values.databases.bridge.host }}:{{ .Values.databases.bridge.port }}/{{ .Values.databases.bridge.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
  AUDIT_DATABASE_URL: "postgres://{{ .Values.databases.audit.user }}:{{ .Values.secrets.values.auditDbPassword }}@{{ .Values.databases.audit.host }}:{{ .Values.databases.audit.port }}/{{ .Values.databases.audit.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
{{- end }}
