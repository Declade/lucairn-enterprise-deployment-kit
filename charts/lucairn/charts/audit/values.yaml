namespace: dsa-audit

# v1.0 ships single-replica audit because the EVENTS_RECORDED veil-claim
# dedup winner-result map is in-memory per-pod (services/audit/internal/
# server/server.go:97 — `veilClaimSent sync.Map`). Multi-replica audit
# pods would split the same-request_id dedup state: pod A's losers block
# on pod A's winner, pod B's losers block on pod B's winner — both pods
# can emit the EVENTS_RECORDED veil claim for the same request_id,
# violating the F1 fail-closed uniformity invariant (locked by
# TestEmitEvent_PipelineCompletion_RetryAfterFailureDoesNotShortCircuit).
# Postgres backs the audit log itself but NOT the per-pod dedup channel
# coordination map. Compose works because it runs ONE audit container.
#
# Multi-replica audit is a v2.0 design (Postgres- or Redis-backed
# winner-result coordination). Until then, leave replicaCount=1 +
# hpa.enabled=false; the umbrella validator
# (validators.auditSingleReplica) fails-fast on any operator who flips
# either knob without the v2.0 backend ready.
#
# Vast cascade I sweep (fix-up #15, 2026-05-26): audit shares the
# veil-witness defect class — pod-local state cannot be safely split
# across replicas via standard K8s Service load-balancing.
replicaCount: 1

image:
  repository: dsa-audit
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

service:
  grpcPort: 50051
  healthPort: 8081

veilEnabled: "true"
veilWitnessAddr: "veil-witness.dsa-witness.svc.cluster.local:50057"
grpcTlsEnabled: "false"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# v1.0 ships HPA disabled — see replicaCount comment above. The
# veilClaimSent sync.Map is pod-local; HPA scaling beyond 1 replica
# breaks the F1 dedup invariant.
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilization: 70

pdb:
  # v1.0 single-replica lock: the PDB only renders at replicaCount >= 2
  # (the v2.0 multi-replica unlock). On a single-replica workload a PDB
  # with minAvailable: 1 makes `kubectl drain` hang forever, so v1.0
  # renders no PDB. When 2+ replicas run, maxUnavailable lets drain evict
  # one pod at a time. See templates/pdb.yaml.
  enabled: true
  maxUnavailable: 1

# Graceful shutdown / connection draining on rolling restart + node drain
# (HA-04). On pod termination the kubelet sends SIGTERM and removes the pod
# from Service endpoints CONCURRENTLY — without a drain delay, in-flight
# requests routed just before endpoint removal are dropped. The preStop
# sleep holds the container open while kube-proxy propagates the endpoint
# removal across nodes, then the process exits gracefully.
# terminationGracePeriodSeconds MUST exceed preStopSleepSeconds.
gracefulShutdown:
  # Seconds to sleep in preStop before SIGTERM, letting endpoint removal
  # propagate. 0 disables the preStop hook entirely.
  preStopSleepSeconds: 5
terminationGracePeriodSeconds: 30

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storageSize: 10Gi
  storageClass: ""
  user: dsa
  database: audit

external:
  databaseUrl: ""  # used when postgresql.enabled: false

secrets:
  backend: k8s-native  # k8s-native | vault | aws | azure
  values:
    # PRODUCTION: MUST override with a strong, unique password (dsa superuser).
    postgresPassword: "CHANGE-ME-IN-PRODUCTION"
    # PRODUCTION: MUST override. Password for the least-privilege `audit_app`
    # role that the audit service connects as at runtime. Baked into the
    # 000003_least_privilege_role migration via the render init container.
    # Compose-path equivalent: AUDIT_APP_PASSWORD in customer.env. Refuses to
    # render with empty value, single-quote, or backslash (SQL-injection guard).
    auditAppPassword: "CHANGE-ME-IN-PRODUCTION"
    veilSigningKey: ""
    dsaServiceToken: ""  # PRODUCTION: set via existingSecret or --set; dev: inline value
  vault:
    path: "dsa/data/postgres-audit"
  aws:
    name: "dsa/postgres-audit"
  azure:
    name: "dsa-postgres-audit"
