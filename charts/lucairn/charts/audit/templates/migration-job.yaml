{{- if .Values.postgresql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-migrate
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-migrate
    app.kubernetes.io/part-of: dsa
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-migrate
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      initContainers:
        - name: render-migrations
          # Run from the audit image so the baked-in /migrations source tree
          # is available. cp into the shared volume, then sed-substitute the
          # historical literal 'audit_app_password' with the operator-supplied
          # value. Mirrors scripts/render-migrations.sh in the Compose path.
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              if [ -z "${AUDIT_APP_PASSWORD:-}" ]; then
                echo "render-migrations: AUDIT_APP_PASSWORD is empty — refusing to render" >&2
                exit 2
              fi
              case "${AUDIT_APP_PASSWORD}" in
                *\'*) echo "render-migrations: AUDIT_APP_PASSWORD contains a single quote — refusing (would break SQL string / open SQL injection)" >&2; exit 3 ;;
              esac
              case "${AUDIT_APP_PASSWORD}" in
                *\\*) echo "render-migrations: AUDIT_APP_PASSWORD contains a backslash — refusing (would break SQL string-escape)" >&2; exit 3 ;;
              esac
              cp -r /migrations /shared/migrations
              # `|` delimiter avoids the `/` collision; trailing-g unnecessary
              # because the literal appears at most twice (one CREATE + one
              # ALTER) and both should be substituted.
              sed -i "s|'audit_app_password'|'${AUDIT_APP_PASSWORD}'|g" \
                /shared/migrations/000003_least_privilege_role.up.sql
              echo "render-migrations: audit rendered" >&2
          env:
            - name: AUDIT_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: AUDIT_APP_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /shared
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: wait-and-migrate
          image: migrate/migrate:v4.17.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z {{ .Chart.Name }}-postgresql 5432; do
                sleep 2
              done
              echo "PostgreSQL ready. Running migrations..."
              migrate -path=/shared/migrations -database="$DATABASE_URL" up
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /shared
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: migrations
          emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
{{- end }}
