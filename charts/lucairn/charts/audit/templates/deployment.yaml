{{- $mtlsEnabled := and (kindIs "bool" .Values.global.mtls.enabled) .Values.global.mtls.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      # Graceful connection draining on rolling restart / node drain (HA-04).
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        # Migration-completion gate (rehearsal fix 2026-06-19). The runtime audit
        # container connects as the restricted `audit_app` role (DATABASE_URL_APP),
        # but that role does not exist until the 000003_least_privilege_role
        # migration Job runs CREATE ROLE. Without this gate the audit Deployment
        # starts before the migration and CrashLoopBackOffs ~3× with
        # `pq: password authentication failed for user "audit_app"` until the
        # migration completes, then self-heals — a scary-but-transient
        # CrashLoopBackOff on a no-shell-access self-hosted deliverable.
        #
        # Block startup until an AUTHENTICATED connection as audit_app succeeds
        # (SELECT 1). A successful auth proves BOTH that postgres is up AND that
        # the migration created+granted the audit_app role — strictly stronger
        # than pg_isready (which only proves the server is listening, not that the
        # app role exists). Mirrors the gateway wait-for-postgres initContainer
        # pattern (gateway/templates/deployment.yaml). 5 min cap matches the
        # migrate Job backoff + StatefulSet PVC-bind worst case.
        - name: wait-for-migration
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for audit migration (audit_app role) to be ready..."
              for i in $(seq 1 150); do
                if psql "$DATABASE_URL_APP" -tAc 'SELECT 1' >/dev/null 2>&1; then
                  echo "audit_app role ready — migration complete."
                  exit 0
                fi
                sleep 2
              done
              echo "audit_app role not ready after 5 min — failing initContainer." >&2
              exit 1
          env:
            - name: DATABASE_URL_APP
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL_APP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-addr=:{{ .Values.service.grpcPort }}"
            - "-health-addr=:{{ .Values.service.healthPort }}"
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
          env:
            - name: AUDIT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  # INT-001 least-privilege: runtime connects as the restricted,
                  # append-only audit_app role, NOT the migrate-only superuser
                  # DATABASE_URL.
                  key: DATABASE_URL_APP
            - name: LCR_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: LCR_SIGNING_KEY
            - name: DSA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_SERVICE_TOKEN
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- if $mtlsEnabled }}
          volumeMounts:
            - name: enterprise-mtls
              mountPath: {{ .Values.global.mtls.mountPath | quote }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if and .Values.gracefulShutdown (gt (int (.Values.gracefulShutdown.preStopSleepSeconds | default 0)) 0) }}
          # preStop drain delay (HA-04): hold the container open while
          # kube-proxy removes this pod from Service endpoints, so in-flight
          # requests are not dropped on rolling restart / node drain. The
          # runtime image is alpine, so /bin/sh + sleep are available.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ int .Values.gracefulShutdown.preStopSleepSeconds }}"]
          {{- end }}
      {{- if $mtlsEnabled }}
      volumes:
        - name: enterprise-mtls
          secret:
            secretName: {{ .Values.global.mtls.secrets.audit }}
            items:
              - key: {{ .Values.global.mtls.caBundleKey }}
                path: {{ .Values.global.mtls.caBundleKey }}
              - key: {{ .Values.global.mtls.certKey }}
                path: {{ .Values.global.mtls.certKey }}
              - key: {{ .Values.global.mtls.keyKey }}
                path: {{ .Values.global.mtls.keyKey }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
