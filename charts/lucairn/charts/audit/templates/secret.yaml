{{- if eq .Values.secrets.backend "k8s-native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  # Superuser DSN — migrate Job ONLY (runs CREATE ROLE / GRANT / REVOKE).
  DATABASE_URL: "postgres://{{ .Values.postgresql.user }}:{{ .Values.secrets.values.postgresPassword }}@{{ .Chart.Name }}-postgresql:5432/{{ .Values.postgresql.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
  # Least-privilege runtime DSN (INT-001) — the audit deployment connects as
  # the restricted, append-only `appUser` (audit_app) created by the
  # 000003_least_privilege_role migration. Shares the single Postgres instance
  # password in this bundled-postgres model.
  DATABASE_URL_APP: "postgres://{{ .Values.postgresql.appUser }}:{{ .Values.secrets.values.auditAppPassword }}@{{ .Chart.Name }}-postgresql:5432/{{ .Values.postgresql.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
  POSTGRES_PASSWORD: {{ .Values.secrets.values.postgresPassword | quote }}
  {{- else }}
  DATABASE_URL: {{ .Values.external.databaseUrl | quote }}
  # External Postgres: the operator owns role selection in their connection
  # string, so the runtime DSN falls back to the same operator-supplied URL.
  DATABASE_URL_APP: {{ .Values.external.databaseUrl | quote }}
  {{- end }}
  VEIL_SIGNING_KEY: {{ .Values.secrets.values.veilSigningKey | quote }}
  {{- /* Prefer umbrella global.dsaServiceToken; fall back to per-subchart slot. Vast cascade BLOCKER D, 2026-05-26. */}}
  DSA_SERVICE_TOKEN: {{ default .Values.secrets.values.dsaServiceToken .Values.global.dsaServiceToken | quote }}
  AUDIT_APP_PASSWORD: {{ .Values.secrets.values.auditAppPassword | quote }}
{{- end }}
