{{- if ne .Values.secrets.backend "k8s-native" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dsa-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Chart.Name }}-credentials
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: url
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: url
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: url
        {{- end }}
    # Least-privilege runtime DSN (INT-001) — the audit deployment keys on
    # DATABASE_URL_APP (mandatory secretKeyRef, no optional:true). The operator
    # populates this append-only-role url in their secret store exactly as they
    # do the superuser `url`.
    - secretKey: DATABASE_URL_APP
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: url_app
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: url_app
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: url_app
        {{- end }}
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: password
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: password
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: password
        {{- end }}
    # App-role password consumed by the migrate Job's render-init container to
    # bake the restricted append-only audit_app role (mandatory secretKeyRef in
    # migration-job.yaml). Unsynced on ESO backends → role never created.
    - secretKey: AUDIT_APP_PASSWORD
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: app_password
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: app_password
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: app_password
        {{- end }}
    - secretKey: VEIL_SIGNING_KEY
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: veilSigningKey
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: veilSigningKey
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: veilSigningKey
        {{- end }}
    - secretKey: DSA_SERVICE_TOKEN
      remoteRef:
        {{- if eq .Values.secrets.backend "vault" }}
        key: {{ .Values.secrets.vault.path }}
        property: dsaServiceToken
        {{- else if eq .Values.secrets.backend "aws" }}
        key: {{ .Values.secrets.aws.name }}
        property: dsaServiceToken
        {{- else if eq .Values.secrets.backend "azure" }}
        key: {{ .Values.secrets.azure.name }}
        property: dsaServiceToken
        {{- end }}
{{- end }}
