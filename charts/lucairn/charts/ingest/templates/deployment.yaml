apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-addr=:{{ .Values.service.port }}"
            - "-health-addr=:{{ .Values.service.healthPort }}"
          env:
            - name: IDENTITY_ADDR
              value: {{ .Values.identityAddr | quote }}
            - name: BRIDGE_ADDR
              value: {{ .Values.bridgeAddr | quote }}
            - name: INFERENCE_ADDR
              value: {{ .Values.inferenceAddr | quote }}
            - name: AUDIT_ADDR
              value: {{ .Values.auditAddr | quote }}
            - name: DSA_ENV
              value: {{ .Values.global.dsaEnv | default "development" | quote }}
            # ingest calls tlsutil.RequireTLSInProduction() at boot
            # (services/ingest/cmd/server/main.go:69). When DSA_ENV=production it
            # log.Fatals unless GRPC_TLS_ENABLED=true (or the DSA_MTLS_* family is
            # set), refusing to start with plaintext transport. values-prod.yaml
            # sets the coherent pair (dsaEnv=production + ingest.grpcTlsEnabled="true").
            # ingest is enabled=false by default, so this only matters when an
            # operator opts ingest in under the production overlay.
            - name: GRPC_TLS_ENABLED
              value: {{ .Values.grpcTlsEnabled | quote }}
            {{- if .Values.secrets.values.dsaServiceToken }}
            - name: DSA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_SERVICE_TOKEN
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
