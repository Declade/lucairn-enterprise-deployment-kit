{{/*
  Ingest credentials secret — rendered conditionally based on the secrets
  backend configured in values.yaml. Supports three modes:

    1. k8s-native (default in dev) — inline Opaque Secret from
       `.Values.secrets.values.dsaServiceToken`.
    2. existingSecret (recommended in prod) — references a Secret that
       someone else already provisioned; this template renders nothing.
    3. ESO (Vault / AWS / Azure) — rendered via externalsecret.yaml; this
       template also renders nothing.
*/}}
{{- /* Resolve effective token: prefer umbrella global.dsaServiceToken; fall back to per-subchart slot. Vast cascade BLOCKER D, 2026-05-26. */}}
{{- $effectiveToken := default .Values.secrets.values.dsaServiceToken .Values.global.dsaServiceToken }}
{{- if and (eq (.Values.secrets.backend | default "k8s-native") "k8s-native") (not .Values.secrets.existingSecret) $effectiveToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  DSA_SERVICE_TOKEN: {{ $effectiveToken | quote }}
{{- end }}
