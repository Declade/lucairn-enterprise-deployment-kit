namespace: dsa-identity

# v1.0 ships single-replica sandbox-a. The pod runs a per-pod
# authRateLimiter (services/sandbox-a/internal/server/server.go:29 —
# `failures map[string][]time.Time`) that tracks failed auth attempts
# in-memory. With multi-replica sandbox-a behind a K8s Service:
#   1. A brute-forcer's 10-failure rate-limit becomes 10 × N pods.
#      Pod A counts 10, pod B counts 0 → brute-force rate-limit bypass
#      via Service round-robin load-balancing.
#   2. The sanitizer is wired as a SIDECAR in this same pod (see
#      templates/deployment.yaml `name: sanitizer` container at line
#      152). Scaling sandbox-a also scales the sanitizer; each sanitizer
#      instance holds its own canary-token signing state and per-request
#      caches. The gateway points at sandbox-a.dsa-identity.svc:8086
#      (see gateway/values.yaml:34) so multi-replica sanitizer is
#      reachable but untested for the sidecar topology — adding
#      multi-pod variance to a v1.0 demo lane is conservative-bad.
# Compose works because it runs ONE sandbox-a container with one
# sanitizer sidecar.
#
# Multi-replica sandbox-a is a v2.0 design (Redis-backed rate-limit
# counters + sanitizer as a standalone Deployment + sidecar removal).
# Until then, leave replicaCount=1 + hpa.enabled=false; the umbrella
# validator (validators.sandboxASingleReplica) fails-fast on any
# operator who flips either knob without the v2.0 backend ready.
#
# Vast cascade I sweep (fix-up #15, 2026-05-26): sandbox-a + bundled
# sanitizer sidecar share the veil-witness defect class — pod-local
# state cannot be safely split across replicas via standard K8s Service
# load-balancing.
replicaCount: 1

image:
  repository: dsa-sandbox-a
  tag: ""
  pullPolicy: IfNotPresent

service:
  grpcPort: 50053
  healthPort: 8083

auditServiceAddr: "audit.dsa-audit.svc:50051"
grpcTlsEnabled: "false"
veilEnabled: "true"
veilWitnessAddr: "veil-witness.dsa-witness.svc.cluster.local:50057"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# v1.0 ships HPA disabled — see replicaCount comment above. The
# authRateLimiter is pod-local; HPA scaling beyond 1 replica produces a
# brute-force rate-limit bypass.
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilization: 70

pdb:
  # v1.0 single-replica lock: the PDB only renders at replicaCount >= 2
  # (the v2.0 multi-replica unlock). On a single-replica workload a PDB
  # with minAvailable: 1 makes `kubectl drain` hang forever, so v1.0
  # renders no PDB. When 2+ replicas run, maxUnavailable lets drain evict
  # one pod at a time. See templates/pdb.yaml.
  enabled: true
  maxUnavailable: 1

# Graceful shutdown / connection draining on rolling restart + node drain
# (HA-04). On pod termination the kubelet sends SIGTERM and removes the pod
# from Service endpoints CONCURRENTLY — without a drain delay, in-flight
# requests routed just before endpoint removal are dropped. The preStop
# sleep holds the container open while kube-proxy propagates the endpoint
# removal across nodes, then the process exits gracefully.
# terminationGracePeriodSeconds MUST exceed preStopSleepSeconds.
gracefulShutdown:
  # Seconds to sleep in preStop before SIGTERM, letting endpoint removal
  # propagate. 0 disables the preStop hook entirely.
  preStopSleepSeconds: 5
terminationGracePeriodSeconds: 30

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storageSize: 10Gi
  storageClass: ""
  user: dsa
  database: sandbox_a

external:
  databaseUrl: ""

sanitizer:
  image:
    # Default repository follows the chart's `global.imageRegistry` prefix
    # (e.g. ghcr.io/declade) so this resolves to ghcr.io/declade/dsa-sanitizer.
    # Override per-environment if you mirror images.
    repository: dsa-sanitizer
    # Empty `tag` falls through to `.Values.global.imageTag` (0.5.1 today)
    # so the side-car stays in lockstep with the rest of the kit.
    tag: ""
    pullPolicy: IfNotPresent
  # Parity with Compose default-sanitizer.yaml (calibrated against the
  # 12-corpus domain bench). Override per environment if needed.
  confidenceThreshold: 0.35
  safePatterns: []
  llmAuditEnabled: false
  qiEngineEnabled: "true"
  qiEngineThreshold: "0.25"
  qiEngineAction: "generalize"
  llmScanEnabled: false
  llmScanTimeout: 30
  # FIX-B (full-stack-test-results-2026-05-29): L3 fail-mode for the sanitizer.
  # true = fail-CLOSED (503 l3_scrubber_unavailable when the L3 deep PII shield
  # is unavailable). false = continue-mode (proceed L1+L2, cert honestly
  # downgraded to PARTIAL with llm_pii_scan omitted from layers_active). Wired
  # into the sanitizer container env as LUCAIRN_L3_REQUIRED.
  #
  # DEFAULT (overnight follow-up 2026-06-15 — the Helm side of #73's Compose
  # fix): the L3 shield is the GPU `ollama-identity` StatefulSet, which renders
  # ONLY when sanitizer.llmScanEnabled=true (ollama-identity-statefulset.yaml:1).
  # With the stock default llmScanEnabled=false, a `true` here required L3 but
  # deployed no L3 service → the sanitizer /readyz fails liveness and the gateway
  # fail-closes 503 on EVERY request (same trap #73 fixed for Compose). Keep
  # L3-required PAIRED with llmScanEnabled. Enterprise operators who enable the
  # L3 shield (set sanitizer.llmScanEnabled=true to deploy the GPU ollama-identity
  # sidecar) flip L3-required true to restore fail-closed L3.
  #
  # SINGLE SOURCE OF TRUTH (rehearsal fix 2026-06-19, collapsed 2026-06-19
  # fix-up): there is NO per-subchart sanitizer.l3Required override. The ONE L3
  # knob is global.l3Required (charts/lucairn/values.yaml, default false). The
  # sanitizer container AND the veil-witness pod resolve LUCAIRN_L3_REQUIRED from
  # that single global with the SAME fallback ("false"), so they can never drift
  # (drift ⇒ witness downgrades every cert to COMPLETENESS_PARTIAL —
  # verifier.go:170-172,503). To require L3, set global.l3Required=true (pair it
  # with sanitizer.llmScanEnabled=true so the GPU L3 shield is actually deployed).
  # TOB-003 fix (2026-05-09): default "sequential" — Pro/Enterprise overlays
  # MUST explicitly set "ensemble" to opt into L3 reversal path.
  llmScanMode: "sequential"
  llmScanRestoreThreshold: 0.85
  # M12 fix (2026-06-23): gunicorn worker timeout. Compose sets 120 s
  # (docker-compose.customer.yml:511 GUNICORN_TIMEOUT: "120"); the Helm
  # chart previously omitted this, defaulting to gunicorn's built-in 30 s
  # and causing 503 on large prompts. Mirror the Compose default here.
  gunicornTimeout: 120

  # Phase 7 — ML PII scanners extracted into the pii-ml gRPC sidecar
  # (PR #240 production-path follow-up, "A3 Proper"). DEFAULT OFF here.
  #
  # As of chart v1.7.1 (2026-06-10) Phase 7 ML is SUSPENDED by default at
  # BOTH gates for performance (the ML sidecar overloads on large prompts).
  # The deterministic layers (known_entity_matching + Presidio L1/L2) remain
  # active. See INSTALL.md § "Re-enabling Phase 7".
  #
  # Operators re-enable Phase 7 by flipping BOTH:
  #   1. Umbrella `pii-ml.enabled: true` (deploys the sidecar) — DEFAULT OFF
  #      as of v1.7.1
  #   2. The piiranha/gliner enabled flags below (sanitizer dials the sidecar)
  #
  # Closes DRIFT-001 from PR #241 contract-drift r1: in-tree
  # config/default-sanitizer.yaml grew these sections at PR #240 ship time;
  # the Helm-rendered ConfigMap fell behind. Adding them here + in
  # sanitizer-configmap.yaml restores chart ↔ in-tree parity.
  piiranha:
    enabled: false
    grpcDeadlineSeconds: 5
  gliner:
    enabled: false
    grpcDeadlineSeconds: 5
    skipMinTextLen: 32
    skipMaxEntityDensity: 0.30
  kAnonymity:
    enabled: false
    k: 5
  piiMlClient:
    # Empty (default) resolves to pii-ml.<namespace>.svc.cluster.local:50056
    # in the sanitizer-configmap.yaml template. Override only if pii-ml is
    # deployed to a non-default namespace OR an external endpoint.
    endpoint: ""
    # Per-scan gRPC deadline (seconds). Sanitizer's config.py reads this as
    # the flat `deadline_seconds` field on `pii_ml_client`; missing → 5.0.
    deadlineSeconds: 5
    # Sanitizer's pii-ml client circuit breaker. Tuned in camelCase here;
    # the configmap template flattens to the in-tree-canonical flat fields
    # `circuit_breaker_open_after` + `circuit_breaker_half_open_seconds`
    # (sanitizer's config.py:595-606 reads ONLY the flat names).
    circuitBreaker:
      consecutiveFailures: 3
      halfOpenSeconds: 30

# Sanitizer content-address cache — dedicated Redis for the sanitizer
# content-addressed redaction cache. See INSTALL.md § "Sanitizer content
# cache (Redis — default ON)" for the operator runbook and
# disable/external-Redis instructions.
# Isolated from redis-sanitizer (DP-budget keys, db 0) so allkeys-lru
# eviction under cache pressure NEVER touches the DP-budget accounting.
# Default ON — mirrors the docker-compose.customer.yml default.
# Set sanitizerCache.enabled=false to fall back to the sanitizer's
# per-worker in-process LRU cache (same fallback the sanitizer app.py
# uses when Redis is unreachable — fail-OPEN, not a 500).
sanitizerCache:
  enabled: true
  # Redis image — must match the redis-sanitizer-cache image in docker-compose.yml.
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  # 512MB allkeys-lru — isolated from DP-budget redis (64MB). Mirrors
  # docker-compose.yml redis-sanitizer-cache definition.
  maxmemory: "512mb"
  maxmemoryPolicy: "allkeys-lru"
  # PVC for persistence (optional but keeps cache warm across pod restarts).
  storageSize: 1Gi
  storageClass: ""
  # Sanitizer cache env knobs wired into the sanitizer sidecar container.
  # The sanitizer reads SANITIZER_CACHE_REDIS_URL when SANITIZER_CACHE_BACKEND=redis.
  # SANITIZER_CACHE_BACKEND defaults to "redis" so the sidecar picks up the
  # bundled redis-sanitizer-cache by default. Set to "memory" to disable.
  backend: "redis"
  # DB 0 on the SEPARATE redis-sanitizer-cache service (never shares DB with
  # DP-budget keys on redis-sanitizer:6379/0).
  redisUrl: ""  # auto-derived from service name when empty; override for external Redis
  ttlSeconds: 3600

# Streaming chunk-aware state backend (TMS Slice 3 / DSA PR #267).
# Fixes the cross-worker FAIL-CLOSED bug (kit issue #68): gunicorn routes
# each SSE chunk of one streaming response to an ARBITRARY worker; with the
# per-worker in-process store (~88% of chunks landed on the wrong worker on
# the Hetzner pilot and triggered alignment-bail fail-closed immediately).
# Option B moves per-stream state to the SAME redis-sanitizer-cache Redis so
# any worker rehydrates the full PlaceholderRegistry + tail-buffer.
#
# stream-state keys (tms:stream:* / tms:streamlock:* / tms:streammut:*)
# share DB 0 on redis-sanitizer-cache with the content-cache keys
# (tms:cache:*). They never collide (distinct prefixes) and never touch the
# DP-budget namespace (redis-sanitizer:6379/0, a SEPARATE StatefulSet).
#
# CONSTRAINT: mutationMarkerTtlSeconds MUST be strictly greater than
# ttlSeconds. Default (unset) = max(2×ttlSeconds, ttlSeconds+60). If you
# set mutationMarkerTtlSeconds explicitly and it is ≤ ttlSeconds, the
# sanitizer clamps it up to ttlSeconds+60 at boot. Raise ttlSeconds only
# if your streams routinely exceed 5 minutes; raise mutationMarkerTtlSeconds
# proportionally (minimum ttlSeconds + 60).
sanitizerStreamState:
  # "redis" (default) — shared Redis, closes cross-worker FAIL-CLOSED.
  # "memory" — per-worker in-process store (pre-Slice-3 fallback; causes
  #            ~88% streaming FAIL-CLOSED under gunicorn; use only as a
  #            temporary revert if the shared Redis is unavailable).
  backend: "redis"
  # Redis URL for stream-state keys. Points at the SAME redis-sanitizer-cache
  # StatefulSet as sanitizerCache.redisUrl (DB 0, distinct key prefix).
  # Auto-derived from the bundled service name when empty; override only if
  # you use an external Redis (set sanitizerCache.enabled=false too).
  redisUrl: ""  # auto-derived from service name when empty; must match sanitizerCache.redisUrl
  # Per-stream state key TTL (seconds). Set >= longest expected streaming
  # response. Streams not closed within this window are evicted; a new chunk
  # after eviction starts fresh state (alignment-bail risk on very long streams).
  ttlSeconds: 300
  # Cert-integrity mutation-marker TTL (seconds). The marker outlives the
  # stream state so the gateway can detect mid-stream fresh-state resets that
  # would produce a cert with renumbered placeholders (a cert-integrity
  # violation). MUST be strictly > ttlSeconds. Default (unset) = max(2×ttlSeconds,
  # ttlSeconds+60); if you set it ≤ ttlSeconds the sanitizer clamps it up to
  # ttlSeconds+60 at boot.
  mutationMarkerTtlSeconds: 600

# ollama-identity is the L3 PII-plane LLM runtime (the on-GPU PII Shield).
# It only renders when sanitizer.llmScanEnabled=true. Images are pinned by
# released tag + sha256 digest (NET-02 supply-chain hardening) so the
# PII-plane runtime cannot silently float to a mutable `:latest`. Override
# repository/tag/digest per environment if you mirror images into a private
# registry. The model-pull init container uses a pinned curl image to fetch
# the GGUF weights.
ollamaIdentity:
  image:
    repository: ollama/ollama
    tag: "0.6.2"
    # sha256 digest for ollama/ollama:0.6.2 (linux multi-arch index). When set,
    # the image ref renders as repository:tag@sha256:... so the pull is
    # digest-verified. Leave empty to pin by tag only.
    digest: "sha256:74a0929e1e082a09e4fdeef8594b8f4537f661366a04080e600c90ea9f712721"
    pullPolicy: IfNotPresent
  # Image used by the model-pull init container to download the GGUF weights.
  curlImage:
    repository: curlimages/curl
    tag: "8.11.1"
    digest: "sha256:c1fe1679c34d9784c1b0d1e5f62ac0a79fca01fb6377cdd33e90473c6f9f9a69"
    pullPolicy: IfNotPresent
  # FAIL-01 demo warmth (PRD prd-2026-05-29-fail-safe-scrubber, §6): keep the
  # L3 scan model resident so the new fail-CLOSED block can never fire from a
  # cold-start hiccup mid-demo. "-1" pins loaded models indefinitely; set a
  # Go duration (e.g. "30m") to expire idle models, or "0" to unload
  # immediately after each request (NOT recommended when the L3 shield is
  # required — risks readyz flapping).
  keepAlive: "-1"
  # FIX-A (full-stack-test-results-2026-05-29): L3 PII shield (qwen2.5:7b)
  # resource envelope, exposed as a chart value. The default 10Gi limit fits
  # the qwen2.5:7b model resident; lower it only if you mirror a smaller L3
  # model. (The OOMKill BLOCKER from the full-stack test was on sandbox-b's
  # bundled ollama at 2Gi, fixed in that subchart too.)
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 10Gi

secrets:
  backend: k8s-native
  values:
    # PRODUCTION: MUST override with a strong, unique password.
    postgresPassword: "CHANGE-ME-IN-PRODUCTION"
    encryptionKey: ""
    adminKey: ""
    veilSigningKey: ""
    dsaServiceToken: ""  # PRODUCTION: set via existingSecret or --set; dev: inline value
    modelAuthSecret: ""  # set when sanitizer.llmScanEnabled=true
    # PRODUCTION: must be set to a ≥32-char unique random secret. Sanitizer
    # canary-token detector uses it to sign canary tokens; without it, leaked
    # canary tokens cannot be authenticated as ours and silently disable the
    # detector (mirrors Compose-path CANARY_HMAC_KEY :? enforcement).
    canaryHmacKey: ""
  vault:
    path: "sandbox-a"
  aws:
    name: "dsa/sandbox-a"
  azure:
    name: "dsa-sandbox-a"
