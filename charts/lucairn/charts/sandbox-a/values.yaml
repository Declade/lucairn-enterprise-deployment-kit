namespace: dsa-identity

replicaCount: 2

image:
  repository: dsa-sandbox-a
  tag: ""
  pullPolicy: IfNotPresent

service:
  grpcPort: 50053
  healthPort: 8083

auditServiceAddr: "audit.dsa-audit.svc:50051"
grpcTlsEnabled: "false"
veilEnabled: "true"
veilWitnessAddr: "veil-witness.dsa-witness.svc.cluster.local:50057"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

pdb:
  enabled: true
  minAvailable: 1

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storageSize: 10Gi
  storageClass: ""
  user: dsa
  database: sandbox_a

external:
  databaseUrl: ""

sanitizer:
  image:
    # Default repository follows the chart's `global.imageRegistry` prefix
    # (e.g. ghcr.io/declade) so this resolves to ghcr.io/declade/dsa-sanitizer.
    # Override per-environment if you mirror images.
    repository: dsa-sanitizer
    # Empty `tag` falls through to `.Values.global.imageTag` (0.4.0 today)
    # so the side-car stays in lockstep with the rest of the kit.
    tag: ""
    pullPolicy: IfNotPresent
  # Parity with Compose default-sanitizer.yaml (calibrated against the
  # 12-corpus domain bench). Override per environment if needed.
  confidenceThreshold: 0.35
  safePatterns: []
  llmAuditEnabled: false
  qiEngineEnabled: "true"
  qiEngineThreshold: "0.25"
  qiEngineAction: "generalize"
  llmScanEnabled: false
  llmScanTimeout: 30
  # TOB-003 fix (2026-05-09): default "sequential" — Pro/Enterprise overlays
  # MUST explicitly set "ensemble" to opt into L3 reversal path.
  llmScanMode: "sequential"
  llmScanRestoreThreshold: 0.85

secrets:
  backend: k8s-native
  values:
    # PRODUCTION: MUST override with a strong, unique password.
    postgresPassword: "CHANGE-ME-IN-PRODUCTION"
    encryptionKey: ""
    adminKey: ""
    veilSigningKey: ""
    dsaServiceToken: ""  # PRODUCTION: set via existingSecret or --set; dev: inline value
    modelAuthSecret: ""  # set when sanitizer.llmScanEnabled=true
    # PRODUCTION: must be set to a ≥32-char unique random secret. Sanitizer
    # canary-token detector uses it to sign canary tokens; without it, leaked
    # canary tokens cannot be authenticated as ours and silently disable the
    # detector (mirrors Compose-path CANARY_HMAC_KEY :? enforcement).
    canaryHmacKey: ""
  vault:
    path: "dsa/data/sandbox-a"
  aws:
    name: "dsa/sandbox-a"
  azure:
    name: "dsa-sandbox-a"
