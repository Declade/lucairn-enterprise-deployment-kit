apiVersion: v1
kind: ConfigMap
metadata:
  name: sanitizer-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
data:
  config.yaml: |
    sanitizer:
      freetext_fields: []
      # W5+ Phase 1 (2026-05-09) toggles — credential-class + adversarial-input
      # hardening. Both default ON. Yaml loader ignores any unrecognised key,
      # so legacy `documented_placeholder_suppression_enabled` (removed in
      # TOB-160-001 to close a real-credential-leak path) is silently ignored.
      detect_secrets_enabled: true
      adversarial_normalization_enabled: true
      known_entity_matching:
        enabled: true
        strategies: [exact, cologne_phonetics, levenshtein]
        levenshtein_max_distance: 2
        location_context_window: 50
        # Customer-scoped PERSON name supplement. Override per-environment via
        # additional ConfigMap if surnames in the global german-names.txt
        # collide with common German words in your corpus.
        extra_person_names: []
      presidio:
        language_detection: auto
        default_language: de
        supported_languages: [de, en]
        confidence_threshold: {{ .Values.sanitizer.confidenceThreshold | default 0.35 }}
        custom_recognizers:
          - sozialversicherungsnummer
          - us_ssn
          - steuer_id
          - personalausweisnummer
          - german_zip_code
          - credit_card_extended
          - phone_extended
          - german_names
          - german_street
          - date_of_birth
          - account_number
          - fallnummer
          - vin
          - license_plate
          - swift_bic
          - passport_number
          - drivers_license
          - street_address
          - password
          - krankenversichertennummer
          # W5+ Phase 1 (2026-05-09) — high-value SaaS secret prefixes + partial
          # credit-card-suffix idiom. Yelp detect-secrets is wired separately
          # in app.py via sanitizer.detect_secrets_enabled.
          - openai_api_key
          - anthropic_api_key
          - stripe_webhook_secret
          - jwt_token
          - github_pat
          - credit_card_suffix_idiom
          # Phase 3 (2026-05-09) — domain coverage expansion. German court
          # Aktenzeichen recognizer closes the gov/legal recall gap (was
          # 67.5%); 5 international PII recognizers (ES DNI/NIE, FR INSEE,
          # IT Codice Fiscale, BE RNN, NL BSN) close the international recall
          # gap (was 66.7%); generic order-number recognizer closes the
          # customer-service recall gap (was 74%).
          - german_aktenzeichen
          - spanish_dni
          - french_insee
          - italian_codice_fiscale
          - belgian_rnn
          - dutch_bsn
          - order_number
        # safe_terms_file: operators wanting safe-terms suppression must
        # supply their own ConfigMap (e.g. medical-terms.txt) and mount it at
        # /config/medical-terms.txt, then uncomment the line below. The
        # default kit ConfigMap intentionally omits this to avoid a
        # missing-file warning on a clean install.
        # safe_terms_file: /config/medical-terms.txt
        safe_patterns:
          # GPS / decimal coordinates: digits with 4+ decimal places.
          - '-?\d{1,3}\.\d{4,}'
          {{- range .Values.sanitizer.safePatterns | default (list) }}
          - {{ . | quote }}
          {{- end }}
      llm_audit:
        enabled: {{ .Values.sanitizer.llmAuditEnabled | default false }}
      llm_scan:
        enabled: {{ .Values.sanitizer.llmScanEnabled | default false }}
        ollama_url: "http://ollama-identity:11434"
        model: "qwen2.5:7b"
        timeout_seconds: {{ .Values.sanitizer.llmScanTimeout | default 30 }}
        # FAIL-01 (PRD prd-2026-05-29-fail-safe-scrubber): fail-CLOSED. When the
        # L3 deep PII shield (on-device Qwen via Ollama) is unavailable, the
        # sanitizer returns a 503 l3_scrubber_unavailable rather than silently
        # shipping a request with only L1+L2 coverage. The effective fail-mode
        # is governed by the LUCAIRN_L3_REQUIRED env var (default true → reject);
        # operators set it to "false" per deployment to restore continue-mode.
        fallback_on_error: "reject"
        # Default sequential (TOB-003 fix, 2026-05-09): "ensemble" silently
        # changes cert payload shape across ALL customers regardless of the
        # per-request enable_l3_reversals flag. Pro/Enterprise overlays opt in
        # explicitly via .Values.sanitizer.llmScanMode = "ensemble".
        mode: {{ .Values.sanitizer.llmScanMode | default "sequential" | quote }}
        # Calibrated against the 12-corpus domain bench to hit news-journalism
        # FP < 9% without leaking patient names.
        restore_threshold: {{ .Values.sanitizer.llmScanRestoreThreshold | default 0.85 }}

      # ──────────────────────────────────────────────────────────────────
      # Phase 7 — ML PII scanners (Piiranha + GLiNER) extracted into the
      # pii-ml gRPC sidecar (PR #240 production-path follow-up, "A3 Proper").
      #
      # CRITICAL: these blocks MUST nest UNDER `sanitizer:` (NOT at the
      # top of config.yaml). Sanitizer's config.py:506-522 reads them via
      # `sanitizer_data.get("piiranha", {})`, `sanitizer_data.get("gliner", {})`,
      # etc. — top-level keys are silently ignored. r1 bug-hunter BLOCKER-3
      # caught this rendering at the wrong indentation; DO NOT outdent.
      #
      # The blocks have TWO independent enable gates:
      #   1. The umbrella chart's `pii-ml.enabled` flag controls whether the
      #      sidecar DEPLOYS at all.
      #   2. The sanitizer-side `piiranha.enabled` / `gliner.enabled` flags
      #      below control whether the sanitizer attempts to CALL the sidecar.
      #
      # Helm operators opt into Phase 7 ML by flipping BOTH gates on. The
      # half-enabled combos are NON-fatal (no fail-fast guard yet, future
      # work) but documented misconfigurations:
      #   - sanitizer layers enabled + sidecar disabled → sanitizer dials a
      #     nonexistent service every scan; circuit breaker opens within 3
      #     requests and Phase 7 stays dormant (functional but log-noisy)
      #   - sidecar enabled + sanitizer layers disabled → wasted resources,
      #     Phase 7 layers never fire
      #
      # Closes contract-drift-detector DRIFT-001 (PR #241): the in-tree
      # config/default-sanitizer.yaml grew Phase 7 sections at PR #240; the
      # Helm-rendered sanitizer ConfigMap fell behind. Default-OFF here to
      # match the Helm convention (operators opt in), vs default-ON in the
      # in-tree default-sanitizer.yaml.
      # ──────────────────────────────────────────────────────────────────
      piiranha:
        enabled: {{ .Values.sanitizer.piiranha.enabled | default false }}
        # gRPC deadline per scan call (seconds). The sidecar's eager-load
        # pre-warms inference; first-call latency should be < 5s.
        grpc_deadline_seconds: {{ .Values.sanitizer.piiranha.grpcDeadlineSeconds | default 5 }}

      gliner:
        enabled: {{ .Values.sanitizer.gliner.enabled | default false }}
        grpc_deadline_seconds: {{ .Values.sanitizer.gliner.grpcDeadlineSeconds | default 5 }}
        # Adaptive-skip thresholds. Sanitizer passes l1_l2_entity_count +
        # text_len to the sidecar; the sidecar applies these to decide
        # whether to run GLiNER inference at all (skipped_short / skipped_dense).
        skip_min_text_len: {{ .Values.sanitizer.gliner.skipMinTextLen | default 32 }}
        skip_max_entity_density: {{ .Values.sanitizer.gliner.skipMaxEntityDensity | default 0.30 }}

      k_anonymity:
        # k-anonymity is pure math — stays in-process in sanitizer (NOT in
        # the pii-ml sidecar). Default OFF for Helm operators; flip on via
        # `.Values.sanitizer.kAnonymity.enabled`. See PRD § Out of scope.
        enabled: {{ .Values.sanitizer.kAnonymity.enabled | default false }}
        k: {{ .Values.sanitizer.kAnonymity.k | default 5 }}

      pii_ml_client:
        # gRPC endpoint for the pii-ml sidecar. The default resolves to the
        # pii-ml subchart's Service in the sandbox-a namespace (dsa-identity).
        # Sanitizer's pii_ml_client.py dials this on every Phase 7 scan.
        endpoint: "{{ .Values.sanitizer.piiMlClient.endpoint | default (printf "pii-ml.%s.svc.cluster.local:50056" .Values.namespace) }}"
        # Per-scan gRPC deadline. Sanitizer's config.py reads `deadline_seconds`
        # (flat field, NOT nested). Missing → defaults to 5.0 silently.
        deadline_seconds: {{ .Values.sanitizer.piiMlClient.deadlineSeconds | default 5 }}
        # Circuit breaker: open after N consecutive failures, half-open after
        # half_open_seconds. r1 kit-config-image-drift BLOCKER-2: sanitizer's
        # config.py:595-606 reads `circuit_breaker_open_after` /
        # `circuit_breaker_half_open_seconds` as FLAT fields on `pii_ml_client`
        # (NOT nested under a `circuit_breaker:` sub-mapping). Helm operators
        # tune via `.sanitizer.piiMlClient.circuitBreaker.{...}` (camelCase
        # values-tree convention preserved); the template flattens at render.
        circuit_breaker_open_after: {{ .Values.sanitizer.piiMlClient.circuitBreaker.consecutiveFailures | default 3 }}
        circuit_breaker_half_open_seconds: {{ .Values.sanitizer.piiMlClient.circuitBreaker.halfOpenSeconds | default 30 }}

    qi_engine:
      # Controlled at runtime via QI_ENGINE_ENABLED, QI_ENGINE_THRESHOLD,
      # QI_ENGINE_ACTION env vars. Defaults shown here for reference:
      enabled: false
      threshold: 0.25
      action: generalize
