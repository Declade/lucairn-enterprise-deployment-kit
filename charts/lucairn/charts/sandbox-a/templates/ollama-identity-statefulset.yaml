{{- if .Values.sanitizer.llmScanEnabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama-identity
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: ollama-identity
    app.kubernetes.io/part-of: dsa
spec:
  serviceName: ollama-identity
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-identity
        app.kubernetes.io/part-of: dsa
    spec:
      # NET-05: this pod never calls the Kubernetes API; using the
      # namespace default ServiceAccount it would still auto-mount an
      # unused token. Disable the mount at the pod level.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
      containers:
        - name: ollama
          image: "{{ .Values.ollamaIdentity.image.repository }}:{{ .Values.ollamaIdentity.image.tag }}{{ if .Values.ollamaIdentity.image.digest }}@{{ .Values.ollamaIdentity.image.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.ollamaIdentity.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          startupProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["ollama", "list"]
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 10Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
{{- end }}
