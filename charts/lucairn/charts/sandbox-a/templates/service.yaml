apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      name: grpc
    - port: {{ .Values.service.healthPort }}
      targetPort: health
      name: health
    - port: 8086
      targetPort: 8086
      name: sanitizer
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
