{{- if eq .Values.secrets.backend "k8s-native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: "postgres://{{ .Values.postgresql.user }}:{{ .Values.secrets.values.postgresPassword }}@{{ .Chart.Name }}-postgresql:5432/{{ .Values.postgresql.database }}?sslmode={{ .Values.global.postgresqlSslmode | default "disable" }}"
  POSTGRES_PASSWORD: {{ .Values.secrets.values.postgresPassword | quote }}
  {{- else }}
  DATABASE_URL: {{ .Values.external.databaseUrl | quote }}
  {{- end }}
  ENCRYPTION_KEY: {{ .Values.secrets.values.encryptionKey | quote }}
  DSA_ADMIN_KEY: {{ .Values.secrets.values.adminKey | quote }}
  VEIL_SIGNING_KEY: {{ .Values.secrets.values.veilSigningKey | quote }}
  DSA_SERVICE_TOKEN: {{ .Values.secrets.values.dsaServiceToken | quote }}
  {{- if .Values.sanitizer.llmScanEnabled }}
  MODEL_AUTH_SECRET: {{ .Values.sanitizer.modelAuthSecret | quote }}
  {{- end }}
{{- end }}
