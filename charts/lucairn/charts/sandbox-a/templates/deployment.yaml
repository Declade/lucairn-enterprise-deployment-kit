apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      # DNS search list workaround for the sandbox-a binary's hostname
      # regex, which rejects FQDNs (sandbox-b.dsa-ai.svc.cluster.local)
      # but accepts short hostnames. With this search list, the
      # SANDBOX_B_PROBE_TARGET="sandbox-b:50054" lookup below resolves
      # via dsa-ai.svc.cluster.local at DNS resolution time — short
      # hostname goes through the binary's regex, FQDN translation
      # happens at the resolver. (Vast-verify finding #6 chart-side
      # workaround. A DSA-side regex fix is the architectural answer
      # for v1.0.1; this closes the install gate today without an
      # image republish.)
      dnsConfig:
        searches:
          - dsa-ai.svc.cluster.local
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.global.nodeIsolation }}
      # Node pool isolation: Sandbox A and Sandbox B must never share a node.
      # This prevents container-escape attacks from crossing the identity/AI boundary.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: dsa.io/zone
                    operator: In
                    values:
                      - identity
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - sandbox-b
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: dsa.io/zone
          operator: Equal
          value: identity
          effect: NoSchedule
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-addr=:{{ .Values.service.grpcPort }}"
            - "-health-addr=:{{ .Values.service.healthPort }}"
          env:
            - name: SANDBOX_A_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL
            - name: SANDBOX_A_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: ENCRYPTION_KEY
            - name: AUDIT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: AUDIT_SERVICE_ADDR
            - name: DSA_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_ADMIN_KEY
            - name: GRPC_TLS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: GRPC_TLS_ENABLED
            - name: SANITIZER_ADDR
              value: "http://localhost:8086"
            - name: SANDBOX_B_PROBE_TARGET
              # SHORT hostname — the sandbox-a binary's input regex
              # rejects FQDNs. The pod's dnsConfig.searches above
              # (dsa-ai.svc.cluster.local) makes the kubelet resolver
              # try the full FQDN at lookup time. (Vast-verify finding #6
              # chart-side workaround.)
              value: "sandbox-b:50054"
            - name: DSA_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: DSA_ENV
            - name: DSA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_SERVICE_TOKEN
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
        - name: sanitizer
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.sanitizer.image.repository }}:{{ .Values.sanitizer.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sanitizer.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: sanitizer
              containerPort: 8086
              protocol: TCP
          env:
            - name: SANITIZER_CONFIG_PATH
              value: /config/config.yaml
            - name: SANITIZER_PORT
              value: "8086"
            - name: HOME
              value: /tmp/home
            - name: VEIL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: VEIL_ENABLED
            - name: VEIL_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: VEIL_SIGNING_KEY
            - name: CANARY_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: CANARY_HMAC_KEY
            - name: VEIL_WITNESS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: VEIL_WITNESS_ADDR
            - name: QI_ENGINE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: QI_ENGINE_ENABLED
            - name: QI_ENGINE_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: QI_ENGINE_THRESHOLD
            - name: QI_ENGINE_ACTION
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: QI_ENGINE_ACTION
          volumeMounts:
            - name: sanitizer-config
              mountPath: /config
            - name: sanitizer-tmp
              mountPath: /tmp
            - name: sanitizer-home
              mountPath: /tmp/home
          startupProbe:
            httpGet:
              path: /healthz
              port: sanitizer
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: sanitizer
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: sanitizer
            periodSeconds: 10
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "1000m"
      volumes:
        - name: sanitizer-config
          configMap:
            name: sanitizer-config
        - name: sanitizer-tmp
          emptyDir: {}
        - name: sanitizer-home
          emptyDir:
            sizeLimit: 500Mi
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
