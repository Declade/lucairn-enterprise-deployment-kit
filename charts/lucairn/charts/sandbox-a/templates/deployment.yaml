apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: dsa
    spec:
      serviceAccountName: {{ .Chart.Name }}
      # Graceful connection draining on rolling restart / node drain (HA-04).
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      # DNS search list workaround for the sandbox-a binary's hostname
      # regex, which rejects FQDNs (sandbox-b.dsa-ai.svc.cluster.local)
      # but accepts short hostnames. With this search list, the
      # SANDBOX_B_PROBE_TARGET="sandbox-b:50054" lookup below resolves
      # via dsa-ai.svc.cluster.local at DNS resolution time — short
      # hostname goes through the binary's regex, FQDN translation
      # happens at the resolver. (Vast-verify finding #6 chart-side
      # workaround. A DSA-side regex fix is the architectural answer
      # for v1.0.1; this closes the install gate today without an
      # image republish.)
      dnsConfig:
        searches:
          - dsa-ai.svc.cluster.local
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.global.nodeIsolation }}
      # Node pool isolation: Sandbox A and Sandbox B must never share a node.
      # This prevents container-escape attacks from crossing the identity/AI boundary.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: dsa.io/zone
                    operator: In
                    values:
                      - identity
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - sandbox-b
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: dsa.io/zone
          operator: Equal
          value: identity
          effect: NoSchedule
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-addr=:{{ .Values.service.grpcPort }}"
            - "-health-addr=:{{ .Values.service.healthPort }}"
          env:
            - name: SANDBOX_A_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DATABASE_URL
            - name: SANDBOX_A_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: ENCRYPTION_KEY
            - name: AUDIT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: AUDIT_SERVICE_ADDR
            - name: DSA_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_ADMIN_KEY
            - name: GRPC_TLS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: GRPC_TLS_ENABLED
            - name: SANITIZER_ADDR
              value: "http://localhost:8086"
            - name: SANDBOX_B_PROBE_TARGET
              # SHORT hostname — the sandbox-a binary's input regex
              # rejects FQDNs. The pod's dnsConfig.searches above
              # (dsa-ai.svc.cluster.local) makes the kubelet resolver
              # try the full FQDN at lookup time. (Vast-verify finding #6
              # chart-side workaround.)
              value: "sandbox-b:50054"
            - name: DSA_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: DSA_ENV
            - name: DSA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: DSA_SERVICE_TOKEN
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if and .Values.gracefulShutdown (gt (int (.Values.gracefulShutdown.preStopSleepSeconds | default 0)) 0) }}
          # preStop drain delay (HA-04): hold the container open while
          # kube-proxy removes this pod from Service endpoints, so in-flight
          # requests are not dropped on rolling restart / node drain. The
          # runtime image is alpine, so /bin/sh + sleep are available.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ int .Values.gracefulShutdown.preStopSleepSeconds }}"]
          {{- end }}
        - name: sanitizer
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.sanitizer.image.repository }}:{{ .Values.sanitizer.image.tag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sanitizer.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: sanitizer
              containerPort: 8086
              protocol: TCP
          env:
            - name: SANITIZER_CONFIG_PATH
              value: /config/config.yaml
            - name: SANITIZER_PORT
              value: "8086"
            - name: HOME
              value: /tmp/home
            - name: LCR_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: LCR_ENABLED
            - name: LCR_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: LCR_SIGNING_KEY
            - name: CANARY_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: CANARY_HMAC_KEY
            - name: LCR_WITNESS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: LCR_WITNESS_ADDR
            - name: QI_ENGINE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: QI_ENGINE_ENABLED
            - name: QI_ENGINE_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: QI_ENGINE_THRESHOLD
            - name: QI_ENGINE_ACTION
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: QI_ENGINE_ACTION
            # FIX-B (full-stack-test-results-2026-05-29): wire the L3 fail-mode
            # knob into the sanitizer container. Default "true" = fail-CLOSED
            # (503 l3_scrubber_unavailable when the L3 deep PII shield is down).
            # Set sanitizer.l3Required=false to fall back to continue-mode (cert
            # honestly downgraded to PARTIAL). Without this env the operator
            # could not select continue-mode on a stock install (blocked G1c).
            # NOTE: use hasKey, NOT `| default true` — Sprig's `default` treats
            # the boolean `false` as empty and would clobber an explicit
            # l3Required=false back to true. hasKey honors an explicit false.
            - name: LUCAIRN_L3_REQUIRED
              value: {{ if hasKey .Values.sanitizer "l3Required" }}{{ .Values.sanitizer.l3Required | quote }}{{ else }}{{ "true" | quote }}{{ end }}
            # Phase 7 ML sidecar wiring (PR #240 production-path follow-up).
            # Sanitizer's pii_ml_client.py reads LUCAIRN_PII_ML_ADDR at boot
            # and dials this on every Phase 7 scan. Default resolves to the
            # pii-ml subchart's Service in this namespace; override via
            # .Values.sanitizer.piiMlClient.endpoint if pii-ml is deployed
            # to a non-default namespace or to an external endpoint.
            #
            # When Phase 7 is disabled (sanitizer.piiranha.enabled=false +
            # sanitizer.gliner.enabled=false) this env is still emitted but
            # never consumed; sanitizer's pii_ml_client.py only dials when
            # the layer is enabled in the rendered config.yaml. Setting an
            # invalid endpoint here is therefore non-fatal in the
            # Phase-7-disabled topology.
            - name: LUCAIRN_PII_ML_ADDR
              value: "{{ .Values.sanitizer.piiMlClient.endpoint | default (printf "pii-ml.%s.svc.cluster.local:50056" .Values.namespace) }}"
            # Sanitizer content-address cache — see INSTALL.md § "Sanitizer
            # content cache (Redis — default ON)" for the operator runbook.
            # Default "redis" uses the bundled redis-sanitizer-cache StatefulSet
            # in this namespace. The sanitizer app.py fails-OPEN on any Redis
            # error (cache miss, not 500) so the scanner pipeline is never
            # blocked by cache outage.
            #
            # sanitizerCache.enabled  — controls whether the BUNDLED
            #   redis-sanitizer-cache StatefulSet is deployed. It does NOT
            #   force the backend to "memory". Set enabled=false + backend=redis
            #   + redisUrl=<external> to point at an operator-managed Redis
            #   without deploying the bundled StatefulSet.
            # sanitizerCache.backend  — controls which backend the sanitizer
            #   uses ("redis" or "memory"). Defaults to "redis".
            # sanitizerCache.redisUrl — URL passed to the sanitizer when
            #   backend=redis. Defaults to the bundled service DNS when empty.
            - name: SANITIZER_CACHE_BACKEND
              value: {{ .Values.sanitizerCache.backend | default "redis" | quote }}
            {{- if eq (.Values.sanitizerCache.backend | default "redis") "redis" }}
            - name: SANITIZER_CACHE_REDIS_URL
              value: {{ .Values.sanitizerCache.redisUrl | default (printf "redis://%s-sanitizer-cache.%s.svc.cluster.local:6379/0" .Chart.Name .Values.namespace) | quote }}
            - name: SANITIZER_CACHE_TTL_SECONDS
              value: {{ .Values.sanitizerCache.ttlSeconds | default 3600 | quote }}
            {{- end }}
            # Streaming chunk-aware state backend (TMS Slice 3 / DSA PR #267).
            # Closes kit issue #68: without these env vars the sanitizer falls
            # back to the per-worker in-process store, which causes ~88%
            # FAIL-CLOSED under gunicorn cross-worker routing (each chunk of one
            # SSE stream may land on a DIFFERENT worker; per-worker state is lost
            # → bail fires on the very next chunk).
            #
            # SANITIZER_STREAM_STATE_BACKEND — "redis" (default) uses the shared
            #   Redis so ANY gunicorn worker rehydrates the exact per-stream
            #   PlaceholderRegistry + tail-buffer the prior chunk produced. Set to
            #   "memory" only as a temporary revert if Redis is unavailable.
            #
            # SANITIZER_STREAM_STATE_REDIS_URL — must point at the SAME
            #   redis-sanitizer-cache Redis as SANITIZER_CACHE_REDIS_URL. The
            #   stream-state keys live under a SEPARATE key prefix ("tms:stream:")
            #   so they never collide with the content-cache ("tms:cache:") or the
            #   DP-budget namespace ("privacy_budget:") on the other Redis instance.
            #   Defaults to the bundled service URL when empty; the sanitizer also
            #   falls back to SANITIZER_CACHE_REDIS_URL when the var is unset, but
            #   explicit wiring here guarantees the correct URL even when that
            #   fallback chain differs.
            #
            # SANITIZER_STREAM_STATE_TTL_SECONDS — per-stream state key TTL (s).
            #   Default 300 (5 min). Set >= the longest expected streaming response.
            #
            # SANITIZER_STREAM_MUTATION_MARKER_TTL_SECONDS — cert-integrity
            #   mutation-marker TTL (s). MUST be strictly > STREAM_STATE_TTL_SECONDS
            #   (sanitizer fails-fast and clamps on boot if violated). The marker
            #   survives the stream state so the gateway can detect mid-stream fresh-
            #   state resets that would produce an unsigned cert with renumbered
            #   placeholders. Default 600 (2× the state TTL + margin).
            - name: SANITIZER_STREAM_STATE_BACKEND
              value: {{ .Values.sanitizerStreamState.backend | default "redis" | quote }}
            {{- if eq (.Values.sanitizerStreamState.backend | default "redis") "redis" }}
            - name: SANITIZER_STREAM_STATE_REDIS_URL
              value: {{ .Values.sanitizerStreamState.redisUrl | default (printf "redis://%s-sanitizer-cache.%s.svc.cluster.local:6379/0" .Chart.Name .Values.namespace) | quote }}
            - name: SANITIZER_STREAM_STATE_TTL_SECONDS
              value: {{ .Values.sanitizerStreamState.ttlSeconds | default 300 | quote }}
            - name: SANITIZER_STREAM_MUTATION_MARKER_TTL_SECONDS
              value: {{ .Values.sanitizerStreamState.mutationMarkerTtlSeconds | default 600 | quote }}
            {{- end }}
          volumeMounts:
            - name: sanitizer-config
              mountPath: /config
            - name: sanitizer-tmp
              mountPath: /tmp
            - name: sanitizer-home
              mountPath: /tmp/home
          startupProbe:
            httpGet:
              path: /healthz
              port: sanitizer
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: sanitizer
            periodSeconds: 10
          readinessProbe:
            # /readyz (not /healthz) so readiness means the sanitizer is
            # FUNCTIONALLY ready — Presidio NLP engine warmed and the PII
            # pipeline loaded — not merely that the HTTP listener is up.
            # /healthz is connectivity-only and would flip the sidecar
            # Ready while it still 503s real /v1/sanitize traffic (HA-09).
            httpGet:
              path: /readyz
              port: sanitizer
            periodSeconds: 10
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "1000m"
      volumes:
        - name: sanitizer-config
          configMap:
            name: sanitizer-config
        - name: sanitizer-tmp
          emptyDir: {}
        - name: sanitizer-home
          emptyDir:
            sizeLimit: 500Mi
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
