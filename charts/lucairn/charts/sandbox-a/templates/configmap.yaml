{{- $mtlsEnabled := and (kindIs "bool" .Values.global.mtls.enabled) .Values.global.mtls.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
data:
  GRPC_ADDR: ":{{ .Values.service.grpcPort }}"
  HEALTH_ADDR: ":{{ .Values.service.healthPort }}"
  AUDIT_SERVICE_ADDR: {{ .Values.auditServiceAddr | quote }}
  {{- if $mtlsEnabled }}
  GRPC_TLS_ENABLED: "true"
  DSA_MTLS_CA_BUNDLE_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.caBundleKey }}"
  DSA_MTLS_SERVER_CERT_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.certKey }}"
  DSA_MTLS_SERVER_KEY_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.keyKey }}"
  DSA_MTLS_CLIENT_CERT_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.certKey }}"
  DSA_MTLS_CLIENT_KEY_PATH: "{{ .Values.global.mtls.mountPath }}/{{ .Values.global.mtls.keyKey }}"
  DSA_MTLS_SERVER_NAME: "dsa-sandbox-a"
  {{- else }}
  GRPC_TLS_ENABLED: {{ .Values.grpcTlsEnabled | quote }}
  {{- end }}
  LCR_ENABLED: {{ .Values.veilEnabled | quote }}
  LCR_WITNESS_ADDR: {{ .Values.veilWitnessAddr | quote }}
  QI_ENGINE_ENABLED: {{ .Values.sanitizer.qiEngineEnabled | quote }}
  QI_ENGINE_THRESHOLD: {{ .Values.sanitizer.qiEngineThreshold | quote }}
  QI_ENGINE_ACTION: {{ .Values.sanitizer.qiEngineAction | quote }}
  SANDBOX_A_EPHEMERAL: {{ .Values.ephemeral | quote }}
  DSA_ENV: {{ required "global.dsaEnv must be set to \"development\" or \"production\" in the umbrella values" .Values.global.dsaEnv | quote }}
