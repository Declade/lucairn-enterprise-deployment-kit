{{- if eq .Values.secrets.backend "k8s-native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: dsa
type: Opaque
stringData:
  ADMIN_PASSWORD: {{ .Values.secrets.values.adminPassword | quote }}
  DSA_SERVICE_TOKEN: {{ .Values.secrets.values.dsaServiceToken | quote }}
{{- end }}
