# Namespaces are pre-install hooks so they exist before migration Jobs run.
# IMPORTANT: hook-delete-policy is intentionally OMITTED. Namespaces persist
# across upgrades to protect namespaced PVCs (e.g. postgres-gateway-data in
# dsa-edge) from cascade deletion. A namespace deletion cascades to delete
# every namespaced resource regardless of `helm.sh/resource-policy: keep`
# annotations, which would silently nuke the keystore PVC every upgrade
# (Sim 5 Codex r1 BLOCKER).
# Note: Namespaces are NOT deleted on helm uninstall (by design — prevents
# accidental data loss). Cleanup is operator-managed via
# `kubectl delete namespace dsa-*` for full teardown.
{{- range .Values.namespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .name }}
  labels:
    app.kubernetes.io/part-of: dsa
    dsa.io/namespace: {{ .label }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
{{- end }}
