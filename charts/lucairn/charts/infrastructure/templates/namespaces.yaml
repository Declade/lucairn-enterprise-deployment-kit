# Namespaces are pre-install hooks so they exist before migration Jobs run.
# hook-delete-policy: before-hook-creation ensures cleanup on re-install.
# Note: Namespaces are NOT deleted on helm uninstall (by design — prevents
# accidental data loss). Use `kubectl delete namespace dsa-*` for full cleanup.
{{- range .Values.namespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .name }}
  labels:
    app.kubernetes.io/part-of: dsa
    dsa.io/namespace: {{ .label }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
{{- end }}
