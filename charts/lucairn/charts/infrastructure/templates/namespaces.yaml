# Namespaces are NORMAL release-owned resources (NOT Helm hooks). Helm's
# hardcoded install order puts Namespace at index 1 (after CRD), so workloads
# in dependency order land in the right namespace without needing a pre-install
# hook for ordering. See https://helm.sh/docs/topics/charts_hooks/ for the
# default install order.
#
# WHY NOT HOOKS (Sim 5 Codex r1 + r2 BLOCKER):
# Helm applies `helm.sh/hook-delete-policy: before-hook-creation` AS THE
# DEFAULT when no delete policy is specified. That means every `helm upgrade`
# would DELETE the previous Namespace hook resource before recreating it,
# cascading deletion of every namespaced resource inside (including the
# postgres-gateway-data PVC). Removing the explicit delete-policy line is NOT
# enough — the default still applies. The only correct fix is to stop making
# namespaces hooks entirely.
#
# `helm.sh/resource-policy: keep` ensures `helm uninstall` also preserves the
# namespaces — matches the existing "Namespaces are NOT deleted on helm
# uninstall (by design — prevents accidental data loss)" doc contract.
# Cleanup is operator-managed via `kubectl delete namespace dsa-*` for full
# teardown.
{{- range .Values.namespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .name }}
  labels:
    app.kubernetes.io/part-of: dsa
    dsa.io/namespace: {{ .label }}
  annotations:
    "helm.sh/resource-policy": keep
    {{- if $.Values.global.wireguardEncryption }}
    # Cilium WireGuard: encrypt all traffic in/out of this namespace. This is
    # deliberately an operator opt-in because generic production also supports
    # Calico, which does not consume the Cilium annotation.
    io.cilium.network.wg-encryption: "true"
    {{- end }}
{{- end }}
