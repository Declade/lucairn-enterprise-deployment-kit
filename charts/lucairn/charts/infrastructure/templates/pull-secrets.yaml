{{- /*
Chart-managed lucairn-registry pull Secret rendered into every dsa-* workload
namespace (closes Sim 5 Helm Gap #1 — manual Phase 2 kubectl create secret
loop wiped on every helm upgrade by the namespace pre-install hook). Operator
passes dockerconfigjson once via --set-file global.imagePullDockerConfigJson.

NO helm.sh/hook annotations — these are normal release-owned resources so
Helm restores them every install + upgrade.

Fail-guard (closes bug-hunter M2 + doctor-coverage GAP-1): an empty
imagePullDockerConfigJson would silently skip Secret rendering, then every
pod ImagePullBackOff with a non-obvious error. Fail-closed at template time
with an actionable message and a documented escape hatch
(global.skipPullSecretGuard=true) for mirrored public registries.
*/ -}}
{{- if not .Values.global.imagePullDockerConfigJson }}
{{- if not .Values.global.skipPullSecretGuard }}
{{- fail "global.imagePullDockerConfigJson is empty. Pass it at install via --set-file global.imagePullDockerConfigJson=$DOCKER_CONFIG/config.json. To suppress (e.g. mirrored public registry), set global.skipPullSecretGuard=true." }}
{{- end }}
{{- end }}
{{- if .Values.global.imagePullDockerConfigJson }}
{{- range .Values.namespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: lucairn-registry
  namespace: {{ .name }}
  labels:
    app.kubernetes.io/part-of: dsa
    dsa.io/namespace: {{ .label }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $.Values.global.imagePullDockerConfigJson | b64enc | quote }}
{{- end }}
---
# Parent release namespace Secret (closes bug-hunter B1). The dashboard
# subchart (and any future surface deployed into .Release.Namespace, e.g.
# lucairn) references imagePullSecrets: [lucairn-registry] — without this
# block the dashboard pod ImagePullBackOffs. The 10 dsa-* namespaces are
# rendered in the range above; this block adds the 11th Secret in the
# parent release namespace.
apiVersion: v1
kind: Secret
metadata:
  name: lucairn-registry
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: dsa
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.global.imagePullDockerConfigJson | b64enc | quote }}
{{- end }}
