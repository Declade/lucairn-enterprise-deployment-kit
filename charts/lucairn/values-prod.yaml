# deploy/helm/values-prod.yaml
# Production overlay: resource requests, ESO, prod-only security flags.
#
# v1.0 SINGLE-REPLICA LOCK: every replicaCount below is 1. The umbrella
# chart's own validator (charts/lucairn/templates/_validators.tpl —
# validators.podLocalStateSingleReplica + the gateway file-keystore check)
# HARD-FAILS render on any replicaCount != 1 for veil-witness / audit /
# id-bridge / sandbox-a / sandbox-b / gateway, because each holds pod-local
# in-memory state that K8s Service round-robin cannot safely split (cert
# chain finalises PARTIAL, dedup uniformity breaks, rate-limit bypass).
# Multi-replica HA is the v2.0 roadmap. Do NOT raise these to 2 — the
# install will fail to render. See INSTALL.md § "v1.0 deployment topology".
#
# gRPC TRANSPORT (encrypted) — automatic with this overlay:
#   dsaEnv=production + the per-subchart grpcTlsEnabled="true" below give every
#   Go gRPC service ENCRYPTED transport. This is REQUIRED: each service calls
#   tlsutil.RequireTLSInProduction() at boot and refuses to start with PLAINTEXT
#   under production. With no cert PATHS wired, tlsutil self-generates an
#   ephemeral cert and clients dial with InsecureSkipVerify — encrypted but NOT
#   peer-authenticated. No extra steps are needed for this baseline.
#
# OPTIONAL — full peer-authenticated mTLS:
#   Run scripts/bootstrap-grpc-certs.sh to generate a per-deploy CA + per-service
#   certs, load them as K8s Secrets (the script prints the commands), then wire
#   the cert paths via DSA_MTLS_*_PATH env (a documented follow-up — chart
#   cert-mount wiring tracks the cert-manager dependency). This upgrades the
#   encrypted-only baseline above to mutually-authenticated mTLS.
#
# GATEWAY_KEYSTORE_DSN note:
#   On an ESO backend, GATEWAY_KEYSTORE_DSN is NOT managed by the
#   ExternalSecret (it is a separate secretKeyRef in
#   gateway/templates/deployment.yaml:96-101 under postgresKeystore.enabled).
#   On a cold-restore you MUST re-seed that Secret independently or the
#   gateway crash-loops when postgresKeystore.enabled=true.
#
# Smoke-test this overlay renders before shipping (skipPullSecretGuard=true so
# the render does not require registry pull credentials — it does NOT relax the
# prod overlay itself, which keeps the guard; it only makes this dev sanity-
# check render standalone):
#   helm template lucairn charts/lucairn -f charts/lucairn/values-prod.yaml \
#     --set global.skipPullSecretGuard=true \
#     --set gateway.secrets.values.dsaServiceToken=x \
#     --set "sandbox-b.redis.password=x" \
#     --set "sandbox-b.secrets.values.sandboxBApiKeys=x" \
#     --set "veil-witness.secrets.values.signingKey=$(openssl rand -hex 32)" \
#     >/dev/null && echo OK
global:
  secrets:
    backend: vault
    vault:
      endpoint: ""
      role: dsa
      mountPath: dsa
  # Production: enable Cilium DNS restriction and Hubble audit.
  # Requires Cilium CNI installed on the cluster.
  dnsRestriction: true
  nodeIsolation: true
  postgresqlSslmode: require
  wireguardEncryption: true
  # Production environment flag — enables dev-secret rejection guards.
  # WARNING: dsaEnv=production causes every Go gRPC service that calls
  # tlsutil.RequireTLSInProduction() to refuse PLAINTEXT transport at boot
  # if GRPC_TLS_ENABLED=false (pkg/tlsutil/tlsutil.go:658:
  #   "GRPC_TLS_ENABLED=true (or the DSA_MTLS_* family) is required when
  #    DSA_ENV=production; refusing to start with plaintext transport").
  # Services with this guard: gateway, audit, id-bridge, sandbox-a, admin
  # (services/admin/cmd/server/main.go:49), and ingest when enabled
  # (services/ingest/cmd/server/main.go:69). The per-subchart
  # grpcTlsEnabled: "true" values below form the coherent pair — every prod
  # service that renders DSA_ENV=production ALSO gets GRPC_TLS_ENABLED=true.
  # NEVER set dsaEnv=production without them.
  # Slice-0 confirmed (2026-06-19): global.grpcTlsEnabled is NOT read by
  # subchart templates (they use `.Values.grpcTlsEnabled`, local scope), so
  # the flag MUST be set per-subchart — setting it only under global: renders
  # GRPC_TLS_ENABLED="false" in every ConfigMap.
  dsaEnv: production

audit:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  # M7 (Slice-0 confirmed): set per-subchart, not global — templates use
  # .Values.grpcTlsEnabled (local), not .Values.global.grpcTlsEnabled.
  grpcTlsEnabled: "true"
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    values:
      # PRODUCTION: Set dsaServiceToken via --set or Vault; do not commit here.
      dsaServiceToken: ""

id-bridge:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  grpcTlsEnabled: "true"
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    values:
      # PRODUCTION: Set dsaServiceToken via --set or Vault; do not commit here.
      dsaServiceToken: ""

sandbox-a:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  grpcTlsEnabled: "true"
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    values:
      # PRODUCTION: Set dsaServiceToken via --set or Vault; do not commit here.
      dsaServiceToken: ""

sandbox-b:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  grpcTlsEnabled: "true"
  workers: 4
  redis:
    # Password MUST be provided at install time via --set or external secret.
    # Helm will fail if left empty/placeholder when global.dsaEnv=production.
    password: ""
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  secrets:
    values:
      # PRODUCTION: Set sandboxBApiKeys via --set or Vault; do not commit here.
      sandboxBApiKeys: ""
  verticals:
    finance:
      config:
        provider: anthropic
        model: claude-sonnet-4-6

veil-witness:
  enabled: true
  # No grpcTlsEnabled here BY DESIGN: the witness binary does NOT call
  # tlsutil.RequireTLSInProduction() (verified Slice-0, 2026-06-19) — its
  # transport security is the opt-in WITNESS_MTLS_* family on :50058, default
  # off. It therefore does not boot-fatal under dsaEnv=production with
  # plaintext, so omitting the flag is coherent (not a gap).
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

observability:
  grafana:
    adminCIDR: "10.0.0.0/8"  # Restrict to VPN CIDR — customize per deployment
  loki:
    authEnabled: true
  secrets:
    values:
      grafanaAdminPassword: "CHANGE-ME-generate-random-at-install"

demo:
  enabled: false

gateway:
  replicaCount: 1  # v1.0 single-replica lock (file-keystore on RWO PVC)
  grpcTlsEnabled: "true"
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    values:
      # PRODUCTION: Set dsaServiceToken via --set or Vault; do not commit here.
      dsaServiceToken: ""

admin:
  # M7 (Slice-0 confirmed): admin calls tlsutil.RequireTLSInProduction()
  # (services/admin/cmd/server/main.go:49) → log.Fatal under dsaEnv=production
  # without gRPC TLS. Set per-subchart (templates use .Values.grpcTlsEnabled,
  # local scope — global.grpcTlsEnabled is not read by the subchart).
  grpcTlsEnabled: "true"
  secrets:
    values:
      # PRODUCTION: Set dsaServiceToken via --set or Vault; do not commit here.
      dsaServiceToken: ""

ingest:
  # ingest calls tlsutil.RequireTLSInProduction()
  # (services/ingest/cmd/server/main.go:69) → log.Fatal under dsaEnv=production
  # without gRPC TLS. ingest.enabled defaults to false; this pair only takes
  # effect when an operator opts ingest in under the production overlay.
  grpcTlsEnabled: "true"
  secrets:
    values:
      # PRODUCTION: Set dsaServiceToken via --set or Vault; do not commit here.
      dsaServiceToken: ""
