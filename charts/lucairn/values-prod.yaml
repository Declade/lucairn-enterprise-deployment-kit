# deploy/helm/values-prod.yaml
# Production overlay: resource requests, ESO, prod-only security flags.
#
# v1.0 SINGLE-REPLICA LOCK: every replicaCount below is 1. The umbrella
# chart's own validator (charts/lucairn/templates/_validators.tpl —
# validators.podLocalStateSingleReplica + the gateway file-keystore check)
# HARD-FAILS render on any replicaCount != 1 for veil-witness / audit /
# id-bridge / sandbox-a / sandbox-b / gateway, because each holds pod-local
# in-memory state that K8s Service round-robin cannot safely split (cert
# chain finalises PARTIAL, dedup uniformity breaks, rate-limit bypass).
# Multi-replica HA is the v2.0 roadmap. Do NOT raise these to 2 — the
# install will fail to render. See INSTALL.md § "v1.0 deployment topology".
#
# This is a names-and-paths-only production overlay. Application credentials
# are supplied exclusively by the configured External Secrets backend; never
# add credential bytes, substitutions, or `--set` secrets here. A Helm render
# is only a preflight, so discard it rather than writing a shared output:
#   helm template lucairn charts/lucairn -f charts/lucairn/values-prod.yaml \
#     -f /secure/operator/lucairn-production-site.yaml >/dev/null
global:
  secrets:
    backend: vault
    vault:
      # Site overlay required: a non-secret HTTPS URL for the site's Vault.
      # values-prod.yaml intentionally fails closed until it is supplied.
      endpoint: ""
      role: dsa
      mountPath: dsa
  # Registry credentials are deliberately outside Helm and release history.
  # Operators either reference a pre-created pull Secret here, or use
  # node/default-ServiceAccount auth or workload identity. All three supported
  # modes set this guard escape hatch; no Docker config is passed to Helm.
  imagePullSecrets: []
  skipPullSecretGuard: true
  # Production: enable Cilium DNS restriction and Hubble audit.
  # Requires Cilium CNI installed on the cluster.
  dnsRestriction: true
  nodeIsolation: true
  postgresqlSslmode: require
  wireguardEncryption: true
  # Production environment flag — enables dev-secret rejection guards
  dsaEnv: production
  # Verified DSA mTLS is mandatory in the supported production profile. These
  # are names only: create the operator/PKI-owned Secrets in the matching
  # namespaces before installation. Helm does not generate or retain any CA or
  # private key material. See INSTALL.md "Enterprise full-mesh mTLS".
  mtls:
    enabled: true
    mountPath: "/var/run/lucairn/mtls"
    caBundleKey: "ca.crt"
    certKey: "tls.crt"
    keyKey: "tls.key"
    secrets:
      gateway: "lucairn-mtls-gateway"
      audit: "lucairn-mtls-audit"
      idBridge: "lucairn-mtls-id-bridge"
      sandboxA: "lucairn-mtls-sandbox-a"
      sanitizer: "lucairn-mtls-sanitizer"
      sandboxB: "lucairn-mtls-sandbox-b"
      veilWitness: "lucairn-mtls-veil-witness"

audit:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    backend: vault
    vault:
      path: postgres-audit

id-bridge:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    backend: vault
    vault:
      path: bridge

sandbox-a:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    backend: vault
    vault:
      path: sandbox-a

sandbox-b:
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  workers: 4
  # Redis credentials and every model-provider key come from this child’s
  # ExternalSecret, including the Redis StatefulSet's REDIS_PASSWORD input.
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  secrets:
    backend: vault
    vault:
      path: sandbox-b
  verticals:
    finance:
      config:
        provider: anthropic
        model: claude-sonnet-4-6

veil-witness:
  enabled: true
  replicaCount: 1  # v1.0 single-replica lock (validator hard-fails != 1)
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    backend: vault
    vault:
      path: veil-witness

observability:
  # Optional service: it owns a Helm Secret, so it is outside the supported
  # names-and-paths-only production mTLS topology.
  enabled: false

demo:
  enabled: false

gateway:
  replicaCount: 1  # v1.0 single-replica lock (file-keystore on RWO PVC)
  # The production mTLS contract is explicit at the operator boundary. The
  # pinned gateway also applies tlsutil.ForceHTTPS when its DSA_MTLS_* client
  # triple is present; that runtime guard is defense in depth, not a reason to
  # render a compatibility http:// endpoint in production.
  sanitizerUrl: "https://sandbox-a.dsa-identity.svc:8086"
  # The key ceremony signs this public manifest outside Helm, then the
  # operator creates this Secret in dsa-edge before installation. Do not put a
  # witness signing seed or unsigned manifest in values/Git.
  witnessSignedManifest:
    existingSecret: "lucairn-witness-signed-manifest"
    secretKey: "witness-signed-manifest.json"
    mountPath: "/certs"
    fileName: "witness-signed-manifest.json"
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  secrets:
    backend: vault
    vault:
      path: gateway

admin:
  # Optional service: explicitly disable because a missing condition otherwise
  # enables this k8s-native Secret-owning dependency.
  enabled: false

ingest:
  # Preserve the default optional posture explicitly in the supported profile.
  enabled: false
