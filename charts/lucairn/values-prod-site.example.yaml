# Copy to an operator-controlled site overlay and replace only non-secret
# provider routing values. values-prod.yaml intentionally leaves the Vault
# endpoint empty, so it cannot render or install on its own.
#
# Do not put Vault tokens, application credentials, registry credentials, or
# certificate/private-key material in this file. ESO and the site's identity
# mechanism retrieve application credentials directly from the provider.
global:
  secrets:
    vault:
      endpoint: "https://vault.example.internal"
  # Names only: this pre-created pull Secret must exist in every mandatory
  # workload namespace before Helm. Helm attaches the reference to chart-specific workload PodSpecs
  # but never receives or stores its registry credential bytes.
  imagePullSecrets:
    - name: lucairn-registry

# Leave global.imagePullSecrets empty only for actual node-level registry auth
# or registry workload identity configured outside Helm; that private overlay
# also sets skipPullSecretGuard: true. Do not use that escape hatch for
# Secret-based registry authentication.

# To select AWS or Azure, set global.secrets.backend and every mandatory
# child's secrets.backend to the same provider, then give each child its
# selected non-secret remote name. For example, the operator overlay may add:
#
# global:
#   secrets:
#     backend: aws
#     aws:
#       region: eu-central-1
#       # ClusterSecretStore JWT auth references this pre-created ServiceAccount.
#       # Configure this exact external-secrets/eso-service-account with the
#       # EKS IRSA role outside Helm; this chart creates neither the account nor
#       # its annotation.
#       serviceAccount:
#         name: eso-service-account
#         namespace: external-secrets
# gateway:
#   secrets:
#     backend: aws
#     aws:
#       name: customer/lucairn/gateway
#
# Apply the same explicit backend/name pair to audit, id-bridge, sandbox-a,
# sandbox-b, and veil-witness. See INSTALL.md for the complete provider shape.
